lity of a system — a depiction of the system's behavior under various conditions as it responds to requests from users; it represents a set of possible interaction sequences between a system and a user related to a particular goal, and it is stated as a present-tense verb phrase containing the verb and the object of the verb (e.g., Enter Sales Data, Compute Commission, Generate Quarterly Report). A use case model consists of actors and use cases: an actor is an external entity that interacts with the system, and a use case is a sequence of related actions initiated by an actor to accomplish a specific goal. The use case diagram pictures system behavior along with the key actors. Its symbols: the system boundary is a box including all relevant use cases, with actors outside it; an actor is a stickfigure with its name below it — a role, not an individual (individuals are instances of actors and one individual may play many roles simultaneously); each use case is an ellipse representing a single system function with its name inside or just below it; actors connect to use cases with lines showing involvement, and use cases connect to each other with arrows."}, {"q": "Compare the extend and include relationships between use cases.", "a": "Extend is an association between two use cases where one adds new behaviors or actions to the other; it is shown as a dotted-line arrow pointing toward the use case that has been extended, labeled with the <<extend>> symbol — for example, Register for Special Class extends Register for Classes. Include is an association where one use case uses the functionality contained in the other; it is shown as a dotted-line arrow pointed toward the use case that is being used, labeled with the <<include>> symbol — for example, when a manager reorders supplies, the sales and inventory data are tracked. So in extend, the arrow points to the use case receiving the added behavior, whereas in include, the arrow points to the use case whose functionality is reused."}, {"q": "Describe Cockburn's template for written use cases and explain each part.", "a": "Use case names alone do not provide enough information for analysis and to move on to the design phase, so use case contents are written in simple text. Cockburn (2001) recommends a template with: Level — the perspective from which the description is written, typically from high level to extremely detailed; Stakeholder — people with a vested interest in the system being developed; Preconditions — things that must be true before the use case can start; Minimal guarantee — the least amount promised to the stakeholder by the use case; Success guarantee — what the use case must do effectively in order to satisfy stakeholders; Trigger — the event that initiates the use case; and Extension — the set of behaviors or functions that follow exceptions to the main success scenario."}, {"q": "Explain activity diagrams: their purpose, basic notations, and swimlanes.", "a": "An activity diagram shows the conditional logic for the sequence of system activities needed to accomplish a business process; an individual activity may be manual or automated. It can depict the flow of control from activity to activity, help in use case analysis to understand needed actions, help identify extensions in a use case, model workflow and business processes, and model sequential and concurrent steps in a computation. 'Activity' depends on perspective: conceptually it is a task; at implementation level it is a method in a class. Notation: each activity is a rounded rectangle containing the action; the start is a filled-in circle and the end is a filled-in circle surrounded by another circle; a branch (choice) is a diamond with one incoming and two outgoing arrows; a merge (where alternative courses join) is a diamond with two incoming and one outgoing arrow; a fork starts parallel activities as a horizontal line with two arrows out; a join ends them as a horizontal line with two arrows in and one out. For complex systems, swimlane columns represent the organizational units responsible for activities, the vertical axis is time without a time scale, and the multi-actor diagram clearly shows parallel and alternative behavior — a good way to document flows through an organization."}, {"q": "Describe BPMN: its origin, basic concepts, and the three gateway types with examples.", "a": "A business process is a standard method for accomplishing a particular task necessary for an organization to function; complex processes are difficult to understand and harder to automate. Processes can be represented by DFDs and activity diagrams, and the Object Management Group (OMG) established Business Process Modeling Notation (BPMN). BPMN is much more complicated than DFD notation, with many more symbols and numerous variations, built on four basic concepts: event — a trigger that initiates the start of a process, drawn as a circle (thin walls for a starting event, thicker walls for the ending event); activity — an action that must take place for the process to complete, manual or automated, drawn as a rectangle with rounded edges; gateway — a decision point drawn as a diamond; and flow — an arrow showing the sequence in which activities occur, read from left to right. Gateways come in three types: XOR (X inside) — only one exiting path can be followed (e.g., value a, b, or c selects exactly one of activities A, B, or C, after which paths merge at a second gateway before activity D); AND (plus inside) — all following paths are taken in parallel (e.g., after activity N, activity C runs in parallel with either A or B chosen by an XOR); OR (O inside) — at least one exiting path must be followed, but many or all may be engaged."}]}, {"id": 8, "title": "Analysis: Conceptual Data Modeling", "optional": false, "slides": [{"t": "Conceptual Data Model", "d": "A conceptual data model is a representation of organizational data — a detailed model that captures the overall structure of organizational data and is independent of any DBMS or any other implementation considerations. The model can be done in parallel with other requirements analysis and structuring steps during the analysis phase. For large projects, part of the team works on data modeling while part works on process or logic modeling, and the work of all team members is coordinated and shared through the project dictionary or repository, maintained by a software tool (example: CASE).", "svg": null}, {"t": "Consistency Across Models", "d": "The process, logic, and data model descriptions describe different views of the same information system, so they should be consistent and complete — for example, there should be a correspondence between names of data stores on the primitive-level DFDs and the names of data entities in E-R diagrams. If a system is being replaced, conceptual data modeling begins with developing a conceptual data model for two reasons: (1) conversion of the current files or database into the database of the new system, and (2) understanding of the data requirements. A new conceptual data model is then built that includes all the data requirements for the new system.", "svg": null}, {"t": "Data Model Evolution Across the SDLC", "d": "Different kinds of data modeling and database design are conducted during the SDLC — suitable for the planning and analysis phases, usable with a data model developed from scratch or based on a purchased data model. Evolution: Planning phase — E-R diagramming and class diagramming; Analysis phase — the data model becomes more specific and is validated; Design phase — the final data model from analysis is matched with designs for system inputs and outputs, and translated into a format from which physical data storage decisions can be made; Implementation phase — files and databases are defined as the system is coded; Maintenance phase — evolution of the data model.", "svg": null}, {"t": "Popular Conceptual Data Modeling Methods", "d": "Popular methods are E-R modeling, which uses a special notation to represent as much meaning about data as possible, and class diagramming, used because of rapidly increasing interest in object-oriented approaches. An E-R diagram is the primary deliverable of conceptual data modeling during the analysis phase; the other deliverable is a full set of entries about data objects stored in the project dictionary, repository, or data modeling software. In a sample conceptual data model, rectangles represent major categories of data, and lines connecting rectangles represent business relationships.", "svg": null}, {"t": "Gathering Information for Conceptual Data Modeling", "d": "Questions and investigations that take a data focus are one of the requirements determination techniques (in addition to process and logic focus) — e.g., interviews through JAD sessions and requirements interviews should gain the data perspective needed to develop or purchase a data model. The data model should answer: What does the organization do? What rules govern performing the work in the organization? It should NOT answer: How are data processed or used? When are data processed or used?", "svg": null}, {"t": "Top-down vs. Bottom-up Rule Elicitation", "d": "Top-down approach: the source of deriving business rules for a data model is the intimate understanding of the nature of the business — the basis for a purchased data model. Bottom-up approach: the source is reviewing specific business documents such as computer displays, reports, and business forms — sources that appear as data flows on DFDs. The course shows questions to elicit business rules top-down, and a bottom-up example extracting from an order form: ORDER NO, ORDER DATE, PROMISED DATE, PRODUCT NO, DESCRIPTION, QUANTITY ORDERED, UNIT PRICE, CUSTOMER NO, NAME, ADDRESS, CITY-STATE-ZIP.", "svg": null}, {"t": "E-R Modeling — Three Main Constructs", "d": "The three main constructs in basic E-R modeling notation: (1) data entities — entities in the business environment; (2) relationships — the relationships or associations among those entities; (3) associated attributes — the attributes or properties of both the entities and their relationships. The E-R model is a detailed, logical representation of the data for an organization or business area; the E-R diagram is its graphical representation and the primary deliverable of conceptual data modeling in the analysis phase.", "svg": null}, {"t": "Entities — Definition and Examples", "d": "An entity is a person, object, place, event, or concept in the user environment about which the organization wants to maintain data; it has its own identity distinguishing it from other entities. Examples — Person: STUDENT, EMPLOYEE, INSTRUCTOR, PATIENT; Place: WAREHOUSE, STATE, CITY, STORE; Object: BUILDING, AUTOMOBILE, PRODUCT; Event: SALE, REGISTRATION, RENEWAL; Concept: ACCOUNT, COURSE, WORK CENTER. An entity type is a collection of entities that share common properties or characteristics; an entity instance is a single occurrence of an entity type.", "svg": null}, {"t": "Entity Naming Guidelines", "d": "Guidelines for naming an entity: (1) it should be a singular noun; (2) it should be concise; (3) its definition should include what the unique characteristics are for each instance; (4) it should include what entity instances are included and not included; (5) it should include a description of when an instance is created and deleted; (6) it should describe when an instance changes into an instance of another entity type; (7) it should describe what history is to be kept about entity instances. Note: guidelines 6 and 7 apply to some entity types.", "svg": null}, {"t": "Attributes — Definition and Examples", "d": "Each entity type has a set of attributes associated with it. An attribute is a property or characteristic of an entity that is of interest to the organization; relationships can also have attributes. Examples — INSTRUCTOR: Instructor_ID, Instructor_Name, Home_Address, Phone_Number, Major; AUTOMOBILE: Vehicle_ID, Brand, Color, Weight, Horsepower; EMPLOYEE: Employee_ID, Employee_Name, Address.", "svg": null}, {"t": "Attribute Naming Guidelines", "d": "Ten guidelines for naming an attribute: (1) singular noun; (2) unique; (3) follows a standard format; (4) if similar to an attribute of another entity, names should be similar but distinguishable; (5) the definition states what the attribute is and its importance; (6) it includes what is and is not included in the attribute's value; (7) it states any aliases or alternative names; (8) it states the source of values and whether the value is required or optional; (9) it states any relationships the attribute has with other attributes; (10) it indicates whether the value may change once provided and before the entity instance is deleted.", "svg": null}, {"t": "Candidate Keys and Identifiers", "d": "A candidate key is an attribute that uniquely identifies each instance of an entity type — e.g., Instructor_ID for INSTRUCTOR, Student_ID for STUDENT, Employee_ID for EMPLOYEE. A candidate key can also be a combination of attributes (e.g., the combination of Employee_Name and Address, assuming no two employees live at the same address with the same name). The candidate key selected to be used as the unique characteristic for an entity type is called an identifier.", "svg": null}, {"t": "Other Attribute Types", "d": "Other attribute types listed: multivalued attribute, repeating group, required attribute, optional attribute, composite attribute, and derived attribute.", "svg": null}, {"t": "Relationships and Naming Guidelines", "d": "A relationship is an association between the instances of one or more entity types, meaning there is a linkage between entity instances or an event has occurred. Naming guidelines: (1) it should be a verb phrase; (2) it should not be a vague name; (3) the definition explains what action is being taken and its importance; (4) it clarifies the action by giving examples; (5) it explains all optional participation and restrictions; (6) it explains the history in the relationship; (7) it explains whether an entity instance involved can transfer participation to another relationship instance; (8) it explains the reason for any explicit maximum cardinality.", "svg": null}, {"t": "Degree and Cardinality", "d": "The degree of a relationship is the number of entity types that participate in that relationship. Most common: unary — a relationship between instances of one entity type; binary — between instances of two entity types; ternary — a simultaneous relationship among instances of three entity types. Cardinality is the number of instances of entity X that can be associated with each instance of entity Y; minimum cardinality is the minimum number of instances of X that may be associated with each instance of Y; maximum cardinality is the maximum number.", "svg": null}, {"t": "Business Rules and Domains", "d": "Business rules are specifications that preserve the integrity of the logical data model. Four types: (1) entity integrity — a unique identifier that is not null for each instance; (2) referential integrity constraints — rules related to the relationships between entity types; (3) domains — constraints on valid values for attributes; (4) triggering operations — rules that protect the validity of attribute values.", "svg": null}, {"t": "Packaged Conceptual Data Models", "d": "Nowadays it is almost not necessary for an organization to internally develop its data model; the alternative is to purchase and customize a common database pattern for the business situation. Advantages: (1) low cost; (2) developed by industry specialists and expert database technology vendors. Types: universal data model — applicable to any business or organization; industry-specific data model — designed for a specific business or industry such as health care, banking, and education.", "svg": null}, {"t": "Objects and Classes", "d": "An object has a well-defined role in the application domain, and it has state (data), behavior, and identity characteristics; an object is a single occurrence of a class. The state of an object encompasses its properties (attributes and relationships) and the values of those properties; the behavior represents how an object acts and reacts. An operation is an action that one object performs upon another in order to get a response. A class is a logical grouping of objects that have the same (or similar) attributes, relationships, and behaviors.", "svg": null}, {"t": "Class Diagram and Encapsulation", "d": "A class diagram shows the static structure of an object-oriented model: the object classes, their internal structure, and the relationships in which they participate. In UML, a class is a rectangle with three compartments separated by horizontal lines: the class name in the top compartment, the list of attributes in the middle, and the list of operations in the bottom. Encapsulation is the technique of hiding the internal implementation details of an object from its external view.", "svg": null}, {"t": "Types of Operations", "d": "Constructor operation: creates a new instance of a class. Query operation: accesses the state of an object but does not alter the state. Update operation: alters the state of an object. Class-scope operation: applies to a class rather than an object instance.", "svg": null}, {"t": "Associations, Roles, and Multiplicity", "d": "An association is a named relationship between or among object classes, shown as a solid line between participating classes. An association role is the end of an association where it connects to a class. The degree of an association may be one (unary), two (binary), three (ternary), or higher (n-ary). Multiplicity is a specification that indicates how many objects participate in a given relationship.", "svg": null}, {"t": "Associative Classes and Stereotypes", "d": "If an association itself has attributes or operations of its own, or when it participates in relationships with other classes, it is useful to model the association as an associative class — e.g., Registration is modeled as an association class with its own set of features and an association with another class (Computer Account). In E-R diagrams attributes are designated as primary keys, multivalued, derived, etc.; in a class diagram this is done by placing a stereotype next to the attribute (e.g., <<Derived>>, <<PK>>). Stereotypes simply extend the common UML vocabulary.", "svg": null}, {"t": "Generalization, Subclasses, and Discriminators", "d": "Generalization is the abstraction of the common features (attributes and operations) among multiple classes, and the relationships they participate in, into a more general class. The classes that are generalized are subclasses; the class they are generalized into is the superclass. A generalization path is a solid line from the subclass to the superclass with an arrow pointing toward the superclass. A discriminator shows which property of an object class is being abstracted by a particular generalization relationship. Abstract classes have no direct instances, but their descendants may have direct instances; concrete classes can have direct instances.", "svg": null}, {"t": "Semantic Constraints in Generalization", "d": "Overlapping: a descendant may be descended from more than one of the subclasses. Disjoint: a descendant may not be descended from more than one of the subclasses. Complete: all subclasses have been specified (whether or not shown). Incomplete: some subclasses have been specified, but the list is known to be incomplete.", "svg": null}, {"t": "Polymorphism and Related Concepts", "d": "Class-scope attribute: an attribute of a class that specifies a value common to an entire class, rather than a specific value for an instance. Polymorphism: the same operation may apply to two or more classes in different ways. Abstract operation: defines the form or protocol of the operation, but not its implementation. Method: the implementation of an operation.", "svg": null}, {"t": "Aggregation and Composition", "d": "Aggregation is a part-of relationship between a component object and an aggregate object — a stronger form of association (with added 'part-of' semantics) represented with a hollow diamond at the aggregate end. Composition is a part-of relationship in which parts belong to only one whole object and the parts live and die with the whole; it is represented with a solid diamond and is a stronger form of aggregation. The multiplicity on the aggregate end may not exceed one, and deletion of the aggregate object cascades to its components.", "svg": null}], "qs": [{"q": "What is a conceptual data model?", "opts": ["A representation of organizational data, independent of any DBMS or implementation considerations", "A technical specification of computer files prescribed for a chosen database product", "A diagram of the order in which system activities are performed in a business process", "A list of the programs and modules that will be coded during implementation"], "a": 0, "ex": "A conceptual data model captures the overall structure of organizational data and is independent of any DBMS or other implementation considerations.", "core": true, "sref": 0}, {"q": "On large projects, how is the work of the data-modeling and process-modeling team members coordinated and shared?", "opts": ["Through the project dictionary or repository, maintained by a software tool such as CASE", "Through weekly status meetings chaired by the project sponsor and lead analyst", "Through a version control system holding all source code and test scripts", "Through the baseline project plan reviewed at the end of every phase"], "a": 0, "ex": "Work is coordinated and shared through the project dictionary or repository, maintained by a software tool (example: CASE).", "core": false, "sref": 0}, {"q": "Why should process, logic, and data model descriptions be consistent and complete?", "opts": ["They describe different views of the same information system", "They are produced by the same person at the same time", "They are merged into one diagram at the design phase", "They are required as separate sections of the contract"], "a": 0, "ex": "Each describes a different view of the same information system; e.g., data store names on primitive DFDs should correspond to data entity names in E-R diagrams.", "core": false, "sref": 1}, {"q": "The course gives an example of required correspondence between models. What must match?", "opts": ["Names of data stores on primitive-level DFDs and names of data entities in E-R diagrams", "Names of actors in use case diagrams and names of attributes in class diagrams", "Numbers of processes on the context diagram and rows in the decision table", "Labels of swimlanes in activity diagrams and keys in normalized relations"], "a": 0, "ex": "There should be a correspondence between names of data stores on the primitive-level DFDs and names of data entities in E-R diagrams.", "core": false, "sref": 1}, {"q": "When replacing an existing system, why does conceptual data modeling begin with developing a conceptual data model? (two reasons)", "opts": ["Conversion of the current files or database into the new system's database, and understanding of the data requirements", "Reduction of project cost estimates, and faster signing of the development contract with the vendor", "Verification of program code quality, and elimination of redundant processes from the old system", "Selection of the physical storage media, and training of users on the replacement application"], "a": 0, "ex": "Reasons: (1) conversion of current files/database into the new system's database, and (2) understanding of the data requirements.", "core": false, "sref": 0}, {"q": "During which SDLC phase does E-R diagramming and class diagramming for the data model begin?", "opts": ["Planning", "Analysis", "Design", "Implementation"], "a": 0, "ex": "In the planning phase: E-R diagramming and class diagramming; in analysis the model becomes more specific and is validated.", "core": false, "sref": 2}, {"q": "What happens to the data model during the analysis phase?", "opts": ["It becomes more specific and is validated", "It is translated into physical storage formats", "It is coded into files and database definitions", "It is matched with designs for inputs and outputs"], "a": 0, "ex": "Analysis phase: the data model becomes more specific and is validated.", "core": false, "sref": 2}, {"q": "What happens to the final data model during the design phase?", "opts": ["It is matched with input/output designs and translated into a format for physical data storage decisions", "It is frozen so that no further evolution of any kind can occur until the maintenance phase begins", "It is replaced by a purchased universal data model selected by the database vendor", "It is reverse-engineered from the application code produced by the programmers"], "a": 0, "ex": "Design phase: the final model is matched with designs for system inputs and outputs and translated into a format from which physical data storage decisions can be made.", "core": false, "sref": 2}, {"q": "When are files and databases actually defined?", "opts": ["During the implementation phase, as the system is coded", "During the planning phase, before requirements are known", "During the analysis phase, as requirements are structured", "During the maintenance phase, after the system stabilizes"], "a": 0, "ex": "Implementation phase: files and databases are defined as the system is coded.", "core": false, "sref": 2}, {"q": "Which two methods are listed as popular conceptual data modeling methods?", "opts": ["E-R modeling and class diagramming", "DFDs and decision tables", "Gantt charts and network diagrams", "Use cases and activity diagrams"], "a": 0, "ex": "Popular methods: E-R modeling and class diagramming (the latter due to increasing object-oriented interest).", "core": true, "sref": 3}, {"q": "What is the primary deliverable of conceptual data modeling during the analysis phase?", "opts": ["An E-R diagram", "A class diagram", "A context DFD", "A decision table"], "a": 0, "ex": "The E-R diagram is the primary deliverable; the other deliverable is the set of repository entries about data objects.", "core": true, "sref": 3}, {"q": "Besides the E-R diagram, what is the other deliverable of conceptual data modeling?", "opts": ["A full set of entries about data objects stored in the project dictionary, repository, or data modeling software", "A complete physical database schema with indexes for the chosen database management product", "A prioritized list of maintenance requests gathered from the users of the current system", "A working prototype of the user interface forms validated by the steering committee"], "a": 0, "ex": "The other deliverable is a full set of entries about data objects stored in the project dictionary, repository, or data modeling software.", "core": false, "sref": 3}, {"q": "In the sample conceptual data model, what do rectangles and connecting lines represent?", "opts": ["Rectangles are major categories of data; lines are business relationships", "Rectangles are processes; lines are flows of data between them", "Rectangles are organizational units; lines are reporting structures", "Rectangles are programs; lines are module-calling dependencies"], "a": 0, "ex": "Rectangles represent major categories of data; lines connecting rectangles represent business relationships.", "core": false, "sref": 3}, {"q": "According to the course, the data model should answer which questions?", "opts": ["What the organization does, and what rules govern performing the work", "How data are processed, and when data are processed or used", "Which hardware stores the data, and who administers the database", "Where forms are filed, and how often reports are distributed"], "a": 0, "ex": "The data model should answer what the organization does and what rules govern the work — not how or when data are processed or used.", "core": false, "sref": 4}, {"q": "Which questions should the data model NOT answer?", "opts": ["How are data processed or used, and when are data processed or used", "What entities the organization keeps data about, and their attributes", "What relationships exist between the organization's data categories", "What rules govern performing the work in the organization"], "a": 0, "ex": "The data model should not answer how data are processed or used, or when data are processed or used.", "core": false, "sref": 4}, {"q": "In the top-down approach to deriving business rules, what is the source?", "opts": ["An intimate understanding of the nature of the business", "Specific business documents such as forms and reports", "The data flows recorded on the lowest-level DFDs", "The opinions of the database technology vendors"], "a": 0, "ex": "Top-down: rules derive from the intimate understanding of the nature of the business — the basis for a purchased data model.", "core": false, "sref": 5}, {"q": "In the bottom-up approach to deriving business rules, what is the source?", "opts": ["Reviewing specific business documents such as computer displays, reports, and business forms", "Interviewing senior executives about the strategic direction of the organization", "Studying the mission statement and the objectives of the corporate plan", "Benchmarking the data models adopted by competitors in the industry"], "a": 0, "ex": "Bottom-up: rules derive from reviewing specific business documents (computer displays, reports, business forms) — sources that appear as data flows on DFDs.", "core": false, "sref": 5}, {"q": "Which approach forms the basis for a purchased data model?", "opts": ["Top-down", "Bottom-up", "Prototyping", "Reverse engineering"], "a": 0, "ex": "The top-down understanding of the nature of the business is the basis for a purchased data model.", "core": false, "sref": 5}, {"q": "What are the three main constructs in basic E-R modeling notation?", "opts": ["Data entities, relationships, and associated attributes", "Processes, data stores, data flows, and sources or sinks", "Events, activities, and gateways", "Classes, operations, and methods"], "a": 0, "ex": "The three main constructs: data entities, relationships, and associated attributes (of both entities and relationships).", "core": true, "sref": 6}, {"q": "What is an entity in E-R modeling?", "opts": ["A person, object, place, event, or concept in the user environment about which the organization wants to maintain data", "A column of values stored inside one relation of the physical database design of the chosen DBMS product", "A constraint that preserves the validity of attribute values across the data model", "A graphical symbol marking where data leaves the boundary of the system"], "a": 0, "ex": "An entity is a person, object, place, event, or concept in the user environment about which the organization wants to maintain data.", "core": true, "sref": 2}, {"q": "Which of these is listed as an example of an EVENT entity?", "opts": ["REGISTRATION", "WAREHOUSE", "AUTOMOBILE", "ACCOUNT"], "a": 0, "ex": "Events: SALE, REGISTRATION, RENEWAL. (WAREHOUSE is a place, AUTOMOBILE an object, ACCOUNT a concept.)", "core": false, "sref": 7}, {"q": "Which of these is listed as an example of a CONCEPT entity?", "opts": ["COURSE", "PATIENT", "BUILDING", "SALE"], "a": 0, "ex": "Concepts: ACCOUNT, COURSE, WORK CENTER. (PATIENT is a person, BUILDING an object, SALE an event.)", "core": false, "sref": 7}, {"q": "What is the difference between an entity type and an entity instance?", "opts": ["An entity type is a collection of entities sharing common properties; an instance is a single occurrence of that type", "An entity type is stored physically in the database; an instance exists only in the conceptual diagram", "An entity type holds the attribute values; an instance holds only the name of the entity category", "An entity type is always abstract; an instance is the superclass from which the type descends"], "a": 0, "ex": "Entity type: a collection of entities that share common properties or characteristics. Entity instance: a single occurrence of an entity type.", "core": true, "sref": 7}, {"q": "Which is one of the entity naming guidelines?", "opts": ["It should be a singular noun", "It should be a verb phrase", "It should include the table size", "It should list its foreign keys"], "a": 0, "ex": "Entity naming guidelines start with: it should be a singular noun, and it should be concise.", "core": false, "sref": 8}, {"q": "Entity naming guidelines 6 and 7 (instance changing into another entity type; history kept) apply to…", "opts": ["some entity types", "all entity types", "no entity types", "weak entity types only"], "a": 0, "ex": "Note in the course: guidelines 6 and 7 are for some entity types.", "core": false, "sref": 8}, {"q": "What is an attribute?", "opts": ["A property or characteristic of an entity that is of interest to the organization", "A rule that protects the integrity of relationships between entity types", "A single occurrence of an entity type in the user environment", "A named relationship between or among object classes"], "a": 0, "ex": "An attribute is a property or characteristic of an entity that is of interest to the organization; relationships can also have attributes.", "core": true, "sref": 9}, {"q": "Can relationships have attributes in E-R modeling?", "opts": ["Yes — relationships also can have attributes", "No — only entities can carry attributes", "Only in unary relationships", "Only after normalization"], "a": 0, "ex": "The course states that relationships also can have attributes.", "core": false, "sref": 6}, {"q": "How many guidelines for naming an attribute does the course list?", "opts": ["Ten", "Seven", "Eight", "Five"], "a": 0, "ex": "Ten attribute naming guidelines are listed (vs. seven for entities and eight for relationships).", "core": false, "sref": 10}, {"q": "What is a candidate key?", "opts": ["An attribute (or combination of attributes) that uniquely identifies each instance of an entity type", "A foreign attribute borrowed from another entity to support a binary relationship", "A derived attribute computed from the values stored in other attributes", "An attribute whose values are restricted to a predefined valid domain"], "a": 0, "ex": "A candidate key uniquely identifies each instance of an entity type; it can also be a combination of attributes.", "core": true, "sref": 11}, {"q": "In the course example, when can the combination of Employee_Name and Address serve as a candidate key?", "opts": ["Assuming no two employees live at the same address and have the same name", "Assuming every employee is assigned a unique department and salary", "Assuming the names are stored in a standard uppercase format", "Assuming addresses never change once the record is created"], "a": 0, "ex": "The combination works as a candidate key assuming no two employees live at the same address and have the same name.", "core": false, "sref": 11}, {"q": "What is an identifier?", "opts": ["The candidate key selected to be used as the unique characteristic for an entity type", "Any attribute whose value is required rather than optional for an instance", "The first attribute listed inside the entity rectangle on the diagram", "A composite attribute combining all of an entity's other attributes"], "a": 0, "ex": "The identifier is the candidate key that has been selected as the unique characteristic for an entity type.", "core": true, "sref": 11}, {"q": "Which of the following lists 'other attribute types' from the course?", "opts": ["Multivalued, repeating group, required, optional, composite, derived", "Static, dynamic, automated, manual, formal, informal", "Unary, binary, ternary, n-ary, recursive, reflexive", "Corrective, adaptive, perfective, preventive, predictive, reactive"], "a": 0, "ex": "Other attribute types: multivalued attribute, repeating group, required, optional, composite, and derived attributes.", "core": false, "sref": 12}, {"q": "What is a relationship in E-R modeling?", "opts": ["An association between the instances of one or more entity types", "A constraint on the valid values an attribute may assume", "An operation one object performs upon another for a response", "A grouping of attributes into a physical database record"], "a": 0, "ex": "A relationship is an association between the instances of one or more entity types — a linkage between instances, or an event has occurred.", "core": true, "sref": 13}, {"q": "How should a relationship be named?", "opts": ["As a verb phrase", "As a singular noun", "As an adjective", "As an acronym"], "a": 0, "ex": "Relationship naming guideline 1: it should be a verb phrase (and not a vague name).", "core": false, "sref": 13}, {"q": "What is the degree of a relationship?", "opts": ["The number of entity types that participate in that relationship", "The number of attributes attached to that relationship", "The maximum number of instances allowed on either side", "The depth of the relationship in the generalization tree"], "a": 0, "ex": "Degree: the number of entity types that participate in the relationship.", "core": true, "sref": 14}, {"q": "What is a unary relationship?", "opts": ["A relationship between the instances of one entity type", "A relationship between instances of two entity types", "A simultaneous relationship among three entity types", "A relationship with exactly one attribute of its own"], "a": 0, "ex": "Unary: between instances of one entity type. Binary: two entity types. Ternary: three entity types simultaneously.", "core": true, "sref": 14}, {"q": "What is a ternary relationship?", "opts": ["A simultaneous relationship among instances of three entity types", "A chain of three separate binary relationships in sequence", "A relationship whose maximum cardinality equals exactly three", "A relationship connecting three attributes of a single entity"], "a": 0, "ex": "Ternary: a simultaneous relationship among instances of three entity types.", "core": true, "sref": 14}, {"q": "What is cardinality?", "opts": ["The number of instances of entity X that can be associated with each instance of entity Y", "The number of attributes that any single entity type is permitted to have at most", "The number of relationships in which one entity type participates", "The number of rows physically stored in a database relation"], "a": 0, "ex": "Cardinality: the number of instances of entity X that can be associated with each instance of entity Y; min and max forms exist.", "core": true, "sref": 14}, {"q": "What is minimum cardinality?", "opts": ["The minimum number of instances of entity X that may be associated with each instance of entity Y", "The smallest number of attributes that an entity must have to appear in the diagram", "The least number of entity types allowed to participate in any single relationship", "The lowest value an attribute can take within its defined domain of valid values"], "a": 0, "ex": "Minimum cardinality: the minimum number of instances of X that may be associated with each instance of Y.", "core": true, "sref": 14}, {"q": "What are business rules in conceptual data modeling?", "opts": ["Specifications that preserve the integrity of the logical data model", "Procedures that govern how the project team conducts its meetings", "Standards that determine which DBMS product must be purchased", "Policies that allocate budget between development and maintenance"], "a": 0, "ex": "Business rules are specifications that preserve the integrity of the logical data model.", "core": true, "sref": 0}, {"q": "What does the entity integrity rule require?", "opts": ["A unique identifier that is not null for each instance", "A foreign key value matching a row in the parent table", "A default value supplied for every optional attribute", "A trigger that fires whenever an attribute is changed"], "a": 0, "ex": "Entity integrity: a unique identifier that is not null for each instance.", "core": false, "sref": 10}, {"q": "What are referential integrity constraints?", "opts": ["Rules related to the relationships between entity types", "Constraints on valid values for individual attributes", "Rules that protect the validity of attribute values", "Requirements that identifiers never contain null values"], "a": 0, "ex": "Referential integrity constraints: rules related to the relationships between entity types.", "core": true, "sref": 15}, {"q": "What are domains, as a type of business rule?", "opts": ["Constraints on valid values for attributes", "Rules linking entity types to one another", "Unique non-null identifiers for instances", "Operations triggered by attribute updates"], "a": 0, "ex": "Domains: constraints on valid values for attributes.", "core": true, "sref": 15}, {"q": "What are triggering operations?", "opts": ["Rules that protect the validity of attribute values", "Rules that relate two entity types referentially", "Rules that require identifiers to be unique and non-null", "Rules that limit attributes to a fixed set of valid values"], "a": 0, "ex": "Triggering operations: rules that protect the validity of attribute values.", "core": true, "sref": 15}, {"q": "What are the two advantages of purchasing a packaged data model?", "opts": ["Low cost, and development by industry specialists and expert database technology vendors", "Faster coding, and the elimination of all normalization work during the design phase", "Guaranteed compliance, and a vendor commitment to maintain the data dictionary", "Zero training needs, and the removal of the analysis phase from the project plan"], "a": 0, "ex": "Advantages: (1) low cost and (2) developed by industry specialists and expert database technology vendors.", "core": true, "sref": 16}, {"q": "What is the difference between universal and industry-specific packaged data models?", "opts": ["Universal models apply to any business; industry-specific models are designed for a specific industry such as health care, banking, and education", "Universal models include physical design details; industry-specific models stop at the conceptual modeling level for a business area", "Universal models are free of charge; industry-specific models always require recurring license payments to the vendor", "Universal models support only relational systems; industry-specific models support object-oriented databases as well"], "a": 0, "ex": "Universal data models are applicable to any business or organization; industry-specific models are designed for a specific business or industry (health care, banking, education).", "core": true, "sref": 16}, {"q": "What three characteristics does an object have?", "opts": ["State, behavior, and identity", "Name, type, and value", "Key, domain, and trigger", "Role, level, and scope"], "a": 0, "ex": "An object has state (data), behavior, and identity characteristics; it is a single occurrence of a class.", "core": true, "sref": 17}, {"q": "What does the state of an object encompass?", "opts": ["Its properties (attributes and relationships) and the values of those properties", "Only the operations it can perform when other objects send it requests", "The position it occupies in the generalization hierarchy of its class", "The list of associations in which its class is allowed to participate"], "a": 0, "ex": "The state encompasses the object's properties (attributes and relationships) and the values of those properties.", "core": false, "sref": 17}, {"q": "What is an operation, in object terminology?", "opts": ["An action that one object performs upon another in order to get a response", "A constraint preserving the integrity of the logical data model", "A column heading in the two-dimensional table of a relation", "A rule deciding which subclass an instance is descended from"], "a": 0, "ex": "An operation is simply an action that one object performs upon another in order to get a response.", "core": true, "sref": 17}, {"q": "What is a class?", "opts": ["A logical grouping of objects that have the same (or similar) attributes, relationships, and behaviors", "A physical table whose rows store the persistent data values of the running application system", "A use case that groups the related actions initiated by a single external actor", "A named end of an association where the connection meets an object instance"], "a": 0, "ex": "A class is a logical grouping of objects with the same or similar attributes, relationships, and behaviors.", "core": true, "sref": 17}, {"q": "What does a class diagram show?", "opts": ["The static structure of an object-oriented model: classes, their internal structure, and their relationships", "The dynamic ordering of the system activities that are required to complete one full business process", "The flow of data between external entities, processes, and stores in a system", "The schedule of project activities with earliest and latest completion times"], "a": 0, "ex": "A class diagram shows the static structure: the object classes, their internal structure, and the relationships in which they participate.", "core": false, "sref": 18}, {"q": "In UML, what are the three compartments of a class rectangle, top to bottom?", "opts": ["Class name, list of attributes, list of operations", "List of operations, class name, list of attributes", "Class name, list of methods, list of constraints", "Identifier, list of relationships, list of domains"], "a": 0, "ex": "Top: class name; middle: attributes; bottom: operations.", "core": true, "sref": 18}, {"q": "What is encapsulation?", "opts": ["The technique of hiding the internal implementation details of an object from its external view", "The abstraction of common features among multiple classes into a more general class", "The application of one operation to two or more classes in different ways", "The bundling of parts into a whole such that parts die with the whole object"], "a": 0, "ex": "Encapsulation: hiding the internal implementation details of an object from its external view.", "core": true, "sref": 18}, {"q": "What is a constructor operation?", "opts": ["An operation that creates a new instance of a class", "An operation that reads state without altering it", "An operation that changes the state of an object", "An operation that applies to the class as a whole"], "a": 0, "ex": "Constructor operation: creates a new instance of a class.", "core": true, "sref": 19}, {"q": "What is a query operation?", "opts": ["An operation that accesses the state of an object but does not alter the state", "An operation that modifies the values stored within an object instance", "An operation that builds and initializes a new instance of the class", "An operation that applies to a class rather than an object instance"], "a": 0, "ex": "Query operation: accesses the state of an object but does not alter it.", "core": true, "sref": 19}, {"q": "What is an update operation?", "opts": ["An operation that alters the state of an object", "An operation that only reads an object's state", "An operation that instantiates a brand-new object", "An operation that deletes the class definition"], "a": 0, "ex": "Update operation: alters the state of an object.", "core": true, "sref": 19}, {"q": "What is a class-scope operation?", "opts": ["An operation that applies to a class rather than an object instance", "An operation that creates one new instance of the class", "An operation that returns the state of a specific object", "An operation inherited unchanged from the superclass"], "a": 0, "ex": "Class-scope operation: applies to a class rather than an object instance.", "core": true, "sref": 19}, {"q": "What is an association in class diagrams, and how is it shown?", "opts": ["A named relationship between or among object classes, shown as a solid line between the classes", "A part-of bond between component and aggregate, shown with a hollow diamond at one end", "A generalization of common features, shown as an arrowed line toward the superclass", "A reuse of one use case by another, shown as a labeled dotted-line arrow"], "a": 0, "ex": "An association is a named relationship between/among object classes, shown as a solid line between the participating classes.", "core": true, "sref": 22}, {"q": "What is an association role?", "opts": ["The end of an association where it connects to a class", "The verb phrase used to label an association line", "The number of objects participating in a relationship", "The class created to hold an association's attributes"], "a": 0, "ex": "Association role: the end of an association where it connects to a class.", "core": true, "sref": 20}, {"q": "What is multiplicity?", "opts": ["A specification indicating how many objects participate in a given relationship", "A specification of how many attributes a class can declare in its middle compartment", "A measure of how many operations may share the same name across classes", "A count of the subclasses descended from a particular superclass"], "a": 0, "ex": "Multiplicity: a specification that indicates how many objects participate in a given relationship.", "core": true, "sref": 20}, {"q": "When is it useful to model an association as an associative class?", "opts": ["When the association has attributes or operations of its own, or participates in relationships with other classes", "When the association connects more than two classes in a simultaneous ternary or higher n-ary relationship", "When the multiplicity at both ends of the association is exactly one-to-one", "When the participating classes are abstract and have no direct instances"], "a": 0, "ex": "An associative class is useful when the association itself has attributes or operations of its own or participates in relationships with other classes — e.g., Registration.", "core": false, "sref": 21}, {"q": "In the course example, which class is modeled as an association class?", "opts": ["Registration", "Computer Account", "Student", "Course"], "a": 0, "ex": "Registration is modeled as an association class, with its own features and an association with Computer Account.", "core": false, "sref": 21}, {"q": "How are primary-key and derived designations shown for attributes in a class diagram?", "opts": ["By placing a stereotype next to the attribute, e.g., <<PK>> or <<Derived>>", "By underlining the attribute and writing it in italic letters", "By moving the attribute into the bottom operations compartment", "By appending an asterisk and the data type after the name"], "a": 0, "ex": "In a class diagram this is done with a stereotype next to the attribute — <<Derived>>, <<PK>>. Stereotypes extend the common UML vocabulary.", "core": false, "sref": 21}, {"q": "What is generalization?", "opts": ["The abstraction of common features among multiple classes, and their relationships, into a more general class", "The technique of hiding internal implementation details from the external view of an object", "The decomposition of a high-level process into finer and finer levels of detail", "The merging of normalized relations drawn from different user interface sources"], "a": 0, "ex": "Generalization abstracts the common features (attributes and operations) among multiple classes, and their relationships, into a more general class.", "core": true, "sref": 18}, {"q": "In generalization, what are the generalized classes and the resulting general class called?", "opts": ["Subclasses and superclass, respectively", "Instances and entity type, respectively", "Components and aggregate, respectively", "Methods and operations, respectively"], "a": 0, "ex": "The classes that are generalized are subclasses; the class they are generalized into is the superclass.", "core": false, "sref": 22}, {"q": "How is a generalization path drawn?", "opts": ["A solid line from the subclass to the superclass, with an arrow pointing toward the superclass", "A dotted line from the superclass to each subclass, labeled with the <<extend>> symbol", "A solid line ending in a hollow diamond placed at the side of the subclass", "A double-headed arrow connecting the two classes through a discriminator box"], "a": 0, "ex": "A generalization path is a solid line from subclass to superclass, with the arrow pointing toward the superclass.", "core": false, "sref": 22}, {"q": "What does a discriminator show?", "opts": ["Which property of an object class is being abstracted by a particular generalization relationship", "Which subclass holds the largest number of direct instances in the running system", "Which operations of the superclass are overridden by each of the subclasses", "Which end of an association carries the higher multiplicity specification"], "a": 0, "ex": "A discriminator shows which property of an object class is being abstracted by a particular generalization relationship.", "core": false, "sref": 22}, {"q": "What is the difference between abstract and concrete classes?", "opts": ["Abstract classes have no direct instances (though descendants may); concrete classes can have direct instances", "Abstract classes have no attributes of their own; concrete classes declare both attributes and operations", "Abstract classes appear only in analysis; concrete classes appear only in the implementation phase diagrams", "Abstract classes cannot participate in associations; concrete classes can join any number of associations"], "a": 0, "ex": "Abstract classes have no direct instances, but their descendants may; concrete classes can have direct instances.", "core": false, "sref": 22}, {"q": "In generalization, what does the 'overlapping' semantic constraint mean?", "opts": ["A descendant may be descended from more than one of the subclasses", "A descendant may not be descended from more than one of the subclasses", "All subclasses have been specified, whether or not they are shown", "Some subclasses are specified, but the list is known to be incomplete"], "a": 0, "ex": "Overlapping: a descendant may be descended from more than one of the subclasses.", "core": false, "sref": 23}, {"q": "In generalization, what does the 'disjoint' semantic constraint mean?", "opts": ["A descendant may not be descended from more than one of the subclasses", "A descendant may inherit from several of the subclasses simultaneously", "Every possible subclass has been fully specified in the diagram", "The subclass list is acknowledged to be incomplete at present"], "a": 0, "ex": "Disjoint: a descendant may not be descended from more than one of the subclasses.", "core": false, "sref": 23}, {"q": "In generalization, what does 'complete' mean?", "opts": ["All subclasses have been specified (whether or not shown)", "Some subclasses are specified but the list is known to be partial", "Each subclass owns at least one direct instance in the system", "Each subclass overrides every operation of the superclass"], "a": 0, "ex": "Complete: all subclasses have been specified (whether or not shown). Incomplete: some specified, list known to be incomplete.", "core": false, "sref": 23}, {"q": "What is a class-scope attribute?", "opts": ["An attribute that specifies a value common to an entire class rather than a specific value for an instance", "An attribute whose value is derived automatically from the values of other attributes", "An attribute restricted to a domain of valid values defined by a business rule", "An attribute used as the discriminator in a generalization relationship"], "a": 0, "ex": "Class-scope attribute: specifies a value common to an entire class, rather than a specific value for an instance.", "core": false, "sref": 24}, {"q": "What is polymorphism?", "opts": ["The same operation may apply to two or more classes in different ways", "The same attribute may appear in two or more compartments of a class", "One class may participate in two or more associations simultaneously", "One object may belong to two or more classes during its lifetime"], "a": 0, "ex": "Polymorphism: the same operation may apply to two or more classes in different ways.", "core": false, "sref": 24}, {"q": "What is an abstract operation?", "opts": ["It defines the form or protocol of the operation, but not its implementation", "It implements an operation that the superclass only declared abstractly", "It creates new class instances without taking any input parameters", "It applies a single shared value to every instance of an entire class"], "a": 0, "ex": "Abstract operation: defines the form or protocol of the operation, but not its implementation.", "core": false, "sref": 24}, {"q": "What is a method, in UML terminology?", "opts": ["The implementation of an operation", "The declaration of an operation's protocol", "The signature shared by polymorphic classes", "The constructor used to instantiate a class"], "a": 0, "ex": "Method: the implementation of an operation.", "core": false, "sref": 18}, {"q": "What is aggregation and how is it drawn?", "opts": ["A part-of relationship between a component object and an aggregate object, drawn with a hollow diamond at the aggregate end", "A whole-part bond in which parts die with the whole, drawn with a solid diamond placed at the side of the component", "A named relationship between classes of equal standing, drawn as a plain solid line with multiplicities at the ends", "A reuse link between two use cases, drawn as a dotted arrow labeled with the <<include>> stereotype"], "a": 0, "ex": "Aggregation: a part-of relationship between a component object and an aggregate object — a stronger form of association — with a hollow diamond at the aggregate end.", "core": false, "sref": 25}, {"q": "What is composition?", "opts": ["A part-of relationship in which parts belong to only one whole and live and die with the whole object", "A part-of relationship in which parts may be shared freely among several whole objects at once", "A generalization in which subclasses inherit the operations and attributes of one superclass", "An association class created when a relationship has attributes or operations of its own"], "a": 0, "ex": "Composition: parts belong to only one whole object, and the parts live and die with the whole; drawn with a solid diamond — a stronger form of aggregation.", "core": false, "sref": 25}, {"q": "Which diamond represents composition?", "opts": ["A solid diamond", "A hollow diamond", "A double diamond", "A dashed diamond"], "a": 0, "ex": "Composition is represented with a solid diamond; aggregation uses a hollow diamond.", "core": false, "sref": 25}, {"q": "In aggregation/composition, what is the rule about multiplicity on the aggregate end?", "opts": ["It may not exceed one", "It must always equal zero", "It must be many (asterisk)", "It is left unspecified"], "a": 0, "ex": "The multiplicity on the aggregate end may not exceed one.", "core": false, "sref": 25}, {"q": "What happens when an aggregate object is deleted?", "opts": ["Deletion cascades to its components", "Its components become independent", "Its components move to a superclass", "Nothing happens to its components"], "a": 0, "ex": "Deletion of the aggregate object cascades to its components.", "core": false, "sref": 25}], "essays": [{"q": "Discuss the conceptual data modeling process: its definition, deliverables, and how the data model evolves across the SDLC.", "a": "A conceptual data model is a representation of organizational data — a detailed model capturing the overall structure of organizational data, independent of any DBMS or other implementation considerations. It can be done in parallel with other requirements analysis and structuring steps in the analysis phase; on large projects, part of the team works on data modeling while part works on process or logic modeling, with all work coordinated through the project dictionary or repository (maintained by a tool such as CASE). The primary deliverable is an E-R diagram; the other deliverable is a full set of entries about data objects in the project dictionary, repository, or data modeling software. The model evolves across the SDLC: in planning, E-R diagramming and class diagramming begin; in analysis, the model becomes more specific and is validated; in design, the final model is matched with input/output designs and translated into a format from which physical data storage decisions can be made; in implementation, files and databases are defined as the system is coded; and in maintenance, the data model continues to evolve. Process, logic, and data models describe different views of the same system and must be consistent and complete — e.g., data store names on primitive DFDs should correspond to entity names in E-R diagrams."}, {"q": "Compare the top-down and bottom-up approaches to gathering information for conceptual data modeling.", "a": "Data-focused questions and investigations are one of the requirements determination techniques; interviews through JAD sessions and requirements interviews should gain the perspective on data needed to develop or purchase a data model. The data model should answer what the organization does and what rules govern performing the work — not how or when data are processed or used. In the top-down approach, the source of business rules is the intimate understanding of the nature of the business; this is the basis for a purchased data model. In the bottom-up approach, the source is reviewing specific business documents — computer displays, reports, and business forms — which appear as data flows on DFDs. The course's bottom-up example extracts database data from an order form: order number, order date, promised date, product number, description, quantity ordered, unit price, customer number, name, address, and city-state-zip."}, {"q": "Explain entities, attributes, candidate keys, and identifiers, with the naming guidelines.", "a": "An entity is a person, object, place, event, or concept in the user environment about which the organization wants to maintain data, with its own identity (examples: STUDENT, WAREHOUSE, AUTOMOBILE, SALE, ACCOUNT). An entity type is a collection of entities sharing common properties; an entity instance is a single occurrence of a type. Entity naming guidelines: a singular, concise noun whose definition includes the unique characteristics of each instance, what instances are included and excluded, when an instance is created and deleted, and — for some entity types — when an instance changes into another entity type and what history is kept. An attribute is a property or characteristic of an entity of interest to the organization (relationships can also have attributes). Attribute naming guidelines (ten): singular noun, unique, standard format, similar-but-distinguishable names across entities, plus definitional requirements covering importance, included/excluded values, aliases, source of values and required/optional status, relationships with other attributes, and whether the value may change once provided. A candidate key uniquely identifies each instance of an entity type — a single attribute (e.g., Employee_ID) or a combination (Employee_Name plus Address, assuming no two employees share both). The candidate key selected as the unique characteristic for the entity type is called the identifier. Other attribute types: multivalued, repeating group, required, optional, composite, and derived."}, {"q": "Describe relationships in E-R modeling: definition, naming, degree, and cardinality.", "a": "A relationship is an association between the instances of one or more entity types — a linkage between entity instances, or an event has occurred. Naming guidelines: a verb phrase, not vague, with a definition explaining the action and its importance, clarifying with examples, explaining optional participation and restrictions, the history in the relationship, whether an instance can transfer participation to another relationship instance, and the reason for any explicit maximum cardinality. The degree is the number of entity types participating: unary (one entity type), binary (two), and ternary (a simultaneous relationship among three) are the most common. Cardinality is the number of instances of entity X that can be associated with each instance of entity Y; minimum cardinality is the minimum number of instances that may be associated, and maximum cardinality the maximum number."}, {"q": "Discuss the four types of business rules and the role of packaged data models.", "a": "Business rules are specifications that preserve the integrity of the logical data model. The four types: entity integrity — a unique identifier that is not null for each instance; referential integrity constraints — rules related to the relationships between entity types; domains — constraints on valid values for attributes; and triggering operations — rules that protect the validity of attribute values. Regarding packaged models: nowadays it is almost not necessary for an organization to internally develop its data model — the alternative is to purchase and customize a common database pattern. The advantages are low cost and development by industry specialists and expert database technology vendors. There are two types: universal data models, applicable to any business or organization, and industry-specific data models designed for a specific industry such as health care, banking, or education."}, {"q": "Explain class diagrams: classes, operations, associations, generalization, polymorphism, and aggregation versus composition.", "a": "A class diagram shows the static structure of an object-oriented model: the object classes, their internal structure, and their relationships. An object has state (its properties — attributes and relationships — and their values), behavior (how it acts and reacts), and identity; an object is a single occurrence of a class, and a class is a logical grouping of objects with the same or similar attributes, relationships, and behaviors. In UML a class is a rectangle with three compartments: name, attributes, operations; encapsulation hides internal implementation details from the external view. Operation types: constructor (creates a new instance), query (accesses state without altering it), update (alters state), and class-scope (applies to the class rather than an instance). An association is a named relationship shown as a solid line; the association role is the end where it connects to a class; degree may be unary, binary, ternary, or higher; multiplicity indicates how many objects participate. When an association has its own attributes/operations or relationships, it is modeled as an associative class (e.g., Registration). Stereotypes such as <<PK>> and <<Derived>> extend UML vocabulary for attributes. Generalization abstracts common features of subclasses into a superclass, drawn as a solid line with an arrow toward the superclass; a discriminator shows which property is abstracted; abstract classes have no direct instances while concrete classes do; semantic constraints are overlapping, disjoint, complete, and incomplete. Polymorphism means the same operation applies to two or more classes in different ways; an abstract operation defines form/protocol but not implementation; a method is the implementation of an operation; a class-scope attribute holds a value common to the whole class. Aggregation is a part-of relationship (hollow diamond at the aggregate end); composition (solid diamond) is stronger — parts belong to only one whole and live and die with it; multiplicity at the aggregate end may not exceed one, and deletion of the aggregate cascades to its components."}]}, {"id": 9, "title": "Design: Database Design Process", "optional": false, "slides": [{"t": "Database Design — Two Steps", "d": "The steps of designing databases and files are: (1) developing a logical database model and (2) developing a physical database design. The logical database model is concerned with describing data using a notation that corresponds to a data organization used by a DBMS such as SQL Server. Physical database design is concerned with prescribing the technical specifications for databases and computer files. Both logical and physical database designs can be conducted in parallel.", "svg": null}, {"t": "Four Steps of Logical Database Modeling", "d": "Database modeling and design activities start at the planning phase and continue to evolve during all phases of the SDLC; normalization is the process used to finalize the logical database during the design phase. The four main steps: (1) using the normalization process, develop a logical data model for each user interface; (2) combine normalized data from all user interfaces into one consolidated logical database model; (3) translate the conceptual E-R data model into normalized data requirements after considering user interfaces; (4) compare the logical database design with the translated E-R data model. The results of these steps are fed into the physical database design.", "svg": null}, {"t": "Physical Database Design Decisions", "d": "The main decisions in physical database design: (1) selecting a storage format (data type); (2) grouping attributes from the logical database model into physical records; (3) arranging related records in secondary memory; (4) increasing the efficiency of storing and accessing data by selecting the best media and structures.", "svg": null}, {"t": "Database Models and Relations", "d": "Different database models are the bases for database technologies: hierarchical model, network model, object-oriented database model, and relational database model. The relational model is used very often today for new information systems. A relation is a two-dimensional table of data; each relation consists of a set of columns and an arbitrary number of rows. Each column corresponds to an attribute of that relation; each row corresponds to a record that contains data values for an entity. Example: EMPLOYEE1(Emp_ID, Name, Dept, Salary).", "svg": null}, {"t": "Well-Structured Relations", "d": "A well-structured relation: (1) contains a minimum amount of redundancy, and (2) allows insertion, modification, and deletion of the rows in a relation without errors or inconsistencies.", "svg": null}, {"t": "Normalization and Relation Properties", "d": "Normalization defines the rules and a process for designing well-structured relations. Relation properties: (1) entries in cells should be simple (single value); (2) entries in any column should be from the same set of values; (3) each row is unique by preserving a non-empty primary key value; (4) the sequence of columns can be interchanged without changing the meaning or use of the relation; (5) the rows may be interchanged or stored in any sequence. Two common rules used: second normal form (2NF) and third normal form (3NF). Applying normalization assures that every nonprimary key attribute will depend upon only the whole primary key.", "svg": null}, {"t": "Functional Dependency", "d": "A functional dependency is a constraint between two attributes in which the value of one attribute is determined by the value of another attribute. Example: Emp_ID → Name means we can get the employee's name by knowing his/her ID (Name is functionally dependent on Emp_ID). An attribute can be functionally dependent on more than one attribute: in EMP COURSE(Emp_ID, Course, Date_Completed), Emp_ID, Course → Date_Completed — Date_Completed is functionally dependent on Emp_ID and Course together and cannot be determined by either of the two alone.", "svg": null}, {"t": "Second Normal Form (2NF)", "d": "A relation is in 2NF if every nonprimary key attribute is functionally dependent on the whole (not part of) primary key — known as full functional dependency. A relation is in 2NF if any of three conditions is achieved: (1) the primary key consists of only one attribute (e.g., Student_ID); (2) no nonprimary key attributes exist in the relation; (3) every nonprimary key attribute is functionally dependent on the full set of primary key attributes. Example NOT in 2NF: EMPLOYEE2(Emp_ID, Name, Dept, Salary, Course, Date_Completed) where Emp_ID → Name, Dept, Salary and Emp_ID, Course → Date_Completed. To convert to 2NF, decompose into EMPLOYEE1(Emp_ID, Name, Dept, Salary) and EMP COURSE(Emp_ID, Course, Date_Completed).", "svg": null}, {"t": "Third Normal Form (3NF)", "d": "A relation is in 3NF if: (1) the relation is in 2NF, and (2) there are no functional dependencies between more than one nonprimary key attributes (no transitive dependency). Example NOT in 3NF: SALES(Customer_ID, Customer_Name, Salesperson, Region) where Customer_ID → Customer_Name, Salesperson, Region and Salesperson → Region. SALES is in 2NF because the primary key (Customer_ID) is a single attribute. To convert to 3NF, decompose into SALES1(Customer_ID, Customer_Name, Salesperson) and SPERSON(Salesperson, Region).", "svg": null}, {"t": "Transforming E-R Diagrams into Relations — Four Steps", "d": "The E-R diagram must be transformed into relational notation, normalized, and merged with the existing normalized relations. Four main steps: (1) represent entities — make a relation for each entity type in the E-R diagram; (2) represent relationships — represent each relationship in the relational database design; (3) normalize the relations — remove redundancy that might appear during steps 1 and 2; (4) merge the relations — the bottom-up normalization of user views and the transformation of E-R diagrams into relation sets should be merged and renormalized.", "svg": null}, {"t": "Step 1: Represent Entities", "d": "Transform each entity type in an E-R diagram into a relation. The primary key of the relation is the identifier of the entity type; nonkey attributes of the entity type become nonkey attributes of the relation. The primary key should satisfy: (1) every row in the relation is uniquely identified by the value of the key, and (2) the key is nonredundant.", "svg": null}, {"t": "Step 2: Represent Relationships", "d": "Representing relationships depends on both: (1) the degree of the relationship, and (2) the cardinalities of the relationship. Step 3 (normalize the relations) applies the normalization rules and guidelines described earlier.", "svg": null}, {"t": "Step 4: Merge the Relations", "d": "Normalized relations likely have been created from different sources, such as separate E-R diagrams and various user interfaces, so some relations can be redundant and should be merged to remove the redundancy. Example: an E-R diagram yields the 3NF relation EMPLOYEE1(Emp_ID, Name, Address, Phone); modeling a user interface yields EMPLOYEE2(Emp_ID, Name, Address, Jobcode, Number_of_Years); merging the two gives EMPLOYEE(Emp_ID, Name, Address, Phone, Jobcode, Number_of_Years).", "svg": null}, {"t": "Physical Design — Information Needed", "d": "Important information needed for physical file and database design: normalized relations and volume estimates; definitions of attributes; descriptions of where and when data are processed; expectations or requirements for response time and data integrity; descriptions of the technologies used for implementing the files and database. A bottom-up approach is adopted to reviewing physical file and database design: designing fields, choosing data types, controlling data integrity, designing physical tables, arranging table rows, and designing controls for files.", "svg": null}, {"t": "Fields and Data Types", "d": "Fields are the smallest units of application data recognized by system software — e.g., a Student relation can have three fields: last name, first name, and middle initial. Data types are coding schemes recognized by system software for representing organizational data; the course shows the most common data types in Oracle 10g.", "svg": null}, {"t": "Data Integrity Controls and Physical Tables", "d": "Controlling data integrity is important to assure the accuracy of data for compliance with new local and international regulations. The main integrity control methods: (1) default value, (2) range control, (3) referential integrity, (4) null value control. A physical table is a named set of rows and columns that specifies the fields in each row of the table; it may or may not correspond to one relation. Goals of physical tables: (1) efficient use of secondary storage and (2) data processing speed.", "svg": null}, {"t": "Arranging Table Rows — File Objectives and Organizations", "d": "Operating systems arrange files differently; database designers should consider the objectives of each file: (1) fast data retrieval, (2) high throughput, (3) protection from failures, (4) protection from data loss, (5) security. The main file organization types: (1) sequential, (2) indexed, (3) hashed.", "svg": null}], "qs": [{"q": "What are the two steps of designing databases and files?", "opts": ["Developing a logical database model and developing a physical database design", "Drawing the context diagram and decomposing it into primitive DFD levels", "Collecting maintenance requests and transforming the requests into changes", "Building the master test plan and executing the unit and system tests"], "a": 0, "ex": "The steps are: (1) developing a logical database model, and (2) developing a physical database design.", "core": true, "sref": 0}, {"q": "What does the logical database model concern itself with?", "opts": ["Describing data using a notation that corresponds to a data organization used by a DBMS such as SQL Server", "Prescribing the detailed technical specifications for the databases and the physical computer files", "Selecting the storage media and structures that maximize access efficiency", "Grouping attributes into physical records arranged in secondary memory"], "a": 0, "ex": "Logical database model: describing data using a notation corresponding to a data organization used by a DBMS such as SQL Server.", "core": false, "sref": 0}, {"q": "What does physical database design concern itself with?", "opts": ["Prescribing the technical specifications for databases and computer files", "Describing data in a notation matching a DBMS data organization", "Capturing organizational data independent of any implementation", "Eliciting business rules from forms, reports, and computer displays"], "a": 0, "ex": "Physical database design: prescribing the technical specifications for databases and computer files.", "core": false, "sref": 0}, {"q": "Can logical and physical database design be conducted in parallel?", "opts": ["Yes — both can be conducted in parallel", "No — physical design must finish first", "No — logical design must be fully signed off", "Only when a packaged data model is used"], "a": 0, "ex": "Both logical and physical database designs can be conducted in parallel.", "core": false, "sref": 0}, {"q": "What process is used to finalize the logical database during the design phase?", "opts": ["Normalization", "Prototyping", "Decomposition", "Encapsulation"], "a": 0, "ex": "Normalization is the process used to finalize the logical database during the design phase.", "core": false, "sref": 1}, {"q": "What is the FIRST of the four main steps in logical database modeling and design?", "opts": ["Using normalization, develop a logical data model for each user interface", "Translate the conceptual E-R data model into normalized requirements", "Combine normalized data from all interfaces into one consolidated model", "Compare the logical database design with the translated E-R data model"], "a": 0, "ex": "Step 1: using the normalization process, develop a logical data model for each user interface.", "core": true, "sref": 1}, {"q": "In logical database modeling, what happens in step 2?", "opts": ["Normalized data from all user interfaces are combined into one consolidated logical database model", "The conceptual E-R model is translated into normalized data requir
