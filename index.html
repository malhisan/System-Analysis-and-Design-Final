ty can be delayed without delaying the project, computed as TL − TE (latest minus earliest expected completion time). In the SPTS example, the network runs 1→(2,3)→4→(5,6), 5→8, 6→7→8. The calculations give: Activity 1 TE=5/TL=5, 2: 11/11, 3: 11/11, 4: 13/13, 5: 18.5/21 (slack 2.5), 6: 18/18, 7: 21/21, 8: 22/22. All activities except Activity 5 (User Documentation) have zero slack and are on the critical path; the project's completion time is 22 weeks."}]}, {"id": 3, "title": "Planning: Project Identification", "optional": false, "slides": [{"t": "Planning Consists of Two Parts", "d": "Planning consists of (1) project identification and selection and (2) project initiation and planning. During project identification and selection, a senior manager identifies and assesses all possible systems development projects that an organizational unit could undertake.", "svg": null}, {"t": "Three Activities of Identification and Selection", "d": "Project identification and selection consists of three primary activities: (1) identifying potential development projects, (2) classifying and ranking IS development projects, and (3) selecting IS development projects.", "svg": null}, {"t": "Identifying Potential Development Projects", "d": "Projects are identified by both top-down and bottom-up initiatives. The formality of the process of identifying and selecting projects can vary substantially across organizations.", "svg": null}, {"t": "Classifying and Ranking IS Projects", "d": "The second major activity focuses on assessing the relative merit of potential projects, using value chain analysis or other evaluation criteria.", "svg": null}, {"t": "Value Chain Analysis", "d": "Analyzing an organization's activities to determine where value is added to products and/or services and the costs incurred for doing so; it usually also includes a comparison with the activities, added value, and costs of other organizations for the purpose of making improvements in the organization's operations and performance.", "svg": null}, {"t": "Selecting IS Development Projects and Multicriteria Analysis", "d": "The final activity is the actual selection of projects for further development, based on various factors. Multicriteria analysis is one method for deciding among different projects, or when considering alternative designs for a given system.", "svg": null}, {"t": "Deliverables, Outcomes, and Incremental Commitment", "d": "The primary deliverable from the first part of the planning phase is a schedule of specific IS development projects, coming from both top-down and bottom-up sources. Incremental commitment is a strategy in systems analysis and design in which the project is reviewed after each phase and continuation of the project is rejustified.", "svg": null}, {"t": "Why Improved Project Identification Is Needed", "d": "Factors: (1) the cost of information systems has risen steadily and approaches 40 percent of total expenses in some organizations; (2) many systems cannot handle applications that cross organizational boundaries; (3) many systems do not address the critical problems of the business as a whole or support strategic applications; (4) data redundancy is often out of control, and users may have little confidence in data quality; (5) systems maintenance costs are out of control as old, poorly planned systems must constantly be revised; (6) application backlogs often extend three years or more, and frustrated end users create or purchase their own systems, often creating redundant databases and incompatible systems.", "svg": null}, {"t": "Corporate Strategic Planning", "d": "An ongoing process that defines the mission, objectives, and strategies of an organization. Corporate strategic planning is a three-step process. Mission statement: a statement that makes it clear what business a company is in. Objective statements: a series of statements that express an organization's qualitative and quantitative goals for reaching a desired future position. Competitive strategy: the method by which an organization attempts to achieve its mission and objectives.", "svg": null}, {"t": "Information Systems Planning (ISP)", "d": "An orderly means of assessing the information needs of an organization and defining the systems, databases, and technologies that will best satisfy those needs. ISP must be done in accordance with the organization's mission, objectives, and competitive strategy. ISP is a top-down process that takes into account outside forces — industry, economic, relative size, geographic region, and so on — that are critical to the success of the firm. ISP is also a three-step process, aligned with strategic planning.", "svg": null}, {"t": "Top-Down vs. Bottom-Up IS Planning", "d": "Top-down planning attempts to gain a broad understanding of the information system needs of the entire organization. Bottom-up planning identifies IS development projects based on solving specific operational business problems or taking advantage of specific opportunities. The course also lists advantages of top-down planning and presents the functional decomposition of IS planning into functions, processes, and data entities.", "svg": null}, {"t": "Planning Matrices", "d": "Matrices relate organizational elements: Location-to-Function (which business functions are performed at various locations); Location-to-Unit (which units are located in or interact with a business location); Unit-to-Function (relationships between organizational entities and each function); Function-to-Objective (which functions are essential or desirable in achieving each objective); Function-to-Process (which processes are used to support each function); Function-to-Data Entity (which functions utilize which data entities); Process-to-Data Entity (which data are captured, used, updated, or deleted within each process); Process-to-Information System (which systems support each process); Data Entity-to-Information System (which data are created, updated, accessed, or deleted in each system); Information System-to-Objective (which systems support each business objective).", "svg": null}, {"t": "IS Plan Components", "d": "The course presents the components of an information systems plan as part of the ISP deliverables.", "svg": null}, {"t": "Electronic Commerce Concepts", "d": "Internet: a large worldwide network of networks that use a common protocol to communicate with each other. Internet of Things (IoT): a broad class of physical objects that feature an Internet address and connectivity that communicate between these objects and other Internet-enabled devices and systems. Electronic commerce (EC): Internet-based communication to support day-to-day government, business, and consumer activities.", "svg": null}, {"t": "EC Business Models", "d": "Business-to-Business (B2B), Business-to-Consumer (B2C), Consumer-to-Consumer (C2C), Consumer-to-Business (C2B), Business-to-Government (B2G), Government-to-Business (G2B), Government-to-Citizen (G2C), and Thing-to-Thing (T2T). The course also covers issues in designing and building Internet applications and 'the Internet of everything'.", "svg": null}], "qs": [{"q": "Planning consists of which two parts?", "opts": ["Project identification and selection, and project initiation and planning", "Requirements determination followed by requirements analysis and structuring", "Logical design and physical design", "Coding and testing"], "a": 0, "ex": "Planning consists of project identification and selection, plus project initiation and planning.", "core": false, "sref": 0}, {"q": "Who identifies and assesses all possible development projects during project identification and selection?", "opts": ["A senior manager", "A junior programmer", "An external auditor", "The database administrator"], "a": 0, "ex": "During project identification and selection, a senior manager identifies and assesses all possible systems development projects an organizational unit could undertake.", "core": false, "sref": 0}, {"q": "What are the three primary activities of project identification and selection?", "opts": ["Identifying potential projects, classifying and ranking projects, and selecting projects", "Initiating, executing, monitoring, and formally closing the development projects", "Budgeting, staffing, and scheduling project activities", "Coding, testing, and installing approved systems"], "a": 0, "ex": "The three activities are: identifying potential development projects, classifying and ranking IS development projects, and selecting IS development projects.", "core": true, "sref": 1}, {"q": "How are potential development projects identified?", "opts": ["By both top-down and bottom-up initiatives", "Only by the board of directors", "Only by end-user petitions", "Exclusively by outside consultants"], "a": 0, "ex": "Projects are identified by both top-down and bottom-up initiatives, with formality varying across organizations.", "core": false, "sref": 2}, {"q": "What does the second activity — classifying and ranking projects — focus on?", "opts": ["Assessing the relative merit of potential projects", "Hiring and onboarding the project team members", "Writing the project source code", "Converting data to the new system"], "a": 0, "ex": "Classifying and ranking focuses on assessing the relative merit of potential projects, using value chain analysis or other evaluation criteria.", "core": false, "sref": 3}, {"q": "What is value chain analysis?", "opts": ["Analyzing an organization's activities to determine where value is added to products/services and the costs incurred, usually with comparison to other organizations", "Calculating the present value of all future project cash flows using a chosen discount rate, then comparing the totals of benefits and costs over the system's life", "Tracing the flow of data between processes, stores, and external entities", "Ranking project risks by their probability and expected consequences"], "a": 0, "ex": "Value chain analysis determines where value is added and the costs incurred, usually including comparison with other organizations to improve operations and performance.", "core": true, "sref": 4}, {"q": "What is multicriteria analysis used for?", "opts": ["Deciding among different projects, or considering alternative designs for a given system", "Estimating each activity's duration from its optimistic, realistic, and pessimistic time values", "Detecting redundancy between normalized database relations", "Measuring the usability of forms and reports with end users"], "a": 0, "ex": "Multicriteria analysis is one method for deciding among different projects, or when considering alternative designs for a given system.", "core": true, "sref": 5}, {"q": "What is the primary deliverable from the first part of the planning phase?", "opts": ["A schedule of specific IS development projects, coming from both top-down and bottom-up sources", "A complete set of physical database design specifications ready for the implementation team", "A finished baseline of tested and documented source code", "A signed maintenance contract with an outside service firm"], "a": 0, "ex": "The primary deliverable is a schedule of specific IS development projects, from both top-down and bottom-up sources.", "core": true, "sref": 10}, {"q": "What is incremental commitment?", "opts": ["A strategy in which the project is reviewed after each phase and continuation of the project is rejustified", "A budgeting rule that automatically increases project funds by a fixed percentage rate every year", "A coding practice of committing small code changes very frequently", "A contract clause that locks the customer into multi-year support"], "a": 0, "ex": "Incremental commitment is a strategy in systems analysis and design in which the project is reviewed after each phase and continuation is rejustified.", "core": true, "sref": 6}, {"q": "Per the course, IS costs approach what share of total expenses in some organizations?", "opts": ["40 percent", "10 percent", "75 percent", "90 percent"], "a": 0, "ex": "The cost of information systems has risen steadily and approaches 40 percent of total expenses in some organizations.", "core": false, "sref": 7}, {"q": "Which factor shows the need for improved project identification and selection?", "opts": ["Application backlogs often extend three years or more, pushing frustrated end users to create or buy their own systems", "Modern systems always address the strategic problems of the whole business and never need replanning", "Data redundancy has been fully eliminated by recent technologies", "Maintenance costs have steadily fallen as systems have aged"], "a": 0, "ex": "Among the factors: backlogs extending three years or more, with frustrated users creating or purchasing their own systems, causing redundant databases and incompatible systems.", "core": false, "sref": 7}, {"q": "What is corporate strategic planning?", "opts": ["An ongoing process that defines the mission, objectives, and strategies of an organization", "A weekly status meeting where the developers report their coding progress to management", "An annual audit of hardware inventory and license compliance", "A one-time exercise to choose the company's first database"], "a": 0, "ex": "Corporate strategic planning is an ongoing process that defines the mission, objectives, and strategies of an organization — a three-step process.", "core": true, "sref": 8}, {"q": "What is a mission statement?", "opts": ["A statement that makes it clear what business a company is in", "A list of quantitative goals for a desired future position", "The method by which an organization achieves its objectives", "A form for requesting systems development work"], "a": 0, "ex": "A mission statement makes it clear what business a company is in.", "core": true, "sref": 8}, {"q": "What are objective statements?", "opts": ["A series of statements expressing an organization's qualitative and quantitative goals for reaching a desired future position", "A single concise sentence declaring what business the company is in and why the company exists for its customers", "The technical specifications for the organization's databases", "The procedures for reviewing deliverables in a walk-through"], "a": 0, "ex": "Objective statements express the organization's qualitative and quantitative goals for reaching a desired future position.", "core": true, "sref": 8}, {"q": "What is competitive strategy?", "opts": ["The method by which an organization attempts to achieve its mission and objectives", "The schedule of the IS development projects selected for the coming cycle", "The set of constraints on valid values for data attributes", "The ranking of vendors competing for an outsourcing contract"], "a": 0, "ex": "Competitive strategy is the method by which an organization attempts to achieve its mission and objectives.", "core": true, "sref": 5}, {"q": "What is information systems planning (ISP)?", "opts": ["An orderly means of assessing the information needs of an organization and defining the systems, databases, and technologies that will best satisfy those needs", "The activity of writing detailed program code for the projects chosen by the corporate steering committee during the most recent annual planning and budgeting round", "The process of physically installing servers in branch offices", "The technique of estimating task durations with three time values"], "a": 0, "ex": "ISP is an orderly means of assessing information needs and defining the systems, databases, and technologies that will best satisfy those needs.", "core": true, "sref": 9}, {"q": "How is ISP characterized in relation to outside forces?", "opts": ["A top-down process that takes into account industry, economic, relative size, geographic region, and other outside forces critical to the firm", "A bottom-up process driven exclusively by the operational complaints and requests gathered from individual departments of the firm", "A neutral process that deliberately ignores the external environment", "A vendor-led process governed by the largest software supplier"], "a": 0, "ex": "ISP is a top-down process taking into account outside forces — industry, economic, relative size, geographic region, and so on — critical to the success of the firm.", "core": false, "sref": 9}, {"q": "What does TOP-DOWN planning attempt to do?", "opts": ["Gain a broad understanding of the information system needs of the entire organization", "Solve specific operational business problems one department at a time", "Replace strategic planning with technical infrastructure decisions", "Delegate all project selection to individual end users"], "a": 0, "ex": "Top-down planning attempts to gain a broad understanding of the IS needs of the entire organization.", "core": false, "sref": 10}, {"q": "What characterizes BOTTOM-UP planning?", "opts": ["Identifying IS projects based on solving specific operational business problems or taking advantage of specific opportunities", "Starting from the corporate mission and objectives and deriving every individual system need directly from them", "Letting outside consultants dictate the project portfolio", "Selecting projects randomly to ensure fairness across units"], "a": 0, "ex": "Bottom-up planning identifies IS development projects based on solving specific operational business problems or exploiting specific opportunities.", "core": false, "sref": 10}, {"q": "Which matrix identifies which business functions are performed at various organizational locations?", "opts": ["Location-to-Function", "Unit-to-Function", "Function-to-Objective", "Process-to-Data Entity"], "a": 0, "ex": "The Location-to-Function matrix identifies which business functions are performed at various organizational locations.", "core": false, "sref": 11}, {"q": "Which matrix identifies which data are captured, used, updated, or deleted within each process?", "opts": ["Process-to-Data Entity", "Function-to-Data Entity", "Data Entity-to-Information System", "Location-to-Unit"], "a": 0, "ex": "The Process-to-Data Entity matrix identifies which data are captured, used, updated, or deleted within each process.", "core": false, "sref": 11}, {"q": "Which matrix identifies which information systems support each business objective?", "opts": ["Information System-to-Objective", "Function-to-Process", "Process-to-Information System", "Unit-to-Function"], "a": 0, "ex": "The Information System-to-Objective matrix identifies which information systems support each business objective as identified during organizational planning.", "core": false, "sref": 9}, {"q": "Which matrix identifies which business functions utilize which data entities?", "opts": ["Function-to-Data Entity", "Process-to-Data Entity", "Function-to-Process", "Data Entity-to-Information System"], "a": 0, "ex": "The Function-to-Data Entity matrix identifies which business functions utilize which data entities.", "core": false, "sref": 11}, {"q": "How does the course define the Internet?", "opts": ["A large worldwide network of networks that use a common protocol to communicate with each other", "A single centralized computer that hosts all of the world's websites and email services", "A private organizational network restricted to one building", "A wireless standard for connecting peripherals to one computer"], "a": 0, "ex": "The Internet is a large worldwide network of networks that use a common protocol to communicate with each other.", "core": false, "sref": 13}, {"q": "What is the Internet of Things (IoT)?", "opts": ["A broad class of physical objects featuring an Internet address and connectivity, communicating with other Internet-enabled devices and systems", "A class of commercial websites devoted to selling physical consumer goods over the public Internet with home delivery services", "A government registry of all networked computers worldwide", "A protocol used only for email exchange between businesses"], "a": 0, "ex": "IoT is a broad class of physical objects with an Internet address and connectivity that communicate between these objects and other Internet-enabled devices and systems.", "core": true, "sref": 13}, {"q": "What is electronic commerce (EC)?", "opts": ["Internet-based communication to support day-to-day government, business, and consumer activities", "Any payment made in physical cash at a traditional retail point of sale inside a store", "The exchange of paper documents between trading partners", "Software for managing warehouse inventory levels offline"], "a": 0, "ex": "Electronic commerce is Internet-based communication to support day-to-day government, business, and consumer activities.", "core": true, "sref": 13}, {"q": "In EC business models, what does C2C stand for?", "opts": ["Consumer-to-Consumer", "Company-to-Company", "Citizen-to-Country", "Cloud-to-Client"], "a": 0, "ex": "C2C is Consumer-to-Consumer, one of the listed EC business models alongside B2B, B2C, C2B, B2G, G2B, G2C, and T2T.", "core": false, "sref": 14}, {"q": "Which EC business model denotes communication between physical connected objects?", "opts": ["Thing-to-Thing (T2T)", "Business-to-Business (B2B)", "Government-to-Citizen (G2C)", "Consumer-to-Business (C2B)"], "a": 0, "ex": "T2T (Thing-to-Thing) is listed among the EC business models, reflecting the Internet of Things.", "core": false, "sref": 14}], "essays": [{"q": "Explain the three primary activities of project identification and selection.", "a": "First, identifying potential development projects: projects are identified by both top-down and bottom-up initiatives, and the formality of this process can vary substantially across organizations. Second, classifying and ranking IS development projects: this activity assesses the relative merit of potential projects using value chain analysis — analyzing the organization's activities to determine where value is added to products and/or services and the costs incurred, usually comparing with other organizations to improve operations and performance — or other evaluation criteria. Third, selecting IS development projects: the actual selection of projects for further development based on various factors; multicriteria analysis is one method for deciding among different projects or alternative designs for a given system. The primary deliverable is a schedule of specific IS development projects from both top-down and bottom-up sources, and incremental commitment means the project is reviewed after each phase with continuation rejustified."}, {"q": "Discuss the factors that make improved IS project identification and selection necessary.", "a": "The course lists six factors: (1) the cost of information systems has risen steadily and approaches 40 percent of total expenses in some organizations; (2) many systems cannot handle applications that cross organizational boundaries; (3) many systems do not address the critical problems of the business as a whole or support strategic applications; (4) data redundancy is often out of control, and users may have little confidence in the quality of data; (5) systems maintenance costs are out of control as old, poorly planned systems must constantly be revised; (6) application backlogs often extend three years or more, and frustrated end users are forced to create or purchase their own systems, often creating redundant databases and incompatible systems in the process."}, {"q": "Describe corporate strategic planning and its relationship to information systems planning.", "a": "Corporate strategic planning is an ongoing, three-step process that defines the mission, objectives, and strategies of an organization. The mission statement makes clear what business a company is in; objective statements are a series of statements expressing the organization's qualitative and quantitative goals for reaching a desired future position; competitive strategy is the method by which the organization attempts to achieve its mission and objectives. Information systems planning (ISP) is an orderly means of assessing the information needs of the organization and defining the systems, databases, and technologies that will best satisfy those needs. ISP must be done in accordance with the organization's mission, objectives, and competitive strategy, and it is a top-down process that takes into account outside forces — industry, economic, relative size, geographic region, and so on — that are critical to the firm's success. ISP, like strategic planning, is a three-step process."}, {"q": "Compare top-down and bottom-up approaches to IS planning.", "a": "Top-down planning attempts to gain a broad understanding of the information system needs of the entire organization; the course also lists specific advantages of the top-down approach and supports it with functional decomposition of IS planning into functions, processes, and data entities, related through planning matrices (e.g., Location-to-Function, Function-to-Data Entity, Process-to-Data Entity, Information System-to-Objective). Bottom-up planning instead identifies IS development projects based on solving specific operational business problems or taking advantage of specific opportunities. In project identification, both directions operate: projects are identified through both top-down and bottom-up initiatives, and the planning deliverable — the schedule of IS development projects — draws from both sources."}, {"q": "Describe the electronic commerce concepts and business models presented in the course.", "a": "The Internet is a large worldwide network of networks using a common protocol to communicate. The Internet of Things (IoT) is a broad class of physical objects featuring an Internet address and connectivity that communicate between these objects and other Internet-enabled devices and systems. Electronic commerce (EC) is Internet-based communication supporting day-to-day government, business, and consumer activities. The EC business models listed are: Business-to-Business (B2B), Business-to-Consumer (B2C), Consumer-to-Consumer (C2C), Consumer-to-Business (C2B), Business-to-Government (B2G), Government-to-Business (G2B), Government-to-Citizen (G2C), and Thing-to-Thing (T2T). The module also addresses issues in designing and building Internet applications and the broader 'Internet of everything'."}]}, {"id": 4, "title": "Planning: Project Initiation", "optional": false, "slides": [{"t": "Project Initiation and Planning (PIP)", "d": "A key consideration when conducting project initiation and planning is deciding when PIP ends and when analysis, the next phase of the SDLC, begins. Key questions: How much effort should be expended on the PIP process? Who is responsible for performing it? Why is project initiation and planning such a challenging activity?", "svg": null}, {"t": "Project Initiation Tasks", "d": "Establish: the initiation team, a relationship with the customer, the project initiation plan, management procedures, the project management environment, and the project workbook.", "svg": null}, {"t": "Project Planning Tasks", "d": "Describe project scope, alternatives, and feasibility; divide the project into tasks; estimate resource requirements and create a resource plan; develop a preliminary schedule; develop a communication plan; determine standards and procedures; identify and assess risk; create a preliminary budget; develop a statement of work; set the baseline project plan.", "svg": null}, {"t": "Deliverables: Business Case, BPP, PSS", "d": "Business case: the justification for an information system, presented in terms of the tangible and intangible economic benefits and costs, and the technical and organizational feasibility of the proposed system. Baseline Project Plan (BPP): a major outcome and deliverable from PIP containing the best estimate of a project's scope, benefits, costs, risks, and resource requirements. Project Scope Statement (PSS): a document prepared for the customer describing what the project will deliver and outlining generally, at a high level, all work required to complete the project.", "svg": null}, {"t": "Six Feasibility Categories", "d": "Project feasibility is assessed across: economic feasibility, technical feasibility, operational feasibility, schedule feasibility, legal and contractual feasibility, and political feasibility.", "svg": null}, {"t": "Economic Feasibility / Cost–Benefit Analysis", "d": "Economic feasibility is a process of identifying the financial benefits and costs associated with a development project; it is often referred to as cost–benefit analysis — identifying all the financial benefits and costs associated with a project. Key distinctions: tangible vs. intangible benefits, tangible vs. intangible costs, and one-time vs. recurring costs.", "svg": null}, {"t": "Tangible Benefits", "d": "A tangible benefit is a benefit derived from the creation of an information system that can be measured in dollars and with certainty. Most tangible benefits fit categories: cost reduction and avoidance; error reduction; increased flexibility; increased speed of activity; improvement of management planning and control; opening new markets and increasing sales opportunities. Pine Valley Customer Tracking System worksheet (Year 1–5): cost reduction or avoidance $45,000; error reduction $25,000; increased flexibility $75,000; increased speed of activity $105,000; improvement in management planning or control $250,000; other $0 — TOTAL tangible benefits $500,000.", "svg": null}, {"t": "Project Costs — Definitions", "d": "Tangible cost: a cost associated with an information system that can be measured in dollars and with certainty. Intangible cost: a cost that cannot be easily measured in terms of dollars or with certainty. Total cost of ownership (TCO): the cost of owning and operating a system, including the total cost of acquisition as well as all costs associated with its ongoing use and maintenance. One-time cost: a cost associated with project start-up and development, or system start-up. Recurring cost: a cost resulting from the ongoing evolution and use of a system.", "svg": null}, {"t": "Pine Valley Cost Worksheets", "d": "One-time costs (Year 0): development $400,000; new hardware $15,000; new packaged applications software $5,000; user training $5,000; site preparation $0 — TOTAL one-time costs $425,000. Recurring costs (Years 1–5): application software maintenance $280,000; incremental data storage (20 GB × $50/GB) $1,000; incremental communications $2,000; new software/hardware leases $0; supplies $2,000 — TOTAL recurring costs $285,000. The course also gives guidelines for better cost estimating.", "svg": null}, {"t": "Financial Measurements: NPV, ROI, BEA", "d": "Net Present Value (NPV): uses a discount rate to determine the present value of cash outlays and receipts — PVn is the present value of Y dollars n years from now based on a discount rate i; NPV is the sum of PVs across years (calculates the time value of money). Return on Investment (ROI): the ratio of cash receipts to cash outlays. Break-Even Analysis (BEA): the amount of time required for cumulative cash flow to equal initial and ongoing investment — its objective is to discover at what point (if ever) benefits equal costs.", "svg": null}, {"t": "NPV Worked Example (Pine Valley)", "d": "Pine Valley WebStore economic feasibility (12% discount rate): yearly net economic benefit $500,000 for years 1–5; discount factors 1.0000, 0.8929, 0.7972, 0.7118, 0.6355, 0.5674; NPV of all benefits = $1,802,388. One-time costs $(425,000); recurring costs $(285,000)/yr; NPV of all costs = $(1,452,361). Overall NPV = $350,027; Overall ROI = 0.24. Break-even occurs between years 2 and 3 — using the first year of positive cash flow: ((153,033 − 91,394) / 153,033) = .402, so actual break-even occurred at 2.4 years.", "svg": null}, {"t": "Technical Feasibility and Risk", "d": "Technical feasibility is a process of assessing the development organization's ability to construct a proposed system; it takes into account various project risk factors. Potential consequences of not assessing and managing risks: failure to attain expected benefits; inaccurate cost estimates; inaccurate duration estimates; failure to achieve adequate system performance; failure to adequately integrate the new system with existing hardware, software, or organizational procedures.", "svg": null}, {"t": "Risk: Structure, Size, and Familiarity", "d": "Project risk depends on project structure, project size, and familiarity with the application area. With HIGH familiarity with technology/application: large project + low structure = (1) low risk (very susceptible to mismanagement); large + high structure = (2) low risk; small + low structure = (3) very low risk (very susceptible to mismanagement); small + high structure = (4) very low risk. With LOW familiarity: large + low structure = (5) very high risk; large + high structure = (6) medium risk; small + low structure = (7) high risk; small + high structure = (8) medium-low risk.", "svg": "risk_matrix"}, {"t": "Other Feasibility Concerns", "d": "Operational feasibility: assessing the degree to which a proposed system solves business problems or takes advantage of business opportunities. Schedule feasibility: assessing the degree to which the potential time frame and completion dates for all major activities within a project meet organizational deadlines and constraints for affecting change. Legal and contractual feasibility: assessing potential legal and contractual ramifications due to the construction of a system. Political feasibility: evaluating how key stakeholders within the organization view the proposed system.", "svg": null}, {"t": "Baseline Project Plan — Structure", "d": "All the information collected during project initiation and planning is organized into the Baseline Project Plan. Its four sections: (1) Introduction, (2) System description, (3) Feasibility assessment, (4) Management issues.", "svg": null}, {"t": "Project Scope Statement — Structure", "d": "The PSS sections: (1) Problem statement, (2) Project objectives, (3) Project description, (4) Business benefits, (5) Deliverables, (6) Expected duration.", "svg": null}, {"t": "Diagram Depiction of Project Scope", "d": "Project scope can be depicted in a diagram showing: organizational units affected by the new system; current systems that will interact with or change because of the new system; people who are affected by the new system; the range of potential system capabilities. The course example is a context-level data flow diagram showing project scope for the Purchasing Fulfillment System (Pine Valley Furniture), and a task responsibility matrix.", "svg": null}, {"t": "Reviewing the BPP — Walk-throughs", "d": "A walk-through is a peer group review of any product created during the systems development process; also called a structured walk-through. Roles: coordinator, presenter, user, secretary, standard-bearer, and maintenance oracle. Walk-throughs can be applied to the BPP, system specifications, logical and physical designs, program code, test procedures, and manuals and documentation. The course shows a walk-through review form (Pine Valley Furniture).", "svg": null}], "qs": [{"q": "What is a key consideration when conducting project initiation and planning (PIP)?", "opts": ["Deciding when PIP ends and when analysis, the next SDLC phase, begins", "Choosing which programming language the developers will use", "Selecting the physical location of the database servers", "Determining the format of end-user training manuals"], "a": 0, "ex": "A key consideration in PIP is deciding when PIP ends and when analysis, the next phase of the SDLC, begins.", "core": true, "sref": 0}, {"q": "What is a business case?", "opts": ["The justification for an information system, presented in terms of tangible and intangible economic benefits and costs, and technical and organizational feasibility", "A summary of the program code modules together with their unit and integration test results, prepared for management review at the end of the implementation phase", "A legal filing required before any project can be registered", "A diagram of the data flows between system processes"], "a": 0, "ex": "The business case is the justification for an information system in terms of tangible/intangible benefits and costs and the technical and organizational feasibility of the proposed system.", "core": true, "sref": 3}, {"q": "What is the Baseline Project Plan (BPP)?", "opts": ["A major PIP deliverable containing the best estimate of a project's scope, benefits, costs, risks, and resource requirements", "A customer-facing one-page summary of the project's high-level deliverables and the general work outline", "A weekly report of programmer hours spent on each module", "The list of approved maintenance requests for an old system"], "a": 0, "ex": "The BPP is a major outcome and deliverable from project initiation and planning containing the best estimate of scope, benefits, costs, risks, and resource requirements.", "core": true, "sref": 3}, {"q": "What is the Project Scope Statement (PSS)?", "opts": ["A document prepared for the customer describing what the project will deliver and outlining at a high level all work required", "An internal log of all configuration changes made to the baseline source code modules during the project", "A matrix mapping each business location to its functions", "A statistical analysis of the system's expected response times"], "a": 0, "ex": "The PSS is a document prepared for the customer that describes what the project will deliver and outlines generally, at a high level, all work required to complete the project.", "core": true, "sref": 3}, {"q": "Which list contains the six feasibility categories from the course?", "opts": ["Economic, technical, operational, schedule, legal and contractual, political", "Financial, structural, behavioral, temporal, statutory, cultural", "Strategic, tactical, operational, managerial, technical, social", "Internal, external, vendor, customer, regulatory, environmental"], "a": 0, "ex": "Feasibility is assessed as economic, technical, operational, schedule, legal and contractual, and political.", "core": true, "sref": 4}, {"q": "Economic feasibility is often referred to as what?", "opts": ["Cost–benefit analysis", "Value chain analysis", "Multicriteria analysis", "Gap analysis"], "a": 0, "ex": "Economic feasibility — identifying financial benefits and costs of a project — is often referred to as cost–benefit analysis.", "core": false, "sref": 5}, {"q": "What is a tangible benefit?", "opts": ["A benefit derived from creating an information system that can be measured in dollars and with certainty", "A benefit that improves employee morale and goodwill but resists measurement in dollar terms", "Any benefit that occurs more than one year after installation", "A benefit promised by the vendor in marketing materials"], "a": 0, "ex": "A tangible benefit can be measured in dollars and with certainty.", "core": true, "sref": 6}, {"q": "Which of the following is among the stated categories of tangible benefits?", "opts": ["Error reduction", "Improved corporate reputation", "Higher employee satisfaction", "Better community relations"], "a": 0, "ex": "Tangible benefit categories: cost reduction and avoidance, error reduction, increased flexibility, increased speed of activity, improvement of management planning and control, and opening new markets/increasing sales opportunities.", "core": false, "sref": 6}, {"q": "In the Pine Valley tangible benefits worksheet, the TOTAL tangible benefits per year equal what?", "opts": ["$500,000", "$425,000", "$285,000", "$350,027"], "a": 0, "ex": "The worksheet totals $500,000: 45,000 + 25,000 + 75,000 + 105,000 + 250,000 + 0.", "core": false, "sref": 6}, {"q": "In the Pine Valley tangible benefits worksheet, what amount is assigned to 'improvement in management planning or control'?", "opts": ["$250,000", "$105,000", "$75,000", "$45,000"], "a": 0, "ex": "Improvement in management planning or control is $250,000 — the largest single benefit category.", "core": false, "sref": 6}, {"q": "What is an intangible cost?", "opts": ["A cost associated with an information system that cannot be easily measured in terms of dollars or with certainty", "A cost incurred exactly once at project start-up, such as development or site preparation work", "Any cost paid to an external outsourcing vendor", "A cost that recurs every year of system operation"], "a": 0, "ex": "An intangible cost cannot be easily measured in dollars or with certainty.", "core": true, "sref": 7}, {"q": "What is total cost of ownership (TCO)?", "opts": ["The cost of owning and operating a system, including total acquisition cost and all costs of ongoing use and maintenance", "The cost of the hardware alone, excluding all software licenses, labor, and ongoing support charges", "The price the vendor charges for the initial license only", "The penalty paid when a project misses its scheduled deadline"], "a": 0, "ex": "TCO includes the total cost of acquisition as well as all costs associated with ongoing use and maintenance.", "core": true, "sref": 7}, {"q": "What distinguishes a one-time cost from a recurring cost?", "opts": ["A one-time cost is associated with project start-up and development or system start-up; a recurring cost results from the ongoing evolution and use of a system", "A one-time cost is always intangible and uncertain; a recurring cost is always tangible and measured in dollars with certainty year after year", "A one-time cost happens after installation; a recurring cost before", "A one-time cost is paid by users; a recurring cost by managers"], "a": 0, "ex": "One-time costs relate to start-up and development; recurring costs result from ongoing evolution and use of the system.", "core": false, "sref": 7}, {"q": "In the Pine Valley one-time costs worksheet, the development costs equal what?", "opts": ["$400,000", "$15,000", "$5,000", "$425,000"], "a": 0, "ex": "Development costs are $400,000; with hardware $15,000, packaged software $5,000, and training $5,000, the total is $425,000.", "core": false, "sref": 8}, {"q": "In the Pine Valley worksheets, the TOTAL one-time costs and TOTAL recurring costs are, respectively:", "opts": ["$425,000 and $285,000", "$285,000 and $425,000", "$400,000 and $280,000", "$500,000 and $350,027"], "a": 0, "ex": "Total one-time costs are $425,000 (Year 0); total recurring costs are $285,000 (Years 1–5).", "core": false, "sref": 8}, {"q": "In the Pine Valley recurring costs worksheet, the incremental data storage line assumes what?", "opts": ["20 GB at an estimated cost of $50 per GB, totaling $1,000", "50 GB at an estimated cost of $20 per GB, totaling $1,000", "10 GB at $100 per GB, totaling $1,000", "200 GB at $5 per GB, totaling $1,000"], "a": 0, "ex": "Incremental data storage required: 20 GB × $50 (estimated cost/GB = $50) = $1,000.", "core": false, "sref": 8}, {"q": "What does Net Present Value (NPV) use to determine the present value of cash outlays and receipts?", "opts": ["A discount rate", "A break-even fraction", "A risk multiplier", "A slack coefficient"], "a": 0, "ex": "NPV uses a discount rate to determine the present value of cash outlays and receipts, calculating the time value of money.", "core": false, "sref": 9}, {"q": "How is Return on Investment (ROI) defined in the course?", "opts": ["The ratio of cash receipts to cash outlays", "The sum of present values across all years", "The time until cumulative cash flow equals investment", "The discount rate applied to future benefits"], "a": 0, "ex": "ROI is the ratio of cash receipts to cash outlays.", "core": false, "sref": 9}, {"q": "What is the objective of break-even analysis?", "opts": ["To discover at what point (if ever) benefits equal costs", "To compute the ratio of receipts to outlays", "To rank projects by their strategic importance", "To estimate the standard deviation of task durations"], "a": 0, "ex": "Break-even analysis is a cost–benefit analysis to identify at what point (if ever) benefits equal costs — when breakeven occurs.", "core": true, "sref": 5}, {"q": "In the Pine Valley NPV example, what is the overall NPV of the project?", "opts": ["$350,027", "$1,802,388", "$(1,452,361)", "$500,000"], "a": 0, "ex": "Overall NPV = $350,027 (NPV of benefits $1,802,388 less NPV of all costs $1,452,361).", "core": false, "sref": 10}, {"q": "In the Pine Valley NPV example, what is the overall ROI?", "opts": ["0.24", "0.40", "1.24", "2.4"], "a": 0, "ex": "Overall ROI = Overall NPV / NPV of all costs = 0.24.", "core": false, "sref": 10}, {"q": "In the Pine Valley NPV example, when did actual break-even occur?", "opts": ["At 2.4 years, between years 2 and 3", "At 4.2 years, between years 4 and 5", "At exactly 3 years", "At 1.2 years, during the first year"], "a": 0, "ex": "Break-even occurs between years 2 and 3; using the first year of positive cash flow, ((153,033 − 91,394)/153,033) = .402, so break-even occurred at 2.4 years.", "core": false, "sref": 10}, {"q": "In the Pine Valley NPV example, what discount rate was used?", "opts": ["12%", "10%", "8%", "15%"], "a": 0, "ex": "The example uses a 12% discount rate with factors 0.8929, 0.7972, 0.7118, 0.6355, 0.5674 for years 1–5.", "core": false, "sref": 10}, {"q": "What is technical feasibility?", "opts": ["A process of assessing the development organization's ability to construct a proposed system", "A process of assessing how key stakeholders within the organization view the proposed system", "A process of assessing whether deadlines meet organizational constraints", "A process of identifying financial benefits and costs of the project"], "a": 0, "ex": "Technical feasibility assesses the development organization's ability to construct the proposed system, taking into account project risk factors.", "core": true, "sref": 11}, {"q": "Which is a stated potential consequence of NOT assessing and managing project risks?", "opts": ["Failure to adequately integrate the new system with existing hardware, software, or organizational procedures", "An automatic increase in the project's tangible benefits beyond the original worksheet estimates", "A guaranteed extension of the project's legal warranty", "Reduced need for user training during installation"], "a": 0, "ex": "Consequences include failure to attain expected benefits, inaccurate cost and duration estimates, inadequate performance, and failure to integrate with existing hardware, software, or procedures.", "core": false, "sref": 11}, {"q": "In the risk framework, project risk depends on which three factors?", "opts": ["Project structure, project size, and familiarity with the technology or application area", "Budget size, team experience, and the patience of the customer organization", "Programming language, database vendor, and network speed", "Number of modules, lines of code, and defect density"], "a": 0, "ex": "Risk is shaped by the degree of project structure, project size, and familiarity with the technology or application area.", "core": true, "sref": 12}, {"q": "Per the risk matrix, a LARGE project with LOW structure and LOW familiarity with the technology has what risk?", "opts": ["Very high risk", "Very low risk", "Medium-low risk", "Low risk"], "a": 0, "ex": "Low familiarity + large project + low structure = cell (5): very high risk.", "core": false, "sref": 12}, {"q": "Per the risk matrix, a SMALL project with HIGH structure and HIGH familiarity has what risk?", "opts": ["Very low risk", "High risk", "Medium risk", "Very high risk"], "a": 0, "ex": "High familiarity + small project + high structure = cell (4): very low risk.", "core": false, "sref": 12}, {"q": "Per the risk matrix, a SMALL project with LOW structure and LOW familiarity has what risk?", "opts": ["High risk", "Medium risk", "Very low risk", "Low risk"], "a": 0, "ex": "Low familiarity + small project + low structure = cell (7): high risk.", "core": false, "sref": 12}, {"q": "In the risk matrix, which cells are marked 'very susceptible to mismanagement'?", "opts": ["The high-familiarity, LOW-structure cells (both large and small projects)", "The low-familiarity, high-structure cells only, for both project sizes", "All large-project cells regardless of familiarity", "Only the medium-risk cells of the matrix"], "a": 0, "ex": "Cells (1) and (3) — high familiarity with low structure — are low/very low risk but noted as very susceptible to mismanagement.", "core": false, "sref": 12}, {"q": "What is operational feasibility?", "opts": ["Assessing the degree to which a proposed system solves business problems or takes advantage of business opportunities", "Assessing whether the project's deadlines and completion dates meet the organizational constraints", "Assessing the legal ramifications of constructing the system", "Assessing the organization's ability to construct the system"], "a": 0, "ex": "Operational feasibility assesses the degree to which a proposed system solves business problems or takes advantage of business opportunities.", "core": true, "sref": 13}, {"q": "What is schedule feasibility?", "opts": ["Assessing the degree to which the potential time frame and completion dates for all major activities meet organizational deadlines and constraints for affecting change", "Assessing how the key stakeholders within the organization view the proposed system and whether they will support its construction and adoption across departments", "Assessing whether benefits will ever equal the project's costs", "Assessing the maintainability of the delivered source code"], "a": 0, "ex": "Schedule feasibility assesses whether the time frame and completion dates for major activities meet organizational deadlines and constraints for affecting change.", "core": true, "sref": 13}, {"q": "What is political feasibility?", "opts": ["Evaluating how key stakeholders within the organization view the proposed system", "Evaluating the system's compliance with national election and campaign regulations", "Evaluating the system's ability to run on government hardware", "Evaluating the discount rate set by fiscal policy"], "a": 0, "ex": "Political feasibility is the process of evaluating how key stakeholders within the organization view the proposed system.", "core": true, "sref": 13}, {"q": "What are the four sections of the Baseline Project Plan?", "opts": ["Introduction, system description, feasibility assessment, management issues", "Problem statement, objectives, description, business benefits", "Scope, schedule, budget, and risk register", "Mission, objectives, strategy, and competitive analysis"], "a": 0, "ex": "The BPP sections are: (1) Introduction, (2) System description, (3) Feasibility assessment, (4) Management issues.", "core": true, "sref": 14}, {"q": "Which of the following is a section of the Project Scope Statement?", "opts": ["Expected duration", "Feasibility assessment", "Management issues", "System test plan"], "a": 0, "ex": "PSS sections: problem statement, project objectives, project description, business benefits, deliverables, and expected duration.", "core": false, "sref": 15}, {"q": "What does the diagram depiction of project scope show?", "opts": ["Organizational units affected, current systems that will interact or change, people affected, and the range of potential system capabilities", "The salary grades and reporting hierarchy of the project team members assigned to each of the planned activities", "The database tables and their primary and foreign keys", "The physical layout of network cables in the building"], "a": 0, "ex": "Project scope diagrams show affected organizational units, interacting/changing current systems, affected people, and the range of potential system capabilities — illustrated by a context-level DFD for Pine Valley's Purchasing Fulfillment System.", "core": false, "sref": 16}, {"q": "What is a walk-through?", "opts": ["A peer group review of any product created during the systems development process", "A scripted demonstration of the finished system delivered to customers at the end of the project", "A physical tour of the data center for new project members", "An automated test that executes the code line by line"], "a": 0, "ex": "A walk-through (structured walk-through) is a peer group review of any product created during the systems development process.", "core": true, "sref": 17}, {"q": "Which of the following lists walk-through roles from the course?", "opts": ["Coordinator, presenter, user, secretary, standard-bearer, maintenance oracle", "Sponsor, scribe, facilitator, time-keeper, devil's advocate, juror", "Owner, builder, tester, deployer, trainer, supporter", "Chair, vice-chair, treasurer, auditor, archivist, observer"], "a": 0, "ex": "Walk-through roles: coordinator, presenter, user, secretary, standard-bearer, and maintenance oracle.", "core": false, "sref": 17}, {"q": "To which products can walk-throughs be applied?", "opts": ["The BPP, system specifications, logical and physical designs, program code, test procedures, manuals and documentation", "Only the final compiled executable of the system and its installation packages", "Only the customer contracts, legal agreements, and the signed scope statements of the project", "Only the Gantt charts and the network diagrams produced during the planning phase of the project"], "a": 0, "ex": "Walk-throughs can be applied to the BPP, system specifications, logical and physical designs, program code, test procedures, and manuals and documentation.", "core": false, "sref": 17}], "essays": [{"q": "Discuss the six categories of project feasibility, explaining what each assesses.", "a": "Economic feasibility identifies the financial benefits and costs associated with the project and is often called cost–benefit analysis; it distinguishes tangible from intangible benefits and costs, and one-time from recurring costs, and uses financial measures such as NPV, ROI, and break-even analysis. Technical feasibility assesses the development organization's ability to construct the proposed system, taking into account project risk factors such as project size, structure, and the group's familiarity with the technology or application area. Operational feasibility assesses the degree to which the proposed system solves business problems or takes advantage of business opportunities. Schedule feasibility assesses the degree to which the potential time frame and completion dates for all major activities meet organizational deadlines and constraints for affecting change. Legal and contractual feasibility assesses potential legal and contractual ramifications of constructing the system. Political feasibility evaluates how key stakeholders within the organization view the proposed system."}, {"q": "Explain the financial measurements used to assess economic feasibility, using the Pine Valley example numbers.", "a": "Three measures are used. Net Present Value (NPV) uses a discount rate to determine the present value of cash outlays and receipts: PVn is the present value of Y dollars n years from now at discount rate i, and NPV is the sum of PVs across years, capturing the time value of money. Return on Investment (ROI) is the ratio of cash receipts to cash outlays. Break-Even Analysis (BEA) finds the amount of time required for cumulative cash flow to equal the initial and ongoing investment — discovering at what point, if ever, benefits equal costs. In the Pine Valley example at a 12% discount rate, yearly net economic benefits of $500,000 give an NPV of all benefits of $1,802,388; one-time costs of $425,000 plus recurring costs of $285,000 per year give an NPV of all costs of $1,452,361. Overall NPV = $350,027 and overall ROI = 0.24. Break-even occurs between years 2 and 3: using the first year of positive cumulative cash flow, ((153,033 − 91,394)/153,033) = .402, so actual break-even occurred at 2.4 years."}, {"q": "Describe how project structure, project size, and familiarity with the application area affect implementation risk.", "a": "The course presents an eight-cell framework. With high familiarity with the technology or application area: a large project with low structure is (1) low risk but very susceptible to mismanagement; a large project with high structure is (2) low risk; a small project with low structure is (3) very low risk (very susceptible to mismanagement); a small project with high structure is (4) very low risk. With low familiarity: a large project with low structure is (5) very high risk; a large project with high structure is (6) medium risk; a small project with low structure is (7) high risk; and a small project with high structure is (8) medium-low risk. In general, risk rises with low familiarity, larger size, and lower structure — the worst combination being a large, low-structure project in an unfamiliar area."}, {"q": "Compare the Baseline Project Plan and the Project Scope Statement as PIP deliverables.", "a": "Both organize the information collected during project initiation and planning. The Baseline Project Plan (BPP) is a major outcome and deliverable of PIP that contains the best estimate of a project's scope, benefits, costs, risks, and resource requirements; it is structured into four sections — introduction, system description, feasibility assessment, and management issues — and it is the product reviewed in a structured walk-through before proceeding. The Project Scope Statement (PSS) is a document prepared for the customer that describes what the project will deliver and outlines generally, at a high level, all work required to complete the project; its sections are the problem statement, project objectives, project description, business benefits, deliverables, and expected duration. The business case — justification in terms of tangible and intangible benefits and costs and technical/organizational feasibility — accompanies these deliverables."}, {"q": "Explain the structured walk-through: its purpose, roles, and the products it can review.", "a": "A walk-through, also called a structured walk-through, is a peer group review of any product created during the systems development process; it is the mechanism for reviewing the Baseline Project Plan before committing further. The defined roles are coordinator, presenter, user, secretary, standard-bearer, and maintenance oracle. Walk-throughs can be applied to a wide range of products: the Baseline Project Plan itself, system specifications, logical and physical designs, program code, test procedures, and manuals and documentation. The course illustrates this with the Pine Valley Furniture walk-through review form."}]}, {"id": 5, "title": "Analysis: Requirements Determination", "optional": false, "slides": [{"t": "Requirements Determination", "d": "During requirements determination, you and other analysts gather information on what the system should do from as many sources as possible: from users of the current system, from observing users, and from reports, forms, and procedures.", "svg": null}, {"t": "Characteristics of the Process", "d": "Five qualities the analyst needs: Impertinence — you should question everything. Impartiality — your role is to find the best solution to a business problem or opportunity. Relaxing constraints — assume that anything is possible and eliminate the infeasible. Attention to details — every fact must fit with every other fact. Reframing — analysis is, in part, a creative process.", "svg": null}, {"t": "Deliverables and Outcomes", "d": "From interviews and observations: interview transcripts, observation notes, meeting minutes. From existing written documents: mission and strategy statements, business forms, procedure manuals, job descriptions, training manuals, system documentation, flowcharts. From computerized sources: JAD session results, CASE repositories, system prototype displays and reports.", "svg": null}, {"t": "Traditional Methods Overview", "d": "Four traditional methods: interviewing individuals informed about the operation and issues of the current and future systems; interviewing groups of people with diverse needs to find synergies and contrasts among requirements; observing workers at selected times to see how data are handled and what information people need; studying business documents to discover reported issues, policies, rules, and concrete examples of data use.", "svg": null}, {"t": "Interviewing and Listening", "d": "A dialogue with a user or manager to obtain their requirements. Two question forms: open-ended (conversational, no specific answers in mind — e.g., 'What would you say is the best thing about the information system you currently use?') and closed-ended (structured, a limited range of possible answers — e.g., pick one of: easy access to all data, response time, remote access). Guidelines for effective interviewing: plan the interview (prepare the interviewee with an appointment and priming questions; prepare agenda, checklist, questions); listen carefully and take notes (tape record if permitted); review notes within 48 hours; be neutral; seek diverse views.", "svg": null}, {"t": "Interview Guide", "d": "A document for developing, planning, and conducting an interview. Each question in an interview guide can include both verbal and non-verbal information.", "svg": null}, {"t": "Individual vs. Group Interviews", "d": "Individual interviews (one person at a time): pros — easier to schedule than group interviews; cons — contradictions and inconsistencies between interviewees, and follow-up discussions are time-consuming. Group interviews (several key people together; with multiple interviewers one may ask questions while another takes notes): advantages — more effective use of time, can hear agreements and disagreements at once, opportunity for synergies; disadvantage — more difficult to schedule than individual interviews.", "svg": null}, {"t": "Nominal Group Technique (NGT)", "d": "A facilitated process that supports idea generation by groups. At the beginning, group members work alone to generate ideas, which are then pooled under the guidance of a trained facilitator. Process: members come together as a group but initially work separately; each person writes ideas; the facilitator reads ideas aloud and writes them on a blackboard; the group discusses; ideas are prioritized, combined, selected, reduced. An NGT exercise can complement a group interview or be part of a JAD effort.", "svg": null}, {"t": "Directly Observing Users", "d": "People are not always reliable informants, even when they try to be reliable and tell what they think is the truth. Direct observation — watching users do their jobs — can provide more accurate information than self-reporting (questionnaires, interviews). Document analysis — review of existing business documents — gives a historical and 'formal' view of system requirements. These methods are not totally unbiased: observation can cause people to change their normal operating behavior.", "svg": null}, {"t": "Analyzing Procedures and Documents", "d": "Attempt to find all written documents about the organizational areas relevant to the systems under redesign: mission statements, business plans, organization charts, business policy manuals, job descriptions, etc. What can be discovered: problems with the existing system; opportunities to meet new needs; organizational direction; names of key individuals; values of the organization; special information processing circumstances; reasons for current system design; rules for processing data.", "svg": null}, {"t": "Four Types of Useful Documents", "d": "(1) Written work procedures — describe how a job is performed and include the data and information used and created in performing the job; issues: may involve duplication of effort, may have missing procedures, may be out of date, may contradict information obtained through interviews. (2) Business forms — explicitly indicate the data flowing in or out of a system. (3) Reports — enable the analyst to work backwards from the report to the data that generated it. (4) Description of the current information system.", "svg": null}, {"t": "Formal vs. Informal Systems", "d": "Formal: the official way a system works as described in the organization's documentation — procedure documents describe the formal system. Informal: the way a system actually works in practice — interviews and observation reveal the informal system.", "svg": null}, {"t": "Contemporary Methods Overview", "d": "Joint Application Design (JAD) — brings together key users, managers, and systems analysts to collect requirements simultaneously from key people; conducted off-site. Group Support Systems — facilitate sharing of ideas and voicing of opinions about requirements. CASE tools — used to analyze existing systems and discover requirements to meet changing business conditions. System prototypes — an iterative development process where a rudimentary working version is built to refine understanding of requirements in concrete terms.", "svg": null}, {"t": "JAD in Detail", "d": "A structured process in which users, managers, and analysts work together for several days in a series of intensive meetings to specify or review system requirements. It is an intensive group-oriented requirements determination technique; team members meet in isolation for an extended period; highly focused; resource intensive; started by IBM in the 1970s. Participants: session leader (facilitates group process), users (active, speaking), managers (active, speaking), sponsor (high-level champion, limited participation), systems analysts (should mostly listen), scribe (records session activities), IS staff (should mostly listen).", "svg": null}, {"t": "Taking Part in a JAD", "d": "CASE tools during JAD: upper CASE tools are used, enabling analysts to enter system models directly during the session; screen designs and prototyping can be done and shown to users. Supporting JAD with GSS: group support systems enable more participation — members type answers into the computer and all see what others have typed. End result: documentation detailing the existing system and features of the proposed system.", "svg": null}, {"t": "Prototyping", "d": "An iterative process of systems development in which requirements are converted to a working system that is continually revised through close collaboration between an analyst and users. Evolutionary prototyping: begin by modeling parts of the target system and, if successful, evolve the rest of the system from those parts. Throwaway prototyping: does not preserve the prototype that has been developed. Most useful when: user requests are not clear; few users are involved; designs are complex and require concrete form; there is a history of communication problems between analysts and users; tools are readily available to build a prototype. Drawbacks: tendency to avoid formal documentation; difficult to adapt to a more general user audience; sharing data with other systems is often not considered; SDLC checks are often bypassed.", "svg": null}, {"t": "Business Process Reengineering (BPR)", "d": "The search for, and implementation of, radical change in business processes to achieve breakthrough improvements in products and services. Goals: reorganize complete flow of data in major sections of an organization; eliminate unnecessary steps; combine steps; become more responsive to future change. Key business processes are sets of activities designed to produce specific output for a particular customer or market, focused on customers and outcome; the same techniques are used as for requirements determination. Disruptive technologies enable breaking long-held business rules that inhibit organizations from making radical business changes.", "svg": null}, {"t": "Agile Requirements Determination", "d": "Continual user involvement: replace the traditional SDLC waterfall with an iterative analyze–design–code–test cycle. Agile usage-centered design: focuses on user goals, roles, and tasks. The Planning Game (based on eXtreme Programming): exploration, steering, commitment.", "svg": null}], "qs": [{"q": "During requirements determination, from which sources is information gathered?", "opts": ["From users of the current system, from observing users, and from reports, forms, and procedures", "Only from the project sponsor, the steering committee, and the official corporate plan", "Only from the source code of the existing legacy system", "Only from competing products available in the market"], "a": 0, "ex": "Analysts gather information on what the system should do from as many sources as possible: current-system users, observation of users, and reports, forms, and procedures.", "core": true, "sref": 0}, {"q": "In requirements determination, what does 'impertinence' mean?", "opts": ["You should question everything", "You should accept user statements as final", "You should defer to the most senior manager", "You should avoid asking sensitive questions"], "a": 0, "ex": "Impertinence means the analyst should question everything.", "core": true, "sref": 0}, {"q": "In requirements determination, what does 'impartiality' mean?", "opts": ["Your role is to find the best solution to a business problem or opportunity", "Your role is to defend the design proposed by your own department", "Your role is to favor whichever solution costs the least", "Your role is to remain silent during stakeholder conflicts"], "a": 0, "ex": "Impartiality: the analyst's role is to find the best solution to a business problem or opportunity.", "core": true, "sref": 0}, {"q": "What does 'relaxing constraints' mean for the analyst?", "opts": ["Assume that anything is possible and eliminate the infeasible", "Loosen the project deadlines whenever the team falls behind", "Reduce the number of mandatory requirements by half", "Allow users to skip the formal change request process"], "a": 0, "ex": "Relaxing constraints means assuming anything is possible and eliminating the infeasible.", "core": true, "sref": 1}, {"q": "What does 'attention to details' require?", "opts": ["Every fact must fit with every other fact", "Every document must be at least ten pages long", "Every interview must be recorded on tape", "Every requirement must be approved twice"], "a": 0, "ex": "Attention to details: every fact must fit with every other fact.", "core": true, "sref": 5}, {"q": "Why is 'reframing' listed as part of the requirements process?", "opts": ["Because analysis is, in part, a creative process", "Because all diagrams must be redrawn in color", "Because requirements must be translated into legal terms", "Because the project budget must be recalculated monthly"], "a": 0, "ex": "Reframing reflects that analysis is, in part, a creative process.", "core": false, "sref": 1}, {"q": "Which deliverables come from computerized sources during requirements determination?", "opts": ["JAD session results, CASE repositories, and system prototype displays and reports", "Mission statements, job descriptions, training manuals, and organizational charts", "Interview transcripts, observation notes, and meeting minutes", "Gantt charts, network diagrams, and budget worksheets"], "a": 0, "ex": "Computerized sources yield JAD session results, CASE repositories, and system prototype displays and reports.", "core": false, "sref": 2}, {"q": "Which are the four TRADITIONAL methods for determining requirements?", "opts": ["Interviewing individuals, interviewing groups, observing workers, and studying business documents", "JAD sessions, group support systems, CASE tools, and system prototyping methods", "BPR, disruptive technologies, planning game, and usage-centered design", "Questionnaires, surveys, focus groups, and beta testing"], "a": 0, "ex": "Traditional methods: interviewing individuals, interviewing groups, observing workers, and studying business documents.", "core": true, "sref": 3}, {"q": "What characterizes an OPEN-ENDED interview question?", "opts": ["Conversational, with no prespecified answers in mind", "Structured, with a limited range of possible answers", "Binary, requiring strictly a yes or a no response", "Numeric, requiring an exact quantitative estimate"], "a": 0, "ex": "Open-ended questions are conversational questions with no specific answers in mind — e.g., 'What would you say is the best thing about the system you currently use?'", "core": false, "sref": 4}, {"q": "What characterizes a CLOSED-ENDED interview question?", "opts": ["It asks respondents to choose from among a set of specified responses", "It invites the respondent to speak freely with no prompts", "It must always be asked at the end of the interview", "It can only be asked of managers, never of end users"], "a": 0, "ex": "Closed-ended questions ask those responding to choose from among a set of specified responses.", "core": false, "sref": 4}, {"q": "Which is among the guidelines for effective interviewing?", "opts": ["Review your notes within 48 hours", "Review your notes within two weeks", "Avoid preparing an agenda in advance", "Argue for your preferred design during the talk"], "a": 0, "ex": "Guidelines: plan the interview, listen carefully and take notes (record if permitted), review notes within 48 hours, be neutral, and seek diverse views.", "core": false, "sref": 4}, {"q": "What is an interview guide?", "opts": ["A document for developing, planning, and conducting an interview", "A signed legal release allowing interviews to be recorded", "A program that automatically transcribes spoken interviews", "A list of employees forbidden from being interviewed"], "a": 0, "ex": "An interview guide is a document for developing, planning, and conducting an interview; each question can include both verbal and non-verbal information.", "core": true, "sref": 5}, {"q": "What is a stated PRO of individual interviews?", "opts": ["Easier to schedule than group interviews", "Synergies can be heard among many participants", "Agreements and disagreements emerge at once", "Time is used more effectively than in groups"], "a": 0, "ex": "Individual interviews are easier to schedule; the cons are contradictions/inconsistencies between interviewees and time-consuming follow-ups.", "core": true, "sref": 6}, {"q": "Which is an ADVANTAGE of group interviews?", "opts": ["The opportunity for synergies and hearing agreements and disagreements at once", "They are far easier to schedule than one-on-one interviews", "They eliminate all contradictions among interviewees permanently", "They require no preparation or planning by the analyst"], "a": 0, "ex": "Group interview advantages: more effective use of time, hearing agreements and disagreements at once, and the opportunity for synergies. The disadvantage is scheduling difficulty.", "core": false, "sref": 6}, {"q": "In the Nominal Group Technique, how does the process begin?", "opts": ["Group members work alone to generate ideas before pooling them under a trained facilitator", "The facilitator dictates a prepared list of ideas which the members then simply approve", "Members vote immediately on prewritten requirement statements", "Managers present a finished design for the group to critique"], "a": 0, "ex": "In NGT, members initially work separately writing ideas; the facilitator then reads them aloud, the group discusses, and ideas are prioritized, combined, selected, and reduced.", "core": false, "sref": 7}, {"q": "Why can direct observation be more accurate than interviews or questionnaires?", "opts": ["Because people are not always reliable informants, even when they try to be reliable and tell what they think is the truth", "Because observation is the only information-gathering method permitted by privacy law in most organizations and industries today", "Because users always behave identically when watched", "Because written documents are forbidden in modern analysis"], "a": 0, "ex": "People are not always reliable informants; watching users do their jobs can provide more accurate information than self-reporting.", "core": false, "sref": 8}, {"q": "What bias can direct observation introduce?", "opts": ["Observation can cause people to change their normal operating behavior", "Observation permanently deletes the formal procedures from the record", "Observation forces analysts to take sides in disputes", "Observation makes documents impossible to analyze later"], "a": 0, "ex": "These methods are not totally unbiased — observation can cause people to change their normal operating behavior.", "core": false, "sref": 8}, {"q": "What can document analysis reveal that interviews may not?", "opts": ["A historical and 'formal' view of system requirements", "The interpersonal conflicts within the project team", "The exact response time of the planned database", "The future strategy of the organization's competitors"], "a": 0, "ex": "Document analysis — review of existing business documents — gives a historical and formal view of system requirements.", "core": false, "sref": 8}, {"q": "Which of the following can be discovered by analyzing procedures and documents?", "opts": ["Reasons for the current system design and rules for processing data", "The optimal database normalization plan for the new replacement system", "The salaries of the organization's senior management", "The physical network topology of branch offices"], "a": 0, "ex": "Document analysis can reveal problems, opportunities, organizational direction, key individuals, values, special processing circumstances, reasons for current design, and rules for processing data.", "core": false, "sref": 9}, {"q": "What are the four types of useful documents?", "opts": ["Written work procedures, business forms, reports, and descriptions of the current information system", "Contracts, invoices, receipts, purchase orders, and the related shipping documents", "Memos, emails, chat logs, and meeting recordings", "Budgets, forecasts, ledgers, and audit statements"], "a": 0, "ex": "The four useful document types: written work procedures, business forms, reports, and a description of the current information system.", "core": true, "sref": 10}, {"q": "What does a REPORT enable the analyst to do?", "opts": ["Work backwards from the report to the data that generated it", "Trace the flow of data into the system through input forms", "Describe formally how a job task is to be performed", "Record the minutes of requirements meetings verbatim"], "a": 0, "ex": "A report enables the analyst to work backwards from the report to the data that generated it.", "core": false, "sref": 10}, {"q": "Which issue is associated with written work procedures?", "opts": ["They may be out of date or contradict information obtained through interviews", "They always reflect exactly how the work is actually done in daily practice", "They cannot contain any information about system logic", "They are legally barred from analyst review"], "a": 0, "ex": "Issues with procedures: duplication of effort, missing procedures, being out of date, and contradicting information obtained through interviews.", "core": false, "sref": 10}, {"q": "What is the FORMAL system?", "opts": ["The official way a system works as described in the organization's documentation", "The way a system actually works in day-to-day practice inside the organization", "The set of unwritten habits employees develop over time", "The prototype version demonstrated during JAD sessions"], "a": 0, "ex": "The formal system is the official way the system works as described in documentation; procedure documents describe it.", "core": true, "sref": 11}, {"q": "How is the INFORMAL system revealed?", "opts": ["Through interviews and observation", "Through procedure manuals only", "Through the project charter", "Through
