h the effectiveness of the new system. (3) Single-location installation — changing from the current system to the new system in only one place or in a series of separate sites over time. (4) Phased installation — the new system is brought online in functional components; different parts of the old and new systems are used in cooperation until the whole new system is installed.", "svg": "install_approaches"}, {"t": "Installation Conversion Scope", "d": "The installation strategy involves converting: software, data, sometimes hardware, documentation, work methods, job descriptions, offices and other facilities, training materials, business forms, and other aspects of the system. Thus, planning for installation may begin as early as the analysis of the organization supported by the system.", "svg": null}, {"t": "System vs. User Documentation", "d": "System documentation contains detailed information about a system's design specifications, its internal workings, and its functionality. User documentation contains written or other visual information about an application system, how it works, and how to use it.", "svg": null}, {"t": "Training and Supporting Users", "d": "High-quality training and support must be available; the type of training needed will vary by system type and user expertise. Automating support: to cut the costs of providing support and to catch up with demand for additional support services, vendors have automated many of their support offerings — examples: online support forums and voice-response systems. Support through a help desk: an information systems department function staffed by IS personnel — a single point of contact for all user inquiries and problems about a particular information system, or for all users in a particular department.", "svg": null}, {"t": "Why Implementation Sometimes Fails", "d": "One answer: (1) lack of management support of the system under development, and (2) lack of the involvement of users in the development process. Another answer adds: financial and time constraints in the development process. A third answer says: lack of commitment to the project, lack of commitment to change, and lack of extensive effort during the planning.", "svg": null}], "qs": [{"q": "After maintenance, which SDLC phase is the most expensive and time-consuming?", "opts": ["Implementation", "Analysis", "Design", "Planning"], "a": 0, "ex": "After maintenance, implementation is the most expensive and time-consuming phase of the entire life cycle.", "core": true, "sref": 0}, {"q": "Why is the implementation phase so expensive, per the course?", "opts": ["Many people are involved in the process", "Hardware prices peak during installation", "Licenses double in cost at deployment", "Vendors charge premiums for training"], "a": 0, "ex": "Reason for expense: many people are involved. Reason for time consumption: all the work that has to be completed.", "core": false, "sref": 0}, {"q": "Why is implementing a new IS NOT a mechanical process?", "opts": ["It involves the work habits, beliefs, interrelationships, and personal goals of an organization's members", "It requires advanced compilers and automated tools that organizations rarely possess in-house", "It depends on the physical installation of cables, servers, and other specialized equipment", "It must wait for the maintenance phase to define the system's final operating procedures"], "a": 0, "ex": "Implementation involves work habits, beliefs, interrelationships, and personal goals of the organization's members; there are no sure procedures to follow.", "core": false, "sref": 0}, {"q": "What are the six major activities of software implementation?", "opts": ["Coding, testing, installation, documentation, training, and support", "Planning, analysis, design, coding, testing, and maintenance", "Inspection, walk-through, desk checking, syntax, unit, integration", "Conversion, migration, validation, verification, audit, and review"], "a": 0, "ex": "The six activities: coding, testing, installation, documentation, training, and support.", "core": true, "sref": 3}, {"q": "Which of the following is among the purposes of the implementation activities?", "opts": ["Convert the physical system specifications into working and reliable software and hardware", "Determine the tangible and intangible benefits of the proposed information system", "Identify and rank the potential development projects using value chain analysis", "Translate the conceptual E-R diagram into a set of fully normalized relations"], "a": 0, "ex": "Purposes: convert physical specifications into working reliable software/hardware, document the work done, and provide help for current and future users and caretakers.", "core": true, "sref": 1}, {"q": "If agile methodologies have been followed, what may be true at implementation?", "opts": ["Coding and testing activities may have been completed", "Documentation must be rewritten from the beginning", "Installation cannot use the parallel approach at all", "User training is no longer required for the system"], "a": 0, "ex": "If agile methodologies were followed, coding and testing activities may have been completed; under plan-driven approaches they are often done by other team members.", "core": false, "sref": 2}, {"q": "Regardless of methodology, what are analysts responsible for during implementation?", "opts": ["Ensuring that all of the various activities are properly planned and executed", "Writing every module of program code by themselves without assistance", "Approving the project budget and signing the procurement contracts", "Operating the help desk as the single point of contact for all users"], "a": 0, "ex": "Analysts are responsible for ensuring all the various activities are properly planned and executed.", "core": false, "sref": 1}, {"q": "What happens during the coding activity?", "opts": ["Physical design specifications created by the analysis team are turned into working computer code by the programming team", "Each program module is examined by a formal group searching for occurrences of well-known errors in the logic", "The old system's data, documentation, and work procedures are converted to those of the new system", "Users are introduced to the system and trained while the software is loaded onto the hardware"], "a": 0, "ex": "Coding: the physical design specifications are turned into working computer code by the programming team.", "core": false, "sref": 3}, {"q": "When can the testing activity begin?", "opts": ["Once the coding activity has begun — proceeding in parallel", "Only after every module has been completely programmed", "Only after installation at the first production location", "Before analysis, as soon as the project is approved"], "a": 0, "ex": "Once coding has begun, testing can begin and proceed in parallel; modules are tested individually, then incrementally with other modules.", "core": false, "sref": 3}, {"q": "When should planning for testing occur?", "opts": ["Early in the project, during the analysis phase", "At the end of coding, just before integration", "During installation, alongside data conversion", "After support begins, based on real failures"], "a": 0, "ex": "Plan for testing early in the project (during the analysis phase): what needs to be tested and collecting test data.", "core": false, "sref": 3}, {"q": "What is the installation process?", "opts": ["The process during which the current system is replaced by the new system", "The process of writing program code from physical design specifications", "The process of training the help desk staff on the application package", "The process of validating the HTML of pages before they are published"], "a": 0, "ex": "Installation: the process during which the current system is replaced by the new system, including conversion of existing data, software, documentation, and work procedures.", "core": true, "sref": 3}, {"q": "Who are the two audiences of system documentation?", "opts": ["The IS personnel who will maintain the system, and the people who will use the system", "The project sponsors who fund the work, and the auditors who review compliance", "The programmers who wrote the code, and the vendors who supplied the hardware", "The executives who approved the project, and the consultants who designed it"], "a": 0, "ex": "Audiences: the information systems personnel who will maintain the system, and the people who will use the system.", "core": true, "sref": 11}, {"q": "When does the analysis team's involvement in the project end?", "opts": ["By the end of the implementation phase", "Immediately after the design phase closes", "When the master test plan is delivered", "After the first year of maintenance ends"], "a": 0, "ex": "Formal documentation attention occurs during implementation; the analysis team's involvement ends by the end of the implementation.", "core": false, "sref": 5}, {"q": "During which phase is the master test plan developed?", "opts": ["Analysis", "Design", "Implementation", "Planning"], "a": 0, "ex": "During analysis you develop a master test plan (a collection of documents).", "core": false, "sref": 5}, {"q": "Which test plans are developed during the design phase?", "opts": ["A unit test plan, an integration test plan, and a system test plan", "The master test plan and the overall acceptance criteria document", "The conversion plan, the training plan, and the support schedule", "The inspection checklist and the desk checking procedure manual"], "a": 0, "ex": "During design: unit test plan, integration test plan, and system test plan.", "core": false, "sref": 5}, {"q": "How do test plans improve communication among team members?", "opts": ["They define the roles of each member and serve as a checklist", "They replace meetings with automatically generated reports", "They merge all testing into one final acceptance session", "They assign all testing duties to a single quality officer"], "a": 0, "ex": "Test plans improve communication: they define the roles of each member and the plan serves as a checklist.", "core": false, "sref": 5}, {"q": "What distinguishes static testing techniques from dynamic ones?", "opts": ["In static techniques the code being tested is not executed; dynamic techniques involve execution of the code", "Static techniques are always automated; dynamic techniques are always carried out manually by people", "Static techniques test single modules; dynamic techniques only test complete integrated systems", "Static techniques happen during design; dynamic techniques happen only during maintenance"], "a": 0, "ex": "Static: code not executed. Dynamic: involves execution of the code.", "core": false, "sref": 6}, {"q": "What distinguishes automated testing from manual testing?", "opts": ["Automated: the computer conducts the test; manual: people complete the test", "Automated: run during implementation; manual: run only during analysis", "Automated: applies to systems; manual: applies to individual modules", "Automated: requires a compiler; manual: requires an interpreter instead"], "a": 0, "ex": "Automated: the computer conducts the test. Manual: people complete the test.", "core": false, "sref": 6}, {"q": "What are inspections?", "opts": ["Formal group activities where participants manually examine code for occurrences of well-known errors", "Informal processes where a programmer works through the program code manually on their own", "Reviews used to evaluate many different kinds of systems development deliverables", "Checks performed by a compiler to verify that the code follows the language rules"], "a": 0, "ex": "Inspections: formal group activities where participants manually examine code for occurrences of well-known errors.", "core": true, "sref": 7}, {"q": "What are walk-throughs used for?", "opts": ["Reviewing many systems development deliverables", "Executing each module alone to find code errors", "Verifying program syntax through the compiler", "Combining programs gradually into full systems"], "a": 0, "ex": "Walk-throughs can be used to review many systems development deliverables.", "core": true, "sref": 7}, {"q": "What is desk checking?", "opts": ["An informal process where the programmer or someone who understands the logic works through the code manually", "A formal group activity in which participants search the code for occurrences of well-known errors", "An automated technique in which the computer executes each module against prepared test data", "A compiler function that flags statements violating the syntax of the programming language"], "a": 0, "ex": "Desk checking: an informal process in which the programmer or someone else who understands the logic works through the code manually.", "core": true, "sref": 7}, {"q": "Who or what typically performs syntax checking?", "opts": ["A compiler", "A test group", "An end user", "An inspector"], "a": 0, "ex": "Syntax checking is typically done by a compiler.", "core": false, "sref": 7}, {"q": "What is unit testing?", "opts": ["Each module is tested alone to discover any errors that may exist in the module's code", "Modules are combined and tested incrementally as they are integrated into programs", "Programs are combined and tested gradually as they are integrated into systems", "The complete installed system is verified at the first production site location"], "a": 0, "ex": "Unit testing: each module is tested alone to discover errors in the module's code.", "core": true, "sref": 8}, {"q": "What is integration testing?", "opts": ["Combining modules and testing them incrementally — integrating modules into programs", "Combining programs and testing them gradually — integrating programs into systems", "Testing each module alone to discover any errors existing in the module's code", "Examining code in a formal group session for occurrences of well-known errors"], "a": 0, "ex": "Integration testing: combine modules and test incrementally, integrating modules into programs.", "core": true, "sref": 8}, {"q": "What is system testing?", "opts": ["Combining programs and testing them gradually — integrating programs into systems", "Combining modules and testing them incrementally — integrating modules into programs", "Working through the program logic manually at a desk before compiling the source", "Turning off the old system and switching all of the users onto the new system"], "a": 0, "ex": "System testing: combine programs and test gradually, integrating programs into systems.", "core": true, "sref": 8}, {"q": "What is tested in BOTH integration and system testing?", "opts": ["Interfaces between modules and programs", "Compliance with coding style standards", "User satisfaction with the new screens", "Conversion of legacy data and documents"], "a": 0, "ex": "In both integration and system testing, interfaces between modules and programs are tested.", "core": true, "sref": 8}, {"q": "What is direct installation?", "opts": ["The old system is turned off and the new system is turned on", "The old and new systems run together until users are satisfied", "The new system starts at one location or a series of sites over time", "The new system arrives in functional components used with the old"], "a": 0, "ex": "Direct installation: the old system is turned off and the new system is turned on.", "core": true, "sref": 9}, {"q": "What is parallel installation?", "opts": ["The old system continues to run alongside the new system until users and management are satisfied with the new system's effectiveness", "The new system replaces the old at a single pilot location before being rolled out to the remaining sites in sequence", "The new system is delivered in functional components that cooperate with parts of the old system until complete", "The old system is switched off at a fixed date and the new system immediately takes over all the processing"], "a": 0, "ex": "Parallel installation: the old system runs alongside the new until users and management are satisfied with the new system's effectiveness.", "core": true, "sref": 9}, {"q": "What is single-location installation?", "opts": ["Changing from the current system to the new system in only one place or in a series of separate sites over time", "Bringing the new system online in functional components cooperating with the old until fully installed", "Running both systems simultaneously across every site until management approves the changeover", "Turning the old system off everywhere at once and starting the new system the following day"], "a": 0, "ex": "Single-location installation: changing to the new system in only one place or in a series of separate sites over time.", "core": true, "sref": 9}, {"q": "What is phased installation?", "opts": ["The new system is brought online in functional components; parts of the old and new systems are used in cooperation until the whole new system is installed", "The new system is introduced at one pilot location first, with the other locations converted later according to a schedule published in the conversion plan", "The new and old systems run side by side in full until users and managers are confident in the replacement", "The conversion happens overnight, with the old system retired and the new one activated in a single step"], "a": 0, "ex": "Phased installation: the new system comes online in functional components; old and new parts cooperate until the whole new system is installed.", "core": true, "sref": 9}, {"q": "Which of the following is part of the conversion scope of an installation strategy?", "opts": ["Job descriptions", "Discount rates", "Cardinalities", "Gateway types"], "a": 0, "ex": "Conversion covers software, data, sometimes hardware, documentation, work methods, job descriptions, offices/facilities, training materials, business forms, and other aspects.", "core": false, "sref": 10}, {"q": "How early may planning for installation begin?", "opts": ["As early as the analysis of the organization supported by the system", "Only once coding has been completed and the tests have passed", "Only after management formally signs off the design documents", "During the maintenance phase, when requests start arriving"], "a": 0, "ex": "Planning for installation may begin as early as the analysis of the organization supported by the system.", "core": false, "sref": 3}, {"q": "What does system documentation contain?", "opts": ["Detailed information about a system's design specifications, its internal workings, and its functionality", "Written or visual information about an application system, how it works, and how to use it", "The justification of the system in terms of its costs, benefits, and overall feasibility", "The roles of testing team members and the checklist of activities they must perform"], "a": 0, "ex": "System documentation: detailed information about design specifications, internal workings, and functionality.", "core": false, "sref": 11}, {"q": "What does user documentation contain?", "opts": ["Written or other visual information about an application system, how it works, and how to use it", "Detailed internal specifications describing the design and inner workings of the software", "The history of maintenance requests submitted by users since the system was installed", "The schedule of training sessions arranged for each department using the application"], "a": 0, "ex": "User documentation: written or other visual information about an application system, how it works, and how to use it.", "core": false, "sref": 11}, {"q": "What determines the type of training needed?", "opts": ["The system type and user expertise", "The size of the project's budget", "The number of failed test cases", "The chosen installation approach"], "a": 0, "ex": "The type of training needed will vary by system type and user expertise.", "core": false, "sref": 12}, {"q": "Why have vendors automated many support offerings?", "opts": ["To cut the costs of providing support and to catch up with demand for additional support services", "To remove the need for documentation by replacing manuals with self-explaining software", "To comply with regulations that mandate continuous monitoring of installed products", "To shorten the implementation phase by eliminating the system testing activities"], "a": 0, "ex": "Automating support attempts to cut the costs of providing support and to catch up with demand for additional support services — e.g., online support forums and voice-response systems.", "core": false, "sref": 12}, {"q": "Which are given as examples of automated support?", "opts": ["Online support forums and voice-response systems", "Email newsletters and printed reference manuals", "Chat assistants and augmented-reality helpers", "Status dashboards and self-healing middleware"], "a": 0, "ex": "Examples: online support forums and voice-response systems.", "core": false, "sref": 12}, {"q": "What is a help desk?", "opts": ["An IS department function staffed by IS personnel — a single point of contact for user inquiries and problems", "An external consulting firm hired to manage the installation and conversion of the new system", "A vendor-run subscription service answering questions about packaged commercial software only", "A committee of users who prioritize maintenance requests submitted through formal channels"], "a": 0, "ex": "Help desk: an information systems department function staffed by IS personnel, providing a single point of contact for all user inquiries and problems.", "core": true, "sref": 12}, {"q": "According to the FIRST answer given, why does implementation sometimes fail?", "opts": ["Lack of management support and lack of user involvement in the development process", "Financial constraints and the shortage of time available to the development team", "Lack of commitment to the project and to change, and weak planning effort", "Poor documentation quality and an excessive number of latent system defects"], "a": 0, "ex": "First answer: (1) lack of management support of the system under development, and (2) lack of the involvement of users in the development process.", "core": false, "sref": 13}, {"q": "What does the SECOND answer add to the reasons for implementation failure?", "opts": ["Financial and time constraints in the development process", "Lack of commitment to change among the system's users", "Inadequate training of the help desk support personnel", "Absence of automated tools for testing and integration"], "a": 0, "ex": "The second answer adds financial and time constraints in the development process.", "core": false, "sref": 13}, {"q": "Which reasons does the THIRD answer give for implementation failure?", "opts": ["Lack of commitment to the project, lack of commitment to change, and lack of extensive effort during planning", "Lack of management support, lack of user involvement, and lack of adequate development funding", "Excessive data movement, decentralized data control, and the need for powerful workstations", "Poor look-and-feel consistency, broken links, and outdated content across the entire system"], "a": 0, "ex": "Third answer: lack of commitment to the project, lack of commitment to change, lack of extensive effort during the planning.", "core": false, "sref": 13}], "essays": [{"q": "Discuss the system implementation process: its cost, nature, major activities, and their purposes.", "a": "After maintenance, implementation is the most expensive and time-consuming phase of the entire life cycle — expensive because many people are involved, and time-consuming because of all the work that has to be completed. Implementing a new IS in an organizational context is not a mechanical process: it involves the work habits, beliefs, interrelationships, and personal goals of an organization's members; factors important to success have been identified, but there are no sure procedures to follow. The six major activities are coding, testing, installation, documentation, training, and support. Their purposes: convert the physical system specifications into working and reliable software and hardware; document the work that has been done; and provide help for current and future users and caretakers of the system. If agile methodologies have been followed, coding and testing may already be completed; under plan-driven methodologies these are often done by other team members — in any case, analysts are responsible for ensuring all activities are properly planned and executed."}, {"q": "Describe software application testing: test plans across the SDLC, classification of techniques, and the seven types of tests.", "a": "Software testing begins early in the SDLC. During analysis you develop a master test plan (a collection of documents); during design you develop a unit test plan, an integration test plan, and a system test plan; during implementation these plans are put into effect and the actual testing is performed. The plans improve communication among the team members involved in testing — they define each member's role and serve as a checklist. Tests are categorized by employed technique — static (the code is not executed) versus dynamic (execution of the code) — and by test automation — automated (the computer conducts the test) versus manual (people complete the test). The types: inspections — formal group activities where participants manually examine code for occurrences of well-known errors; walk-throughs — used to review many systems development deliverables; desk checking — an informal process where the programmer or someone who understands the logic works through the code manually; syntax checking — typically done by a compiler; unit testing — each module is tested alone to find errors in its code; integration testing — modules are combined and tested incrementally (integrating modules into programs); and system testing — programs are combined and tested gradually (integrating programs into systems). In both integration and system testing, interfaces between modules and programs are tested."}, {"q": "Compare the four installation approaches and describe the scope of conversion.", "a": "Installation is the moving from the current information system to the new one. Direct installation: the old system is turned off and the new system is turned on. Parallel installation: the old system continues to run alongside the new system until users and management are satisfied with the effectiveness of the new system. Single-location installation: changing from the current system to the new system in only one place or in a series of separate sites over time. Phased installation: the new system is brought online in functional components, and different parts of the old and new systems are used in cooperation until the whole new system is installed. The installation strategy involves converting software, data, sometimes hardware, documentation, work methods, job descriptions, offices and other facilities, training materials, business forms, and other aspects of the system — so planning for installation may begin as early as the analysis of the organization supported by the system."}, {"q": "Explain documentation, training, and support during implementation.", "a": "Documentation proceeds throughout the life cycle, but formal attention occurs during the implementation phase, and the analysis team's involvement ends by the end of implementation. System documentation contains detailed information about a system's design specifications, its internal workings, and its functionality; user documentation contains written or other visual information about an application system, how it works, and how to use it. The audiences are the IS personnel who will maintain the system and the people who will use it. High-quality training and support must be ensured; the type of training varies by system type and user expertise — some training and support is particular to application systems, the rest general to operating systems or off-the-shelf packages. To cut support costs and catch up with demand, vendors have automated many support offerings, such as online support forums and voice-response systems. Support is also provided through a help desk — an IS department function staffed by IS personnel, serving as a single point of contact for all user inquiries and problems about a particular information system or for all users in a particular department."}, {"q": "Discuss the three answers the course gives to why implementation sometimes fails.", "a": "The first answer cites two factors: lack of management support of the system under development, and lack of the involvement of users in the development process. The second answer adds, in addition to those, financial and time constraints in the development process. The third answer says failure stems from lack of commitment to the project, lack of commitment to change, and lack of extensive effort during the planning. The course also illustrates this with an example of a system implementation failure, noting that despite identified success factors, there is no sure procedure that guarantees successful implementation."}]}, {"id": 13, "title": "Maintenance: System Maintenance", "optional": true, "slides": [{"t": "Maintenance Process", "d": "System maintenance is the largest systems development expenditure for many organizations; maintenance can begin soon after the system is installed. Maintenance activities concern software changes and changes to hardware and business procedures. Key questions: how long should organizations maintain a system (one year, five years, ten years?), and at what point does it make financial sense to discontinue evolving an older system and build or purchase a new one? Assessing the trade-offs between maintenance and new development is the responsibility of IS management.", "svg": null}, {"t": "Four Major Maintenance Activities", "d": "(1) Obtaining maintenance requests — a formal process should be established whereby users can submit system change requests; most companies have some sort of document to request new development, report problems, or request new features within an existing system. (2) Transforming requests into changes — analysis is conducted to understand the scope of the request; the size of a maintenance request can be analyzed for risk and feasibility. (3) Designing changes — a formal design change is provided to implementation. (4) Implementing changes — adopt the change on the system.", "svg": null}, {"t": "Four Types of Maintenance", "d": "Corrective maintenance: changes made to repair defects in the design, coding, or implementation of the system; most corrective problems surface soon after installation, are typically urgent (needing resolution to curtail possible interruptions in normal business activities), account for 75% of all maintenance activity, and add little or no value to the organization — removing defects without adding new functionality. Adaptive maintenance: changes to evolve functionality to changing business needs or migrate to a different operating environment; less urgent, occurring over some period of time; adds value; constitutes a small part of all maintenance activity. Perfective maintenance: enhancements to improve processing performance or interface usability or to add desired system features; not really maintenance but rather new development. Preventive maintenance: changes made to reduce the chance of future system failure; much lower priority than corrective maintenance.", "svg": null}, {"t": "Cost of Maintenance and Maintainability", "d": "60% to 80% of organizations' information systems budget is allocated to maintenance activities; organizations accumulate more older (legacy) systems requiring more maintenance, and 52% of programmers are assigned to maintain in-house developed systems. Maintainability is the ease with which software can be understood, corrected, adapted, and enhanced; low maintainability leads to uncontrollable maintenance expenses. Main factors determining maintainability: (1) the number of latent defects — unknown errors existing in the system after installation; (2) the number of customers — generally, the more customers, the greater the maintenance costs; (3) documentation quality — without quality documentation, maintenance efforts can increase exponentially. Other (less influential) factors: personnel, tools, and software structure.", "svg": null}, {"t": "Managing Maintenance — Personnel and Effectiveness", "d": "Maintenance is the largest segment of programming personnel, implying the need for careful management. Managing maintenance personnel — three organization options: (1) the maintenance group is separated from the development group; (2) the same people who build the system also maintain it; (3) the primary end users in the functional units have their own maintenance personnel. Each option has advantages and disadvantages. Measuring maintenance effectiveness — measure three factors: number of failures, time between each failure, and type of failure. Mean time between failures (MTBF) is a metric showing the average length of time between two failures; over time, MTBF should increase after a few months of use.", "svg": null}, {"t": "Controlling Requests and Configuration Management", "d": "Controlling maintenance requests: a key issue is deciding which requests to perform and which to ignore — some requests will be more critical than others. Configuration management: the process of ensuring that only authorized changes are made to a system. A baseline module is a software module that has been tested, documented, and approved to be included in the most recently created version of a system; a system librarian controls the checking out and checking in of the baseline source code modules. Special software systems have been created to manage system configuration and version control activities.", "svg": null}, {"t": "Automated Tools in Maintenance", "d": "A primary objective of using automated tools for development and maintenance is to radically change the way code and documentation are modified and updated: design documents are modified and then code generators automatically create a new version of the system from the updated designs. One of the biggest advantages of automated tools is their usefulness in system maintenance. Special-purpose tools maintain older systems with incomplete documentation: reverse engineering tools create a representation of a system or program module at a design level of abstraction; re-engineering tools automatically alter an existing system in an effort to improve its quality or performance.", "svg": null}, {"t": "Website Maintenance", "d": "Most Websites are never purposely unavailable — they should be available 24/7/365, and maintenance must be done without taking the site offline. Approaches: lock out use of pages in a portion of the site while changes are made (with a 'Temporarily Out of Service' notice), and include a date and time stamp of the most recent change. Check for broken links — validating links from site pages is the most common maintenance issue; periodic checks are needed (software such as LinkAlarm can be used). HTML validation: modified or new pages should be processed by a code validation routine before pages are published. Reregistration: when site content changes significantly, reregister the Website with search engines. Future editions: avoid confusing visitors — frequent visitors can become confused if the site is constantly changing.", "svg": null}], "qs": [{"q": "What is the largest systems development expenditure for many organizations?", "opts": ["System maintenance", "System analysis", "System design", "System testing"], "a": 0, "ex": "System maintenance is the largest systems development expenditure for many organizations.", "core": true, "sref": 0}, {"q": "What are the four major activities within maintenance?", "opts": ["Obtaining requests, transforming requests into changes, designing changes, implementing changes", "Coding changes, testing changes, installing changes, documenting changes for the users", "Collecting failures, classifying failures, repairing failures, preventing future failures", "Planning upgrades, budgeting upgrades, scheduling upgrades, auditing the upgrades"], "a": 0, "ex": "Activities: (1) obtaining maintenance requests, (2) transforming requests into changes, (3) designing changes, (4) implementing changes.", "core": true, "sref": 1}, {"q": "What is corrective maintenance?", "opts": ["Changes made to repair defects in the design, coding, or implementation of the system", "Changes evolving system functionality to fit changing business needs or environments", "Enhancements improving processing performance, usability, or adding desired features", "Changes made to reduce the chance of a system failure occurring in the future"], "a": 0, "ex": "Corrective maintenance repairs defects in design, coding, or implementation; problems usually surface soon after installation and are typically urgent.", "core": true, "sref": 2}, {"q": "What percentage of all maintenance activity is corrective?", "opts": ["75%", "52%", "60%", "80%"], "a": 0, "ex": "Corrective maintenance accounts for 75% of all maintenance activity, yet adds little or no value (removing defects without new functionality).", "core": false, "sref": 2}, {"q": "What is adaptive maintenance?", "opts": ["Evolving functionality to changing business needs or migrating to a different operating environment", "Repairing defects in the system's design, coding, or implementation soon after installation", "Adding features and improving performance or usability — effectively new development work", "Reducing the chance of future failure through low-priority precautionary code changes"], "a": 0, "ex": "Adaptive maintenance evolves functionality to business needs or migrates the environment; less urgent, adds value, and is a small part of all maintenance.", "core": true, "sref": 2}, {"q": "Why is perfective maintenance described as 'not really maintenance'?", "opts": ["It is rather new development — enhancements to performance, usability, or desired features", "It is performed entirely by automated tools without involving any human programmers", "It only affects documentation files rather than the system's actual program code", "It is outsourced to vendors and so does not consume the internal IS budget at all"], "a": 0, "ex": "Perfective maintenance makes enhancements (performance, usability, features) and is described as rather new development.", "core": false, "sref": 6}, {"q": "What is preventive maintenance, and what is its priority?", "opts": ["Changes to reduce the chance of future system failure; much lower priority than corrective maintenance", "Changes to repair urgent installation defects; the highest priority of all the maintenance types", "Changes to adapt the system to new regulations; equal in priority to adaptive maintenance", "Changes to improve the interface usability; prioritized ahead of all corrective requests"], "a": 0, "ex": "Preventive maintenance reduces the chance of future failure and has much lower priority than corrective maintenance.", "core": true, "sref": 2}, {"q": "What share of organizations' IS budget goes to maintenance, and what share of programmers maintain in-house systems?", "opts": ["60–80% of the budget; 52% of programmers", "75–90% of the budget; 25% of programmers", "40–50% of the budget; 75% of programmers", "20–30% of the budget; 60% of programmers"], "a": 0, "ex": "60% to 80% of the IS budget goes to maintenance; 52% of programmers are assigned to maintain in-house developed systems.", "core": false, "sref": 3}, {"q": "What is maintainability?", "opts": ["The ease with which software can be understood, corrected, adapted, and enhanced", "The average length of time elapsing between two consecutive system failures", "The proportion of the budget an organization allocates to its legacy systems", "The formal process ensuring only authorized changes are made to a system"], "a": 0, "ex": "Maintainability: the ease with which software can be understood, corrected, adapted, and enhanced; low maintainability leads to uncontrollable expenses.", "core": true, "sref": 3}, {"q": "What are the three MAIN factors determining maintainability?", "opts": ["Number of latent defects, number of customers, and documentation quality", "Personnel skills, available tools, and the structure of the software", "Budget size, project duration, and the chosen development methodology", "Failure count, failure type, and the time between observed failures"], "a": 0, "ex": "Main factors: latent defects, number of customers, documentation quality. Less influential: personnel, tools, software structure.", "core": true, "sref": 3}, {"q": "What are latent defects?", "opts": ["Unknown errors existing in the system after it is installed", "Errors deliberately left unfixed because of their low impact", "Defects introduced while implementing maintenance changes", "Documented bugs scheduled for the next system release"], "a": 0, "ex": "Latent defects: the number of unknown errors existing in the system after it is installed.", "core": false, "sref": 3}, {"q": "What are the three options for organizing maintenance personnel?", "opts": ["Separate maintenance group; the same people build and maintain; end-user units have their own maintenance personnel", "Outsourced maintenance; vendor-run maintenance; entirely automated maintenance without staff", "Central help desk; regional support offices; embedded analysts within every department", "Rotating programmers; dedicated testers; independent quality assurance contractors"], "a": 0, "ex": "Options: (1) maintenance group separated from development, (2) same people build and maintain, (3) primary end users' functional units have their own maintenance personnel.", "core": true, "sref": 4}, {"q": "Which three factors are measured to assess maintenance effectiveness?", "opts": ["Number of failures, time between each failure, and type of failure", "Cost per failure, programmer headcount, and customer satisfaction", "Request backlog, average response time, and budget consumption", "Lines changed, modules touched, and the documentation updated"], "a": 0, "ex": "Measure: number of failures, time between each failure, and type of failure.", "core": false, "sref": 4}, {"q": "How should MTBF behave over time for an effective system?", "opts": ["MTBF should increase after a few months of use", "MTBF should decrease steadily as the system ages", "MTBF should remain constant from the very first day", "MTBF should oscillate with each maintenance release"], "a": 0, "ex": "Mean time between failures (MTBF) shows the average time between two failures; over time, MTBF should increase after a few months of use.", "core": false, "sref": 4}, {"q": "What is configuration management?", "opts": ["The process of ensuring that only authorized changes are made to a system", "The process of deciding which maintenance requests to perform or ignore", "The scheduling of website downtime for the application of urgent patches", "The assignment of maintenance personnel to the functional business units"], "a": 0, "ex": "Configuration management ensures only authorized changes are made to a system.", "core": false, "sref": 5}, {"q": "What is a baseline module, and who controls module check-in/check-out?", "opts": ["A tested, documented, and approved module included in the most recent system version; a system librarian controls check-out and check-in", "An untested prototype module awaiting review; the project manager controls its distribution to the programming staff", "The first module written for a new system; the lead developer controls when it may be modified by others", "A module generated automatically from design documents; the CASE tool controls all access to its source"], "a": 0, "ex": "Baseline module: tested, documented, approved for the most recent version; a system librarian controls checking out and checking in of baseline source modules.", "core": false, "sref": 5}, {"q": "What do reverse engineering and re-engineering tools do?", "opts": ["Reverse engineering creates a design-level representation of a system; re-engineering automatically alters a system to improve quality or performance", "Reverse engineering rolls a system back to its previous version; re-engineering rebuilds the system manually from new specifications", "Reverse engineering removes obsolete modules from a system; re-engineering merges several legacy systems into one platform", "Reverse engineering audits code for security flaws; re-engineering rewrites documentation for systems lacking manuals"], "a": 0, "ex": "Reverse engineering tools create a representation at a design level of abstraction; re-engineering tools automatically alter an existing system to improve quality or performance.", "core": false, "sref": 6}, {"q": "What is the most common Website maintenance issue?", "opts": ["Validating links from site pages (checking for broken links)", "Reregistering the site with the major search engines", "Updating the date and time stamps on modified pages", "Processing the pages through HTML validation routines"], "a": 0, "ex": "Validating links from site pages is the most common maintenance issue; periodic checks are needed (e.g., LinkAlarm software).", "core": false, "sref": 7}, {"q": "How should Website maintenance be performed, given 24/7/365 availability?", "opts": ["Without taking the site offline — e.g., lock pages under change with a 'Temporarily Out of Service' notice", "During scheduled overnight downtime announced to all of the site's registered visitors in advance", "By cloning the site to a separate domain and redirecting all of the traffic there permanently", "Only on weekends, when the volume of visiting customers is at its lowest measured level"], "a": 0, "ex": "Maintenance must be done without taking the site offline; approaches include locking out pages being changed with a notice, and date/time stamps of the most recent change.", "core": false, "sref": 7}, {"q": "When should a Website be reregistered with search engines?", "opts": ["When the content of the site changes significantly", "Every month, regardless of whether changes occurred", "Whenever any broken link is discovered and repaired", "Only when the site moves to a different domain name"], "a": 0, "ex": "Reregister a Website with search engines when the content of the site changes significantly.", "core": false, "sref": 7}], "essays": [{"q": "Discuss the four types of maintenance and their relative urgency, value, and share of activity.", "a": "Corrective maintenance repairs defects in the design, coding, or implementation of the system; most problems surface soon after installation, are typically urgent (resolved to curtail possible interruptions to normal business activities), account for 75% of all maintenance activity, and add little or no value — they remove defects without adding new functionality. Adaptive maintenance makes changes to evolve functionality to changing business needs or to migrate the system to a different operating environment; it is less urgent than corrective maintenance (changes occur over time), adds value to the organization, and constitutes a small part of all maintenance activity. Perfective maintenance makes enhancements to improve processing performance or interface usability or to add desired features; it is not really maintenance but rather new development. Preventive maintenance makes changes to reduce the chance of future system failure and has much lower priority than corrective maintenance."}, {"q": "Discuss the cost of maintenance and the factors influencing maintainability.", "a": "60% to 80% of organizations' IS budgets is allocated to maintenance activities; organizations accumulate more older (legacy) systems requiring more maintenance, and 52% of programmers are assigned to maintain in-house developed systems. These high costs mean understanding the factors influencing maintainability — the ease with which software can be understood, corrected, adapted, and enhanced; low maintainability leads to uncontrollable maintenance expenses. The main factors: the number of latent defects (unknown errors existing in the system after installation), the number of customers (generally, more customers mean greater maintenance costs), and documentation quality (without it, maintenance efforts can increase exponentially). Other, less influential factors are personnel, tools, and software structure."}, {"q": "Describe how maintenance is managed: personnel options, effectiveness measures, request control, and configuration management.", "a": "Maintenance is the largest segment of programming personnel, implying careful management. Personnel can be organized three ways: a maintenance group separated from the development group; the same people who build the system also maintain it; or the primary end users in functional units have their own maintenance personnel — each with advantages and disadvantages. Effectiveness is measured through the number of failures, the time between each failure, and the type of failure; mean time between failures (MTBF) shows the average time between two failures and should increase after a few months of use. Controlling maintenance requests means deciding which requests to perform and which to ignore, since some are more critical than others. Configuration management ensures only authorized changes are made: a baseline module is a software module that has been tested, documented, and approved for inclusion in the most recent system version, a system librarian controls the checking out and in of baseline source modules, and special software systems manage configuration and version control activities."}]}];

 #2a3450;border-radius:12px\"><text x=\"20\" y=\"24\" fill=\"#2dd4bf\" font-size=\"13\" font-family=\"monospace\">Activity diagram notation</text><circle cx=\"60\" cy=\"70\" r=\"9\" fill=\"#2dd4bf\"/><text x=\"60\" y=\"104\" fill=\"#8694b3\" text-anchor=\"middle\" font-size=\"10\">start</text><rect x=\"110\" y=\"52\" width=\"120\" height=\"36\" rx=\"16\" fill=\"none\" stroke=\"#2dd4bf\" stroke-width=\"2\"/><text x=\"170\" y=\"74\" fill=\"#cdd6ea\" text-anchor=\"middle\" font-size=\"11\" font-family=\"monospace\">Activity</text><text x=\"170\" y=\"104\" fill=\"#8694b3\" text-anchor=\"middle\" font-size=\"10\">rounded rect</text><path d=\"M300 52 L324 70 L300 88 L276 70 Z\" fill=\"none\" stroke=\"#2dd4bf\" stroke-width=\"2\"/><text x=\"300\" y=\"104\" fill=\"#8694b3\" text-anchor=\"middle\" font-size=\"10\">branch 1-in 2-out / merge 2-in 1-out</text><line x1=\"430\" y1=\"62\" x2=\"540\" y2=\"62\" stroke=\"#2dd4bf\" stroke-width=\"5\"/><text x=\"485\" y=\"104\" fill=\"#8694b3\" text-anchor=\"middle\" font-size=\"10\">fork / join (horizontal bar)</text><circle cx=\"600\" cy=\"70\" r=\"11\" fill=\"none\" stroke=\"#2dd4bf\" stroke-width=\"2\"/><circle cx=\"600\" cy=\"70\" r=\"6\" fill=\"#2dd4bf\"/><text x=\"600\" y=\"104\" fill=\"#8694b3\" text-anchor=\"middle\" font-size=\"10\">end</text></svg>", "bpmn_gateways": "<svg viewBox=\"0 0 660 175\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"BPMN gateway types\" style=\"width:100%;max-width:660px;height:auto;display:block;margin:14px auto;background:#10172b;border:1px solid #2a3450;border-radius:12px\"><text x=\"20\" y=\"24\" fill=\"#2dd4bf\" font-size=\"13\" font-family=\"monospace\">BPMN gateways (diamond = decision point)</text><path d=\"M120 50 L155 85 L120 120 L85 85 Z\" fill=\"none\" stroke=\"#2dd4bf\" stroke-width=\"2\"/><text x=\"120\" y=\"93\" fill=\"#2dd4bf\" text-anchor=\"middle\" font-size=\"20\" font-family=\"monospace\">X</text><text x=\"120\" y=\"145\" fill=\"#cdd6ea\" text-anchor=\"middle\" font-size=\"12\" font-family=\"monospace\">XOR</text><text x=\"120\" y=\"162\" fill=\"#8694b3\" text-anchor=\"middle\" font-size=\"10.5\">only ONE exit path</text><path d=\"M330 50 L365 85 L330 120 L295 85 Z\" fill=\"none\" stroke=\"#2dd4bf\" stroke-width=\"2\"/><text x=\"330\" y=\"93\" fill=\"#2dd4bf\" text-anchor=\"middle\" font-size=\"20\" font-family=\"monospace\">+</text><text x=\"330\" y=\"145\" fill=\"#cdd6ea\" text-anchor=\"middle\" font-size=\"12\" font-family=\"monospace\">AND</text><text x=\"330\" y=\"162\" fill=\"#8694b3\" text-anchor=\"middle\" font-size=\"10.5\">ALL paths in parallel</text><path d=\"M540 50 L575 85 L540 120 L505 85 Z\" fill=\"none\" stroke=\"#2dd4bf\" stroke-width=\"2\"/><text x=\"540\" y=\"93\" fill=\"#2dd4bf\" text-anchor=\"middle\" font-size=\"20\" font-family=\"monospace\">O</text><text x=\"540\" y=\"145\" fill=\"#cdd6ea\" text-anchor=\"middle\" font-size=\"12\" font-family=\"monospace\">OR</text><text x=\"540\" y=\"162\" fill=\"#8694b3\" text-anchor=\"middle\" font-size=\"10.5\">at least one path</text></svg>", "install_approaches": "<svg viewBox=\"0 0 460 288\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Installation approaches compared\" style=\"width:100%;max-width:460px;height:auto;display:block;margin:14px auto;background:#10172b;border:1px solid #2a3450;border-radius:12px\"><text x=\"20\" y=\"24\" fill=\"#2dd4bf\" font-size=\"13\" font-family=\"monospace\">Four installation approaches</text><text x=\"20\" y=\"59\" fill=\"#cdd6ea\" font-size=\"11\" font-family=\"monospace\">Direct</text><g transform=\"translate(0,46)\"><rect x=\"150\" y=\"0\" width=\"120\" height=\"16\" rx=\"5\" fill=\"#8694b3\" opacity=\"1\"/><text x=\"154\" y=\"12\" fill=\"#10172b\" font-size=\"9\" font-family=\"monospace\">OLD</text><rect x=\"272\" y=\"0\" width=\"150\" height=\"16\" rx=\"5\" fill=\"#2dd4bf\" opacity=\"1\"/><text x=\"276\" y=\"12\" fill=\"#10172b\" font-size=\"9\" font-family=\"monospace\">NEW</text></g><text x=\"20\" y=\"115\" fill=\"#cdd6ea\" font-size=\"11\" font-family=\"monospace\">Parallel</text><g transform=\"translate(0,102)\"><rect x=\"150\" y=\"0\" width=\"180\" height=\"16\" rx=\"5\" fill=\"#8694b3\" opacity=\"1\"/><text x=\"154\" y=\"12\" fill=\"#10172b\" font-size=\"9\" font-family=\"monospace\">OLD</text><rect x=\"150\" y=\"20\" width=\"272\" height=\"16\" rx=\"5\" fill=\"#2dd4bf\" opacity=\"1\"/><text x=\"154\" y=\"32\" fill=\"#10172b\" font-size=\"9\" font-family=\"monospace\">NEW</text></g><text x=\"20\" y=\"171\" fill=\"#cdd6ea\" font-size=\"11\" font-family=\"monospace\">Single-location</text><g transform=\"translate(0,158)\"><rect x=\"150\" y=\"0\" width=\"272\" height=\"16\" rx=\"5\" fill=\"#8694b3\" opacity=\"1\"/><text x=\"154\" y=\"12\" fill=\"#10172b\" font-size=\"9\" font-family=\"monospace\">OLD (other sites)</text><rect x=\"150\" y=\"20\" width=\"120\" height=\"16\" rx=\"5\" fill=\"#2dd4bf\" opacity=\"1\"/><text x=\"154\" y=\"32\" fill=\"#10172b\" font-size=\"9\" font-family=\"monospace\">NEW @ site 1</text><rect x=\"272\" y=\"20\" width=\"150\" height=\"16\" rx=\"5\" fill=\"#2dd4bf\" opacity=\"1\"/><text x=\"276\" y=\"32\" fill=\"#10172b\" font-size=\"9\" font-family=\"monospace\">NEW everywhere</text></g><text x=\"20\" y=\"227\" fill=\"#cdd6ea\" font-size=\"11\" font-family=\"monospace\">Phased</text><g transform=\"translate(0,214)\"><rect x=\"150\" y=\"0\" width=\"272\" height=\"16\" rx=\"5\" fill=\"#8694b3\" opacity=\"1\"/><text x=\"154\" y=\"12\" fill=\"#10172b\" font-size=\"9\" font-family=\"monospace\">OLD (remaining parts)</text><rect x=\"150\" y=\"20\" width=\"90\" height=\"16\" rx=\"5\" fill=\"#2dd4bf\" opacity=\"1\"/><text x=\"154\" y=\"32\" fill=\"#10172b\" font-size=\"9\" font-family=\"monospace\">NEW part 1</text><rect x=\"242\" y=\"20\" width=\"90\" height=\"16\" rx=\"5\" fill=\"#2dd4bf\" opacity=\"1\"/><text x=\"246\" y=\"32\" fill=\"#10172b\" font-size=\"9\" font-family=\"monospace\">part 2</text><rect x=\"334\" y=\"20\" width=\"88\" height=\"16\" rx=\"5\" fill=\"#2dd4bf\" opacity=\"1\"/><text x=\"338\" y=\"32\" fill=\"#10172b\" font-size=\"9\" font-family=\"monospace\">part 3</text></g><text x=\"150\" y=\"270\" fill=\"#8694b3\" font-size=\"10\" font-family=\"monospace\">time \u2192</text></svg>"};
const $=s=>document.querySelector(s);
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function mlabel(m){return "Module "+m.id+(m.optional?" (optional)":"")+": "+m.title}
function show(v){document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("act",t.dataset.v===v));
 ["ref","core","quiz","exam","essay"].forEach(x=>$("#v-"+x).style.display=x===v?"":"none");
 const on=(v==="quiz"&&quizState.active)||(v==="exam"&&examState.active)||(v==="core"&&coreState.active);
 $("#scorebar").style.display=on?"flex":"none";
 const rb=document.getElementById('returnBtn'); if(rb)rb.style.display='none';}
let returnTarget=null;
function gotoSlide(mid,sidx,fromView,qidx){
 if(fromView!==undefined&&qidx!==undefined)returnTarget={view:fromView,qid:fromView+'q'+qidx};
 show('ref');
 const el=document.getElementById('s'+mid+'_'+sidx);
 if(el){el.scrollIntoView({behavior:'smooth',block:'center'});
  el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),2200);}
 if(returnTarget){const rb=document.getElementById('returnBtn'); rb.style.display='flex';}
}
function returnToQuestion(){
 if(!returnTarget)return;
 const t=returnTarget;
 show(t.view);
 const el=document.getElementById(t.qid);
 if(el){el.scrollIntoView({behavior:'smooth',block:'center'});
  el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),2200);}
}

/* ---------- TAB 1: REFERENCE ---------- */
function renderRef(){
 let h='<div class="card"><div class="hint">Jump to module:</div>';
 DATA.forEach(m=>{h+='<span class="pill" onclick="document.getElementById(\'mod'+m.id+'\').scrollIntoView({behavior:\'smooth\'})">M'+m.id+(m.optional?'*':'')+'</span>'});
 h+='<div class="hint">* Module 13 is optional</div></div>';
 DATA.forEach(m=>{
  h+='<div class="modhead" id="mod'+m.id+'">'+esc(mlabel(m))+'</div>';
  m.slides.forEach((s,si)=>{
   h+='<div class="card slide" id="s'+m.id+'_'+si+'"><h3>'+esc(s.t)+'</h3><p>'+esc(s.d)+'</p>'+(s.svg&&SVGS[s.svg]?SVGS[s.svg]:'')+'</div>';
  });
 });
 $("#v-ref").innerHTML=h;
}

/* ---------- QUIZ ENGINE (shared) ---------- */
let quizState={active:false,score:0,answered:0,total:0};
let examState={active:false,score:0,answered:0,total:0};
let coreState={active:false,score:0,answered:0,total:0};
function ST(n){return n==='quiz'?quizState:n==='exam'?examState:coreState}
function makeQ(q,idx,stateName){
 const order=shuffle([0,1,2,3]);
 const mid=q._m.slice(1);
 let h='<div class="card" id="'+stateName+'q'+idx+'"><div class="qnum">Q'+(idx+1)+' · '+esc(q._m)+'</div><div class="qtext">'+esc(q.q)+'</div>';
 order.forEach(oi=>{h+='<button class="opt" data-c="'+(oi===0?1:0)+'" onclick="answer(this,\''+stateName+'\','+idx+')">'+esc(q.opts[oi])+'</button>'});
 h+='<div class="expl">'+esc(q.ex)+'</div>';
 h+='<button class="btn sec rev" onclick="gotoSlide('+mid+','+q.sref+',\''+stateName+'\','+idx+')">📖 Review in Slide Reference</button>';
 h+='</div>';
 return h;
}
function answer(btn,stateName,idx){
 const st=ST(stateName);
 const card=btn.closest('.card');
 if(card.dataset.done)return;
 card.dataset.done=1;
 const right=btn.dataset.c==="1";
 card.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.dataset.c==="1")b.classList.add('correct')});
 if(!right)btn.classList.add('wrong');
 card.querySelector('.expl').style.display='block';
 st.answered++; if(right)st.score++;
 updateBar(stateName);
 if(stateName==='exam'&&st.answered===st.total)examResults();
}
function updateBar(stateName){
 const st=ST(stateName);
 const pct=st.answered?Math.round(100*st.score/st.answered):0;
 $("#scorebar").innerHTML='<span>mode: <b>'+stateName+'</b></span><span>score: <b>'+st.score+'</b>/'+st.answered+' answered ('+st.total+' total)</span><span>accuracy: <b>'+pct+'%</b></span>';
 $("#scorebar").style.display='flex';
}

/* ---------- TAB: CORE SET ---------- */
const CORE_TOTAL=DATA.reduce((a,m)=>a+m.qs.filter(q=>q.core).length,0);
function renderCoreMenu(){
 let h='<div class="card"><div class="hint">★ <b>Core Set</b> — a curated subset of '+CORE_TOTAL+' highest-yield questions (key definitions, lists/steps, and the worked-number items) drawn from the full bank. Best for a focused final review. Pick a module or ALL.</div>';
 h+='<span class="pill" onclick="startCore(0)">ALL core</span>';
 DATA.forEach(m=>{const n=m.qs.filter(q=>q.core).length;h+='<span class="pill" onclick="startCore('+m.id+')">M'+m.id+(m.optional?'*':'')+' <span style="color:var(--mut)">('+n+')</span></span>'});
 h+='<div class="hint">* Module 13 is optional</div></div><div id="coreArea"></div>';
 $("#v-core").innerHTML=h;
}
function startCore(mid){
 let qs=[];
 DATA.forEach(m=>{if(mid===0||m.id===mid)m.qs.forEach(q=>{if(q.core)qs.push(Object.assign({_m:"M"+m.id},q))})});
 if(mid===0)qs=shuffle(qs);
 coreState={active:true,score:0,answered:0,total:qs.length};
 let h='<div class="hint">'+qs.length+' core questions'+(mid?' — '+esc(mlabel(DATA.find(m=>m.id===mid))):' — all modules, shuffled')+'</div>';
 qs.forEach((q,i)=>h+=makeQ(q,i,'core'));
 h+='<button class="btn sec" onclick="renderCoreMenu();coreState.active=false;updateBarHide()">↺ back to module list</button>';
 document.getElementById('coreArea').innerHTML=h;
 updateBar('core'); window.scrollTo({top:0});
}

/* ---------- TAB 2: QUIZ ---------- */
function renderQuizMenu(){
 let h='<div class="card"><div class="hint">Pick a module (or ALL) — instant feedback, explanation per answer, options shuffled.</div>';
 h+='<span class="pill" onclick="startQuiz(0)">ALL modules</span>';
 DATA.forEach(m=>{h+='<span class="pill" onclick="startQuiz('+m.id+')">M'+m.id+(m.optional?'*':'')+'</span>'});
 h+='</div><div id="quizArea"></div>';
 $("#v-quiz").innerHTML=h;
}
function startQuiz(mid){
 let qs=[];
 DATA.forEach(m=>{if(mid===0||m.id===mid)m.qs.forEach(q=>qs.push(Object.assign({_m:"M"+m.id},q)))});
 if(mid===0)qs=shuffle(qs);
 quizState={active:true,score:0,answered:0,total:qs.length};
 let h='<div class="hint">'+qs.length+' questions'+(mid?' — '+esc(mlabel(DATA.find(m=>m.id===mid))):' — all modules, shuffled')+'</div>';
 qs.forEach((q,i)=>h+=makeQ(q,i,'quiz'));
 h+='<button class="btn sec" onclick="renderQuizMenu();quizState.active=false;updateBarHide()">↺ back to module list</button>';
 document.getElementById('quizArea').innerHTML=h;
 updateBar('quiz'); window.scrollTo({top:0});
}
function updateBarHide(){$("#scorebar").style.display='none'}

/* ---------- TAB 3: EXAM ---------- */
function renderExamMenu(){
 let h='<div class="card"><div class="hint">Random questions across ALL modules (Module 13 included). Results screen with percentage and verdict at the end.</div>';
 [20,40,60].forEach(n=>{h+='<button class="btn" style="margin-right:10px" onclick="startExam('+n+')">'+n+' questions</button>'});
 h+='</div><div id="examArea"></div>';
 $("#v-exam").innerHTML=h;
}
function startExam(n){
 let pool=[]; DATA.forEach(m=>m.qs.forEach(q=>pool.push(Object.assign({_m:"M"+m.id},q))));
 const qs=shuffle(pool).slice(0,n);
 examState={active:true,score:0,answered:0,total:n};
 let h='<div class="hint">Exam: '+n+' random questions. Answer all to see your result.</div>';
 qs.forEach((q,i)=>h+=makeQ(q,i,'exam'));
 h+='<div id="examResult"></div><button class="btn sec" onclick="renderExamMenu();examState.active=false;updateBarHide()">↺ abort / new exam</button>';
 document.getElementById('examArea').innerHTML=h;
 updateBar('exam'); window.scrollTo({top:0});
}
function examResults(){
 const pct=Math.round(100*examState.score/examState.total);
 let v,who;
 if(pct>=90){v="ممتاز — Excellent. You own this material.";who="🏆"}
 else if(pct>=80){v="Very good — a light review of your misses and you're set.";who="✅"}
 else if(pct>=65){v="Good — revisit the explanations of the questions you missed.";who="📘"}
 else if(pct>=50){v="Passing zone — go back to the Slide Reference for weak modules.";who="⚠️"}
 else{v="Below passing — work module by module through the Reference tab, then retry.";who="🔁"}
 document.getElementById('examResult').innerHTML='<div class="card result"><h2>'+who+' Exam result</h2><div class="bar"><div style="width:'+pct+'%"></div></div><div class="verdict"><b>'+examState.score+'/'+examState.total+' — '+pct+'%</b></div><div>'+v+'</div></div>';
 document.getElementById('examResult').scrollIntoView({behavior:'smooth'});
}

/* ---------- TAB 4: ESSAY ---------- */
function renderEssay(){
 let h='<div class="card"><div class="hint">Random exam-style essay questions (Discuss / Explain / Compare / Describe). Tap to reveal the model answer.</div>';
 h+='<select id="essayMod"><option value="0">All modules</option>';
 DATA.forEach(m=>{h+='<option value="'+m.id+'">'+esc(mlabel(m))+'</option>'});
 h+='</select> <button class="btn" onclick="drawEssay()">🎲 random essay</button></div><div id="essayArea"></div>';
 $("#v-essay").innerHTML=h;
}
function drawEssay(){
 const mid=+document.getElementById('essayMod').value;
 let pool=[]; DATA.forEach(m=>{if(mid===0||m.id===mid)m.essays.forEach(e=>pool.push(Object.assign({_m:mlabel(m)},e)))});
 const e=pool[Math.floor(Math.random()*pool.length)];
 document.getElementById('essayArea').innerHTML='<div class="card"><div class="qnum">'+esc(e._m)+'</div><div class="essayq">'+esc(e.q)+'</div><button class="btn sec" onclick="this.nextElementSibling.style.display=\'block\';this.style.display=\'none\'">👁 reveal model answer</button><div class="reveal">'+esc(e.a)+'</div></div>';
}

renderRef(); renderCoreMenu(); renderQuizMenu(); renderExamMenu(); renderEssay();
</script>
