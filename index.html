<script>
const DATA=[{"id": 1, "title": "Foundations: Systems Development", "optional": false, "slides": [{"t": "Information Systems Analysis and Design", "d": "The complex organizational process whereby computer-based information systems are developed and maintained. Analyzing and designing information systems gives you the chance to understand organizations in depth and breadth. An important result of this process is application software — computer software designed to support organizational functions or processes.", "svg": null}, {"t": "The Systems Analyst", "d": "The organizational role most responsible for the analysis and design of information systems. The primary role is to study the problems and needs of an organization to determine how people, methods, and information technology can best be combined to bring about improvements. The analyst helps users and business managers define requirements for new or enhanced services, and is an agent of change and innovation.", "svg": null}, {"t": "Methodologies, Techniques, and Tools", "d": "The organizational approach to systems analysis and design is driven by three elements. Methodologies are comprehensive, multiple-step approaches that guide work and influence final product quality; the methodology adopted depends on management style (e.g., consensus orientation). Techniques are particular processes the analyst follows to ensure work is well thought out, complete, and comprehensible (information gathering, planning, diagramming logic, designing interfaces). Tools are computer programs that make it easy to use techniques and follow the methodology. The three work together as an organizational approach.", "svg": null}, {"t": "Historical Perspective of Development", "d": "1950s: focus on the processes the software performed. 1960s: advent of 3GL, faster and more reliable computers. 1970s: development becomes more like an engineering discipline. 1980s: major breakthrough with 4GL, CASE tools, and object-oriented methods. 1990s: focus on system integration, GUI applications, client/server platforms, and the Internet. The new century: Web application development, wireless PDAs, and component-based applications.", "svg": null}, {"t": "SDLC and Methodology", "d": "A systems development methodology is a standard process followed in an organization to conduct all the steps necessary to analyze, design, implement, and maintain information systems. The systems development life cycle (SDLC) is the traditional methodology used to develop, maintain, and replace information systems. An evolutionary view considers the life cycle as a spiral, constantly cycling through the phases at different levels of detail.", "svg": null}, {"t": "Planning Phase (SDLC)", "d": "The first phase of the SDLC, in which an organization's total information system needs are identified, analyzed, prioritized, and arranged.", "svg": null}, {"t": "Analysis Phase (SDLC)", "d": "The second phase of the SDLC, in which system requirements are studied and structured. It has two sub-phases: requirements determination (determine what users want from the proposed system) and requirements analysis (study the requirements, structure them according to their interrelationships, and eliminate any redundancies).", "svg": null}, {"t": "Design Phase (SDLC)", "d": "The third phase of the SDLC, in which the description of the recommended solution is converted into logical and then physical system specifications. Logical design describes all functional features of the system independently of any computer platform. Physical design transforms the logical specifications into technology-specific details from which all programming and system construction can be accomplished.", "svg": null}, {"t": "Implementation Phase (SDLC)", "d": "The fourth phase, where analysts turn system specifications into a working system that is tested and put into use. Activities: coding (programmers write the programs), testing (programmers and analysts test individual programs and the entire system to find and correct errors), installation (the new system becomes part of daily activities; software is loaded and users are introduced and trained), and support (finalization of documentation, training programs, and ongoing user assistance).", "svg": null}, {"t": "Maintenance Phase (SDLC)", "d": "The final phase of the SDLC, in which an information system is systematically repaired and improved. Programmers make changes that users ask for and modify the system to reflect evolving business conditions. Maintenance is not a separate phase but a repetition of the other life-cycle phases required to study and implement the needed changes.", "svg": null}, {"t": "Heart of Systems Development", "d": "Current practice combines the activities of analysis, design, and implementation into a single analysis–design–code–test process: requirements produced in analysis, specifications created in design, coding and testing at the beginning of implementation. This combination of activities is typical of current practice in agile methodologies.", "svg": null}, {"t": "Traditional Waterfall SDLC and Its Problems", "d": "In the waterfall SDLC, one phase begins when another completes, with little backtracking and looping. Problems: it locks users into requirements that had been previously determined even though they might have changed; the role of system users or customers is narrowly defined; intangible processes like analysis and design are given hard-and-fast completion dates, and success is overwhelmingly measured by whether those dates are met.", "svg": null}, {"t": "Alternatives to the Waterfall", "d": "Alternatives to the traditional waterfall SDLC include prototyping, CASE tools, Joint Application Design (JAD), Rapid Application Development (RAD), Agile Methodologies, and eXtreme Programming.", "svg": null}, {"t": "Agile and eXtreme Programming", "d": "Agile methodologies are guided by the Agile Manifesto and 12 Agile Principles. eXtreme Programming is an approach put together by Beck and Andres featuring short, incremental development cycles; automated tests; two-person programming teams; and coding and testing operating together. Advantages: communication between developers, a high level of productivity, and high-quality code. Scrum is also presented among the agile approaches.", "svg": null}, {"t": "Object-Oriented Analysis and Design", "d": "Systems development methodologies and techniques based on objects rather than data or processes.", "svg": null}, {"t": "Systems Acquisition", "d": "Internal IS departments now spend a smaller proportion of time developing systems from scratch, investing instead in packaged software, open-source software, and outsourced services. Organizations today have many choices when seeking an information system.", "svg": null}, {"t": "Outsourcing", "d": "The practice of turning over responsibility for some or all of an organization's information systems applications and operations to an outside firm; if one organization develops or runs an application for another, that is outsourcing. Benefits: it may be cost-effective, frees up internal resources, increases revenue potential, reduces time to market, increases process efficiencies, and outsources non-core activities.", "svg": null}, {"t": "Six Sources of Application Software", "d": "There are six major categories of software sources, representing points along a continuum of options with many hybrid combinations: IT services firms, packaged software producers, cloud computing, open-source software, in-house development, and enterprise-wide solutions vendors (compared by the course in a sources-of-software table).", "svg": null}, {"t": "IT Services Firms", "d": "When a company needs an information system but has no expertise and no off-the-shelf system is available, it consults an IT services firm. These firms help companies develop custom systems for internal use, or develop, host, and run applications for customers, or provide other services. Consultants use many of the same methodologies, techniques, and tools that companies use in-house; for example, consultants who work with banks understand financial institutions as well as information systems.", "svg": null}, {"t": "Packaged Software Producers and Turnkey Systems", "d": "Microsoft is the leader in prepackaged software production. Prepackaged software is off-the-shelf software; often it is turnkey software. Turnkey systems are off-the-shelf software systems that cannot be modified to meet the specific, individual needs of a particular organization.", "svg": null}, {"t": "Cloud Computing as a Source", "d": "Cloud computing refers to the provision of applications or related services over the Internet, where customers do not have to invest in the hardware and software resources needed to run and maintain the applications. A well-known example is Google Docs, Sheets, and Slides. Cloud computing encompasses many areas of technology, including SaaS, PaaS, and IaaS.", "svg": null}, {"t": "Open-Source Software", "d": "Freely available software — not just the final product but the source code itself — developed by a community of interested people instead of employees of a particular company. Well-known examples: Linux, MySQL, and Firefox. Companies and individuals make money with open source in two primary ways: by providing maintenance and other services, or by providing one version free and selling a more fully featured version.", "svg": null}, {"t": "In-House Development", "d": "If sufficient development expertise with the chosen platform exists in-house, some or all of the system can be developed by the organization's own staff. Often a variety of sources are used, with in-house staff playing a role alongside consultants or ERP vendors. In-house development can lead to a larger maintenance burden than other methods, such as packaged applications.", "svg": null}, {"t": "Software Reuse — Definition and Why", "d": "Reuse is the use of previously written software resources (objects and components) in new applications. Why reuse? It increases programmer productivity (existing software for some functions means more work in the same time); it should decrease development time and minimize schedule overruns since existing pieces have already been tested; and it results in higher-quality software with lower defect rates, decreasing maintenance costs.", "svg": null}, {"t": "Reuse — Enabling Technologies", "d": "Two primary enabling technologies. Object-oriented development: an object class encapsulates data and behavior of common organizational entities (e.g., employees); the class contains both data and the definition of functions; when reusing, changes are made only to the object, not the various applications that used it. Component-based development: components can be single objects or functional groupings of objects (e.g., currency conversion); the focus is creating general-purpose pieces of software usable interchangeably in many programs, and assembling an application from many components at many levels of complexity and size.", "svg": null}, {"t": "Reuse — Success Factors and Economics", "d": "Reuse has become a standard part of corporate systems development. Success factors include knowledge of the domain in which reuse is to occur, customer support, the commitment and understanding of senior management, sound organizational processes, and skilled and experienced developers. Due to the considerable costs of developing a reusable component, most organizations cannot compete economically with established commercial component vendors; success depends on leveraging component cost across a large user and project base. Benefits grow with corporate experience — but so do the costs and resources required.", "svg": null}, {"t": "Three Basic Steps of Reuse", "d": "Abstraction involves the design of a reusable piece of software, starting from existing software assets or from scratch. Storage involves making software assets available for others to use — the challenge is not putting assets on a shelf but correctly labeling and cataloging them so others can find what they want. Recontextualization involves making the reusable asset understandable to developers who want to use it in their systems. The course also presents four approaches to reuse.", "svg": null}], "qs": [{"q": "What is information systems analysis and design, as defined in the course?", "opts": ["The complex organizational process whereby computer-based information systems are developed and maintained", "The technical procedure of converting program code into machine instructions for organizational hardware", "The financial process of budgeting and allocating funds for an organization's computing resources", "The administrative routine of cataloging and archiving an organization's existing software licenses"], "a": 0, "ex": "The course defines IS analysis and design as the complex organizational process whereby computer-based information systems are developed and maintained.", "core": true, "sref": 0}, {"q": "What is application software?", "opts": ["Computer software designed to support organizational functions or processes", "Low-level software that manages hardware resources and device drivers", "Software used exclusively for testing and debugging other programs", "Networking software that routes packets between distributed computers"], "a": 0, "ex": "Application software is computer software designed to support organizational functions or processes — an important result of systems analysis and design.", "core": true, "sref": 0}, {"q": "Which organizational role is most responsible for the analysis and design of information systems?", "opts": ["The systems analyst", "The database administrator", "The chief financial officer", "The network technician"], "a": 0, "ex": "The systems analyst is the organizational role most responsible for the analysis and design of information systems.", "core": false, "sref": 0}, {"q": "What is the PRIMARY role of a systems analyst?", "opts": ["To study an organization's problems and needs to determine how people, methods, and IT can best be combined to bring improvements", "To write, compile, and personally test all of the production source code for every new information system the organization builds", "To manage the payroll, hiring, and performance reviews of the IT department staff", "To purchase, install, and physically maintain the organization's server hardware"], "a": 0, "ex": "The analyst's primary role is to study problems and needs in order to determine how people, methods, and information technology can best be combined to bring about improvements.", "core": true, "sref": 1}, {"q": "In the course, the systems analyst is described as an agent of what?", "opts": ["Change and innovation", "Compliance and auditing", "Marketing and sales", "Security and encryption"], "a": 0, "ex": "A systems analyst is described as an agent of change and innovation.", "core": false, "sref": 1}, {"q": "What are methodologies in systems development?", "opts": ["Comprehensive, multiple-step approaches to systems development that guide work and influence the quality of the final product", "Single-purpose computer programs that automate one specific diagramming or documentation activity for the project team", "Legal documents that define contractual duties between developers and clients", "Hardware configurations that determine the speed of the development servers"], "a": 0, "ex": "Methodologies are comprehensive, multiple-step approaches to systems development that guide your work and influence the quality of the final product.", "core": true, "sref": 2}, {"q": "According to the course, what does the methodology adopted by an organization depend on?", "opts": ["The general management style of the organization", "The number of programmers employed in the IT unit", "The age of the organization's hardware platform", "The geographic distance between branch offices"], "a": 0, "ex": "The methodology adopted depends on the general management style — e.g., an orientation toward consensus management influences the choice of methodology.", "core": false, "sref": 2}, {"q": "What are techniques in systems analysis and design?", "opts": ["Particular processes an analyst follows to ensure work is well thought out, complete, and comprehensible to the project team", "Computer programs that automatically generate complete database schemas and program code from scanned business forms", "Government standards that certify the security level of an information system", "Budget categories used to allocate development costs across departments"], "a": 0, "ex": "Techniques are particular processes that an analyst follows to ensure the work is well thought out, complete, and comprehensible to others on the project team.", "core": true, "sref": 2}, {"q": "What are tools in the organizational approach to systems analysis and design?", "opts": ["Computer programs that make it easy to use techniques and to follow the guidelines of the overall methodology", "Manual checklists and questionnaires used to interview stakeholders during the planning phase of a project", "Physical instruments used to install and wire network equipment", "Financial models that compute the return on investment of a project"], "a": 0, "ex": "Tools are typically computer programs that make it easy to use and benefit from techniques and to follow the overall development methodology.", "core": true, "sref": 2}, {"q": "In the historical perspective, the 1980s saw a major breakthrough in which technologies?", "opts": ["4GL, CASE tools, and object-oriented methods", "3GL and faster, more reliable computers", "GUI applications and client/server platforms", "Web applications and wireless PDAs"], "a": 0, "ex": "The 1980s brought the major breakthrough of 4GL, CASE tools, and object-oriented methods. (3GL belongs to the 1960s; GUI/client-server to the 1990s; Web/PDAs to the new century.)", "core": true, "sref": 3}, {"q": "In the historical perspective, the 1990s focused on which of the following?", "opts": ["System integration, GUI applications, client/server platforms, and the Internet", "Engineering-discipline development practices and more reliable computer hardware platforms", "Processes the software performed", "Component-based applications and wireless PDAs"], "a": 0, "ex": "The 1990s focused on system integration, GUI applications, client/server platforms, and the Internet.", "core": true, "sref": 3}, {"q": "What is a systems development methodology?", "opts": ["A standard process followed in an organization to conduct all steps necessary to analyze, design, implement, and maintain information systems", "A diagramming notation used only to model the flow of data between the processes, stores, and external entities of one system", "A contract template that defines deliverables between a vendor and a customer", "A scheduling chart that shows each task as a horizontal time bar"], "a": 0, "ex": "A systems development methodology is a standard process followed in an organization to conduct all the steps necessary to analyze, design, implement, and maintain information systems.", "core": true, "sref": 4}, {"q": "What is the systems development life cycle (SDLC)?", "opts": ["The traditional methodology used to develop, maintain, and replace information systems", "A modern agile framework based on two-week sprints and daily standups", "A testing strategy that combines modules and tests them incrementally", "A documentation standard for recording user manuals and help files"], "a": 0, "ex": "The SDLC is the traditional methodology used to develop, maintain, and replace information systems.", "core": true, "sref": 4}, {"q": "The evolutionary view of the SDLC considers the life cycle to be what shape?", "opts": ["A spiral, constantly cycling through phases at different levels of detail", "A straight line with strictly sequential, non-repeating phases", "A tree with branches for each subsystem of the project", "A grid of independent activities executed simultaneously"], "a": 0, "ex": "The evolutionary view considers the life cycle to be a spiral, constantly cycling through the phases at different levels of detail.", "core": false, "sref": 4}, {"q": "In which SDLC phase are an organization's total information system needs identified, analyzed, prioritized, and arranged?", "opts": ["Planning", "Analysis", "Design", "Implementation"], "a": 0, "ex": "Planning is the first phase of the SDLC, where total IS needs are identified, analyzed, prioritized, and arranged.", "core": false, "sref": 5}, {"q": "Which SDLC phase studies and structures system requirements?", "opts": ["Analysis", "Planning", "Design", "Maintenance"], "a": 0, "ex": "Analysis is the second phase of the SDLC, in which system requirements are studied and structured.", "core": false, "sref": 6}, {"q": "What are the two sub-phases of the analysis phase?", "opts": ["Requirements determination and requirements analysis", "Logical design and physical design of the solution", "Coding and testing", "Project initiation and project planning"], "a": 0, "ex": "Analysis has two sub-phases: requirements determination (what users want) and requirements analysis (structuring requirements and eliminating redundancies).", "core": true, "sref": 6}, {"q": "In the analysis phase, what is the purpose of requirements analysis?", "opts": ["To study requirements, structure them according to their interrelationships, and eliminate any redundancies", "To convert the recommended solution into technology-specific physical specifications ready for system construction", "To load the application onto new hardware and train the users on the system", "To identify and prioritize the organization's total information system needs"], "a": 0, "ex": "Requirements analysis studies the requirements and structures them according to their interrelationships, eliminating any redundancies.", "core": false, "sref": 6}, {"q": "What happens in the design phase of the SDLC?", "opts": ["The description of the recommended solution is converted into logical and then physical system specifications", "The organization's total information system needs are identified, analyzed, prioritized, and then arranged", "Individual programs and the entire system are tested to find and correct errors", "The information system is systematically repaired and improved after release"], "a": 0, "ex": "Design is the third phase, where the description of the recommended solution is converted into logical and then physical system specifications.", "core": false, "sref": 7}, {"q": "What characterizes LOGICAL design?", "opts": ["All functional features of the chosen system are described independently of any computer platform", "Logical specifications are transformed into technology-specific construction details", "Program code is written and individual modules are compiled", "Existing data and procedures are converted to the new system"], "a": 0, "ex": "Logical design describes all functional features of the system chosen in analysis, independently of any computer platform.", "core": false, "sref": 7}, {"q": "What characterizes PHYSICAL design?", "opts": ["Logical specifications are transformed into technology-specific details from which programming and construction can be accomplished", "Functional features of the system are described independently of any specific computer platform or technology", "Users' wants and needs are gathered from as many sources as possible", "Daily operation of the system is monitored and supported in the organization"], "a": 0, "ex": "Physical design transforms the logical specifications into technology-specific details from which all programming and system construction can be accomplished.", "core": false, "sref": 7}, {"q": "Which four activities make up the implementation phase?", "opts": ["Coding, testing, installation, and support", "Planning, analysis, design, and maintenance", "Abstraction, storage, recontextualization, and reuse", "Initiation, execution, monitoring, and closedown"], "a": 0, "ex": "Implementation activities are coding, testing, installation, and support in the organization.", "core": true, "sref": 8}, {"q": "During implementation, what does 'installation' mean?", "opts": ["The new system becomes part of the daily activities of the organization; software is loaded and users are introduced and trained", "Programmers write the programs that make up the new system from the design specifications they receive", "Documentation is finalized, training programs are arranged, and ongoing user assistance is established", "Analysts and programmers test the individual programs and then the entire system to find and correct errors"], "a": 0, "ex": "Installation means the new system becomes part of daily activities: application software is installed/loaded, and users are introduced to the new system and trained.", "core": false, "sref": 8}, {"q": "Which statement about the maintenance phase is correct, per the course?", "opts": ["It is not a separate phase but a repetition of the other life-cycle phases required to study and implement needed changes", "It is the shortest and least expensive phase of the cycle, since the system is already complete and fully tested", "It only involves hardware repairs and excludes software modification entirely", "It begins before installation so users never experience system downtime"], "a": 0, "ex": "Maintenance is described as not a separate phase but a repetition of the other life-cycle phases required to study and implement the needed changes.", "core": false, "sref": 9}, {"q": "What does 'the heart of systems development' refer to?", "opts": ["Combining analysis, design, code, and test activities into a single process, typical of agile methodologies", "Separating each SDLC phase strictly with sign-off gates so that no two activities can ever overlap", "Outsourcing all coding work to specialized information technology firms", "Centralizing all project documentation inside one online repository"], "a": 0, "ex": "Current practice combines analysis–design–code–test into a single process — the heart of systems development, typical of agile methodologies.", "core": false, "sref": 10}, {"q": "Which is a stated problem of the traditional waterfall SDLC?", "opts": ["Locking users into previously determined requirements even though those requirements might have changed", "Requiring two-person programming teams and automated tests for every coding task in the project", "Forcing developers to release untested software to users early", "Preventing managers from measuring whether completion dates are met"], "a": 0, "ex": "Waterfall problems include locking users into requirements determined earlier even if they changed, a narrowly defined user role, and hard dates for intangible processes.", "core": false, "sref": 11}, {"q": "In the waterfall model, how is success overwhelmingly measured?", "opts": ["By whether hard-and-fast completion dates for phases are met", "By the number of features delivered beyond the original scope", "By the satisfaction scores users report after installation", "By the defect rate found during integration testing"], "a": 0, "ex": "In waterfall, intangible processes are given hard-and-fast dates and success is overwhelmingly measured by whether those dates are met.", "core": false, "sref": 11}, {"q": "Which of the following is listed as an alternative to the traditional waterfall SDLC?", "opts": ["Joint Application Design (JAD)", "Functional decomposition", "Gap analysis", "Value chain analysis"], "a": 0, "ex": "Alternatives listed: prototyping, CASE tools, JAD, RAD, Agile Methodologies, and eXtreme Programming.", "core": false, "sref": 12}, {"q": "Who put together the eXtreme Programming approach?", "opts": ["Beck and Andres", "Valacich and George", "Bruegge and Dutoit", "Jacobson and Cockburn"], "a": 0, "ex": "eXtreme Programming is an approach to software development put together by Beck and Andres.", "core": false, "sref": 13}, {"q": "Which is a feature of eXtreme Programming?", "opts": ["Short, incremental development cycles with automated tests and two-person programming teams", "Long sequential phases with formal sign-off gates between each stage and no overlap of activities", "Solo programming with manual testing performed only at project end", "Mandatory off-site meetings between users and managers for several days"], "a": 0, "ex": "XP features short incremental cycles, automated tests, two-person teams, and coding and testing operating together.", "core": false, "sref": 13}, {"q": "Which of the following is listed as an ADVANTAGE of eXtreme Programming?", "opts": ["Communication between developers, high productivity, and high-quality code", "Reduced need for customers to participate in the development effort", "Elimination of the testing activity from the development cycle", "Guaranteed fixed costs for any project regardless of scope changes"], "a": 0, "ex": "XP advantages: communication between developers, high level of productivity, and high-quality code.", "core": false, "sref": 13}, {"q": "What is object-oriented analysis and design (OOAD)?", "opts": ["Systems development methodologies and techniques based on objects rather than data or processes", "A database normalization approach based on the functional dependencies between attribute values", "A network design method based on packet routing between clients", "A testing methodology based on inspecting code for well-known errors"], "a": 0, "ex": "OOAD comprises systems development methodologies and techniques based on objects rather than data or processes.", "core": true, "sref": 14}, {"q": "What is outsourcing?", "opts": ["Turning over responsibility for some or all of an organization's IS applications and operations to an outside firm", "Developing every information system internally using only the organization's own permanent staff", "Selling the organization's internally built software to other companies", "Replacing all custom software with free open-source equivalents"], "a": 0, "ex": "Outsourcing is the practice of turning over responsibility for some or all of an organization's information systems applications and operations to an outside firm.", "core": true, "sref": 16}, {"q": "Which of the following is among the stated benefits of outsourcing?", "opts": ["Freeing up internal resources and reducing time to market", "Eliminating the need for any contractual agreements", "Guaranteeing that no project will ever be cancelled", "Removing the requirement to define system requirements"], "a": 0, "ex": "Benefits listed: cost-effectiveness, freeing internal resources, increasing revenue potential, reducing time to market, increasing process efficiencies, and outsourcing non-core activities.", "core": false, "sref": 16}, {"q": "How many major categories of application software sources does the course identify?", "opts": ["Six", "Four", "Eight", "Three"], "a": 0, "ex": "There are six major categories of software sources, representing points along a continuum with many hybrid combinations.", "core": true, "sref": 17}, {"q": "When should an organization consult an IT services firm?", "opts": ["When it needs a system but lacks expertise and no off-the-shelf system is available", "When it wants free community software whose source code is openly published for modification", "When it has strong in-house expertise with the chosen platform", "When a turnkey package already matches its needs exactly"], "a": 0, "ex": "An organization consults an IT services firm when it needs a system but has no expertise and no off-the-shelf system is available.", "core": false, "sref": 21}, {"q": "Which company is identified as the leader in prepackaged software production?", "opts": ["Microsoft", "Oracle", "IBM", "Google"], "a": 0, "ex": "Microsoft is identified as the leader in prepackaged software production.", "core": false, "sref": 19}, {"q": "What is a turnkey system?", "opts": ["An off-the-shelf software system that cannot be modified to meet the specific needs of a particular organization", "A custom-developed system delivered together with full source code for unlimited future modification by the buyer", "A free community-developed system maintained by volunteers", "A cloud service billed to customers strictly on a per-use basis"], "a": 0, "ex": "Turnkey systems are off-the-shelf systems that cannot be modified to meet the specific, individual needs of a particular organization.", "core": true, "sref": 19}, {"q": "Which example does the course give of cloud computing?", "opts": ["Google Docs, Sheets, and Slides", "Linux, MySQL, and Firefox", "Microsoft Project network diagrams", "IBM's JAD sessions from the 1970s"], "a": 0, "ex": "Google Docs, Sheets, and Slides are given as a well-known cloud computing example, where users share and create documents, spreadsheets, and presentations.", "core": false, "sref": 20}, {"q": "Cloud computing encompasses which areas of technology, per the course?", "opts": ["SaaS, PaaS, and IaaS", "B2B, B2C, and C2C", "XML, JSON, and CSS", "2NF, 3NF, and BCNF"], "a": 0, "ex": "Cloud computing encompasses many areas of technology, including SaaS, PaaS, and IaaS.", "core": false, "sref": 20}, {"q": "What distinguishes open-source software?", "opts": ["It is freely available — not just the final product but the source code itself — and developed by a community of interested people", "It is sold only under annual commercial licenses with the binary code hidden from all of its customers", "It is built exclusively by one company's own employees and may never be redistributed to anyone outside the firm", "It can only run on specialized proprietary hardware platforms"], "a": 0, "ex": "Open-source software is freely available, including the source code, and is developed by a community of interested people instead of employees of one company.", "core": false, "sref": 21}, {"q": "According to the course, what are the two primary ways to make money with open source?", "opts": ["Providing maintenance and other services, or offering a free version while selling a more fully featured version", "Charging customers for the source code itself, or selling advertising space embedded inside the application screens", "Renting hardware to users, or reselling competitor licenses", "Collecting government subsidies, or taxing downstream developers"], "a": 0, "ex": "Money is made by providing maintenance and other services, or by providing one version free and selling a more fully featured version.", "core": true, "sref": 21}, {"q": "What maintenance implication does the course attach to in-house development?", "opts": ["It can lead to a larger maintenance burden than other methods, such as packaged applications", "It removes the need for any maintenance at all because the staff already know the code thoroughly", "It always transfers maintenance responsibility to an outside firm", "It guarantees lower defect rates than any packaged software"], "a": 0, "ex": "In-house development can lead to a larger maintenance burden than other development methods, such as packaged applications.", "core": false, "sref": 22}, {"q": "What is software reuse?", "opts": ["The use of previously written software resources — objects and components — in new applications", "The recycling of obsolete computer hardware for use in the development and testing laboratories", "The re-execution of the same test suite on every nightly build", "The republishing of user documentation across multiple projects"], "a": 0, "ex": "Reuse is the use of previously written software resources (objects and components) in new applications.", "core": true, "sref": 23}, {"q": "Why does reuse tend to decrease development time?", "opts": ["Because existing pieces of software have already been tested", "Because it removes the need for any project planning", "Because it eliminates the implementation phase entirely", "Because managers can skip the requirements phase"], "a": 0, "ex": "Reuse should decrease development time, minimizing schedule overruns, because existing pieces of software have already been tested.", "core": false, "sref": 23}, {"q": "What are the two primary enabling technologies of reuse?", "opts": ["Object-oriented development and component-based development", "Prototyping and joint application design sessions", "Cloud computing and outsourcing", "Functional decomposition and gap analysis"], "a": 0, "ex": "The primary enabling technologies are object-oriented development and component-based development.", "core": true, "sref": 24}, {"q": "In object-oriented development, what does an object class encapsulate?", "opts": ["The data and behavior of common organizational entities, such as employees", "Only the visual layout of the forms and report screens shown to users", "Only the network addresses of distributed components", "The budget and schedule constraints of the project"], "a": 0, "ex": "An object class encapsulates data and behavior of common organizational entities (e.g., employees), containing both data and the definition of the object's functions.", "core": false, "sref": 24}, {"q": "What is the focus of component-based development?", "opts": ["Creating general-purpose pieces of software that can be used interchangeably in many different programs", "Designing every new program entirely from scratch in order to maximize its uniqueness and value", "Restricting every component so it can serve only a single application", "Translating logical models directly into physical database tables"], "a": 0, "ex": "Component-based development focuses on creating general-purpose pieces of software usable interchangeably in many programs, assembling applications from components of many sizes — e.g., currency conversion.", "core": true, "sref": 24}, {"q": "Why can't most organizations compete economically with commercial component vendors?", "opts": ["Because of the considerable costs of developing a reusable component; success depends on leveraging cost across a large user and project base", "Because component development is legally restricted to licensed firms certified by industry regulators and standards bodies", "Because reusable components only run on rare specialized hardware", "Because reuse always increases defect rates beyond acceptable limits"], "a": 0, "ex": "Due to the considerable costs of developing reusable components, most organizations cannot compete with established vendors; success depends on leveraging the cost across a large user and project base.", "core": false, "sref": 25}, {"q": "What are the three basic steps of software reuse?", "opts": ["Abstraction, storage, and recontextualization", "Coding, testing, and installation", "Initiation, planning, and execution", "Identification, ranking, and selection"], "a": 0, "ex": "The three basic steps are abstraction, storage, and recontextualization.", "core": true, "sref": 26}, {"q": "In the steps of reuse, why is STORAGE described as challenging?", "opts": ["The problem is correctly labeling and cataloging assets so that others can find the ones they want to use", "Disk space for storing the software assets is prohibitively expensive for most organizations to acquire", "Software assets legally cannot be kept for more than one project", "Stored components must be rewritten in a new language every year"], "a": 0, "ex": "Storage is challenging not because of putting assets on a shelf, but because of correctly labeling and cataloging assets so others can find what they want.", "core": true, "sref": 26}, {"q": "What does RECONTEXTUALIZATION mean in software reuse?", "opts": ["Making the reusable asset understandable to developers who want to use it in their systems", "Re-encrypting components before they are placed back into the shared organizational repository", "Translating the user interface of a component into multiple languages", "Moving a component from one physical server to another"], "a": 0, "ex": "Recontextualization involves making the reusable asset understandable to developers who want to use it in their systems.", "core": false, "sref": 26}], "essays": [{"q": "Discuss the three elements that drive an organizational approach to systems analysis and design.", "a": "The organizational approach is driven by methodologies, techniques, and tools that have been developed, tested, and widely used over the years to assist the systems analyst. Methodologies are comprehensive, multiple-step approaches to systems development that guide the work and influence the quality of the final product; the methodology an organization adopts depends on its general management style (for example, a consensus-management orientation influences the choice), and methodologies incorporate several development techniques. Techniques are particular processes the analyst follows to ensure the work is well thought out, complete, and comprehensible to others on the project team; they support tasks like gathering information, planning and managing project activities, diagramming system logic, and designing interfaces and outputs. Tools are typically computer programs that make it easy to use the techniques and follow the methodology's guidelines. Techniques and tools must make it easy for developers to conduct the steps called for in the methodology — the three elements work together to form the organizational approach."}, {"q": "Describe the five phases of the SDLC and the main work performed in each.", "a": "Planning is the first phase: the organization's total information system needs are identified, analyzed, prioritized, and arranged. Analysis is the second phase: requirements are studied and structured, with two sub-phases — requirements determination (what users want from the proposed system) and requirements analysis (structuring requirements by their interrelationships and eliminating redundancies). Design is the third phase: the recommended solution is converted into logical specifications (functional features described independently of any platform) and then physical specifications (technology-specific details enabling programming and construction). Implementation is the fourth phase: specifications are turned into a working, tested system through coding, testing, installation, and support. Maintenance is the final phase: the system is systematically repaired and improved; it is not really a separate phase but a repetition of the other life-cycle phases required to study and implement needed changes."}, {"q": "Explain the problems of the traditional waterfall SDLC and how current practice (agile) responds to them.", "a": "In the waterfall SDLC, one phase begins when another completes, with little backtracking and looping. Its problems are: users are locked into requirements that were previously determined, even though those requirements may have changed; the role of system users or customers is narrowly defined; and intangible processes such as analysis and design are given hard-and-fast completion dates, with success overwhelmingly measured by whether those dates are met. Current practice responds by combining the activities of analysis, design, and implementation into a single analysis–design–code–test process — requirements produced in analysis, specifications created in design, and coding and testing done at the start of implementation. This combination of activities, the heart of systems development, is typical of agile methodologies, with alternatives to waterfall also including prototyping, CASE tools, JAD, RAD, and eXtreme Programming."}, {"q": "Compare the six major sources of application software and indicate when each is appropriate.", "a": "(1) IT services firms — appropriate when a company needs a system but has no expertise and no off-the-shelf system is available; they develop custom systems, or develop/host/run applications for customers, using many of the same methodologies, techniques, and tools used in-house. (2) Packaged software producers — companies like Microsoft (the leader) provide off-the-shelf, often turnkey software that cannot be modified to meet specific organizational needs. (3) Cloud computing — applications and services are provided over the Internet so customers do not invest in the hardware and software needed to run them (e.g., Google Docs, Sheets, Slides; encompassing SaaS, PaaS, IaaS). (4) Open-source software — freely available including the source code, community-developed (e.g., Linux, MySQL, Firefox); revenue comes from services or from selling a fuller-featured version. (5) In-house development — used when sufficient expertise with the chosen platform exists internally, though it can carry a larger maintenance burden than packaged applications. (6) The sources sit along a continuum with many hybrid combinations, and organizations often mix in-house staff with consultants or ERP vendors."}, {"q": "Explain software reuse: its benefits, enabling technologies, and the three basic steps.", "a": "Reuse is the use of previously written software resources (objects and components) in new applications. Its benefits: increased programmer productivity (using existing software for some functions lets developers do more work in the same time); decreased development time and fewer schedule overruns, since existing pieces have already been tested; and higher-quality software with lower defect rates, which decreases maintenance costs. The primary enabling technologies are object-oriented development — where an object class encapsulates the data and behavior of common organizational entities so that changes are made only to the object, not to every application using it — and component-based development, which creates general-purpose pieces of software (single objects or functional groupings, e.g., currency conversion) that can be assembled into applications at many levels of complexity and size. The three basic steps of reuse are abstraction (designing the reusable piece, from existing assets or from scratch), storage (making assets available — the real challenge is correctly labeling and cataloging assets so others can find them), and recontextualization (making the asset understandable to developers who want to use it). Success factors include domain knowledge, customer support, senior management commitment, sound organizational processes, and skilled, experienced developers."}]}, {"id": 2, "title": "Foundations: Project Management", "optional": false, "slides": [{"t": "Project Management and the Project Manager", "d": "Project management is an important aspect of development; its focus is to ensure that systems development projects meet customer expectations and are delivered within budget and time constraints. The project manager is a systems analyst with a diverse set of skills — management, leadership, technical, conflict management, and customer relationship — responsible for initiating, planning, executing, and closing down a project.", "svg": null}, {"t": "Project and Deliverable", "d": "A project is a planned undertaking of related activities to reach an objective that has a beginning and an end. A deliverable is an end product of an SDLC phase.", "svg": null}, {"t": "System Service Request and Feasibility Study", "d": "A System Service Request (SSR) is a standard form for requesting or proposing systems development work within an organization — it includes the contact person, a problem statement, a service request statement, and liaison contact information. A feasibility study determines whether a requested system makes economic and operational sense for an organization.", "svg": null}, {"t": "Four Phases of the Project Management Process", "d": "Phase 1: Initiation. Phase 2: Planning. Phase 3: Execution. Phase 4: Closedown. The course illustrates these with the Pine Valley application project and lists common activities and skills of a project manager.", "svg": null}, {"t": "Project Initiation — Six Activities", "d": "Project initiation assesses the size, scope, and complexity of the project and establishes procedures to support later activities. The six activities: (1) establishing the project initiation team — an initial core of members to assist in accomplishing initiation activities; (2) establishing a relationship with the customer — thorough understanding builds stronger partnerships and higher trust; (3) establishing the project initiation plan — defines the activities required to organize the team while defining the goals and scope; (4) establishing management procedures — successful projects require effective management procedures; (5) establishing the project management environment and project workbook — collect and organize tools and construct the workbook, an online repository of all project-related documents accessible by all team members; (6) developing the project charter — a short (typically one page), high-level document prepared for the customer describing what the project will deliver and outlining key elements.", "svg": null}, {"t": "Project Planning — Definition", "d": "The second phase of the project management process focuses on defining clear, discrete activities and the work needed to complete each activity within a single project.", "svg": null}, {"t": "Project Planning Activities (1)", "d": "Describing project scope, alternatives, and feasibility — answering: What problem or opportunity does the project address? What are the quantifiable results to be achieved? What needs to be done? How will success be measured? How will we know when we are finished? Dividing the project into manageable tasks — using a work breakdown structure (the process of dividing the project into manageable tasks and logically ordering them to ensure smooth evolution between tasks) and a Gantt chart (a graphical representation showing each task as a horizontal bar whose length is proportional to its time for completion).", "svg": null}, {"t": "Project Planning Activities (2)", "d": "Estimating resources and creating a resource plan (estimate resource requirements for each project activity). Developing a preliminary schedule (assign time estimates to each activity in the work breakdown structure; a network diagram depicts project tasks and their interrelationships). Developing a communication plan (who are the stakeholders, what information each needs, when and at what interval). Determining project standards and procedures (specify how deliverables are produced and tested; decide tools, SDLC modifications, and methods).", "svg": null}, {"t": "Project Planning Activities (3)", "d": "Identifying and assessing risk (identify sources of project risk and estimate the consequences). Creating a preliminary budget (planned expenses and revenues). Developing a Project Scope Statement near the end of planning. Setting a Baseline Project Plan once all prior planning activities are completed.", "svg": null}, {"t": "Project Execution", "d": "The third phase, in which plans created in the prior phases are put into action. Activities: executing the Baseline Project Plan (initiate activities, acquire and assign resources, orient and train new members, keep the project on schedule, ensure quality of deliverables); monitoring progress against the BPP (adjust resources, activities, and budgets; monitoring can result in modifications to the current plan; measure time and effort per activity); managing changes to the BPP (e.g., a slipped completion date, unforeseen personnel changes from sickness, resignation, or termination); maintaining the project workbook (complete records of all project events); communicating project status to all stakeholders — developers, managers, and customers.", "svg": null}, {"t": "Project Closedown", "d": "The final phase focuses on bringing a project to an end. Projects can conclude with a natural termination (requirements met — the project is completed and is a success) or unnatural termination. Activities: closing down the project (assignment changes; assess each member and provide an appraisal for personnel files and salary determination); conducting postproject reviews with management and customers to determine strengths and weaknesses of deliverables and what went wrong to improve the next project; closing the customer contract (ensure all contractual terms have been met — a contracted project is typically not completed until agreed by both parties, often in writing).", "svg": null}, {"t": "Gantt Chart vs. Network Diagram", "d": "A Gantt chart uses horizontal bars to represent task durations; a network diagram uses boxes and links to represent task dependencies. Differences: Gantt charts visually show the DURATION of tasks, whereas a network diagram visually shows the SEQUENCE dependencies between tasks. Gantt charts visually show time OVERLAP of tasks, whereas a network diagram does not show overlap but does show which tasks could be done in PARALLEL. Some Gantt charts can visually show SLACK time within an earliest start and latest finish duration; a network diagram shows this by data within activity rectangles.", "svg": "gantt_vs_network"}, {"t": "PERT — Estimating Task Duration", "d": "PERT (Program Evaluation Review Technique) uses optimistic (o), pessimistic (p), and realistic (r) time estimates to determine expected task duration. Formula: ET = (o + 4r + p) / 6, where ET is the expected completion time for an activity. Example (SPTS project, weeks): Requirements Collection o=1, r=5, p=9 → ET=5; Screen Design 5,6,7 → 6; Report Design 3,6,9 → 6; Database Design 1,2,3 → 2; User Documentation 2,6,7 → 5.5; Programming 4,5,6 → 5; Testing 1,3,5 → 3; Installation 1,1,1 → 1.", "svg": null}, {"t": "Critical Path Scheduling", "d": "A scheduling technique whose order and duration of a sequence of task activities directly affects the completion date of a project. The critical path is the shortest time in which a project can be completed. Slack time is the time an activity can be delayed without delaying the project.", "svg": "cp_network"}, {"t": "Critical Path Calculation (SPTS Example)", "d": "With TE (earliest expected completion) and TL (latest expected completion) computed for each activity: Activity 1: TE=5, TL=5, slack 0; Activity 2: 11/11, 0; Activity 3: 11/11, 0; Activity 4: 13/13, 0; Activity 5: TE=18.5, TL=21, slack 2.5 (the only activity NOT on the critical path); Activity 6: 18/18, 0; Activity 7: 21/21, 0; Activity 8: 22/22, 0. Slack = TL − TE. All activities except number 5 are on the critical path; the project completes in 22 weeks.", "svg": null}, {"t": "Project Management Software", "d": "Many powerful software tools assist with project management. Example: Microsoft Project can help with entering the project start date, establishing tasks and task dependencies, and viewing project information as Gantt or Network diagrams.", "svg": null}], "qs": [{"q": "What is the focus of project management, per the course?", "opts": ["Ensuring development projects meet customer expectations and are delivered within budget and time constraints", "Maximizing the number of features delivered to the customer regardless of the cost or the schedule", "Eliminating the need for any customer involvement in development", "Choosing the programming language to be used by the developers"], "a": 0, "ex": "Project management focuses on ensuring that systems development projects meet customer expectations and are delivered within budget and time constraints.", "core": true, "sref": 0}, {"q": "How is the project manager described?", "opts": ["A systems analyst with diverse skills — management, leadership, technical, conflict management, and customer relationship", "A programmer whose sole responsibility is writing and unit-testing the code of the assigned modules", "An external consultant who only audits finished project deliverables", "A clerical assistant who records the minutes of project meetings"], "a": 0, "ex": "The project manager is a systems analyst with a diverse set of skills — management, leadership, technical, conflict management, and customer relationship — responsible for initiating, planning, executing, and closing down a project.", "core": false, "sref": 0}, {"q": "What is a project?", "opts": ["A planned undertaking of related activities to reach an objective that has a beginning and an end", "Any routine, ongoing operational activity within an organization that has no defined end", "A spontaneous set of unrelated tasks without a defined objective", "A permanent organizational department devoted to maintenance"], "a": 0, "ex": "A project is a planned undertaking of related activities to reach an objective that has a beginning and an end.", "core": true, "sref": 1}, {"q": "What is a deliverable?", "opts": ["An end product of an SDLC phase", "A request form for new development work", "A meeting between analysts and stakeholders", "A risk identified during project planning"], "a": 0, "ex": "A deliverable is an end product of an SDLC phase.", "core": true, "sref": 1}, {"q": "What is a System Service Request (SSR)?", "opts": ["A standard form for requesting or proposing systems development work within an organization", "A legal contract that transfers the ownership of a finished system from the developer to the customer", "A diagram depicting project tasks and their interrelationships", "A document summarizing the results of system testing"], "a": 0, "ex": "An SSR is a standard form for requesting or proposing systems development work within an organization.", "core": true, "sref": 2}, {"q": "Which elements does an SSR include?", "opts": ["The contact person, a problem statement, a service request statement, and liaison contact information", "Source code listings, test cases, deployment scripts, and the database backup schedules", "Cash flow forecasts, discount rates, and break-even fractions", "Entity names, attributes, and relationship cardinalities"], "a": 0, "ex": "The SSR includes the contact person, a problem statement, a service request statement, and liaison contact information.", "core": true, "sref": 2}, {"q": "What does a feasibility study determine?", "opts": ["Whether a requested system makes economic and operational sense for an organization", "Which programming team will be assigned to build the system and which tools they will use", "How the database tables should be normalized before coding", "Which installation strategy will be used for system conversion"], "a": 0, "ex": "A feasibility study determines whether a requested system makes economic and operational sense for an organization.", "core": false, "sref": 2}, {"q": "What are the four phases of the project management process, in order?", "opts": ["Initiation, planning, execution, closedown", "Analysis, design, coding, testing", "Identification, selection, ranking, approval", "Scoping, budgeting, staffing, reporting"], "a": 0, "ex": "The four phases are Phase 1 Initiation, Phase 2 Planning, Phase 3 Execution, and Phase 4 Closedown.", "core": true, "sref": 3}, {"q": "What is assessed during project initiation?", "opts": ["The size, scope, and complexity of the project, while establishing procedures to support later activities", "The defect density of the code produced during implementation and the cost of repairing it", "The market value of the company's existing software products", "The final acceptance criteria signed at contract closure"], "a": 0, "ex": "Initiation assesses the size, scope, and complexity of the project and establishes procedures to support later project activities.", "core": true, "sref": 4}, {"q": "How many project initiation activities does the course list?", "opts": ["Six", "Four", "Eight", "Ten"], "a": 0, "ex": "There are six project initiation activities, from establishing the initiation team through developing the project charter.", "core": false, "sref": 4}, {"q": "What is the project workbook?", "opts": ["An online repository of all project-related documents that is accessible by all team members", "A printed manual describing how end users operate the new system in their daily work", "A spreadsheet for computing the net present value of benefits", "A gallery of screen designs produced during prototyping"], "a": 0, "ex": "The project workbook is an online repository of all project-related documents accessible by all team members.", "core": true, "sref": 4}, {"q": "What is the project charter?", "opts": ["A short, typically one-page, high-level document prepared for the customer describing what the project will deliver", "A detailed technical specification of every database table, field, index, and integrity constraint in the system", "An internal memo assigning blame for previous project failures", "A binding legal warranty covering all post-installation defects"], "a": 0, "ex": "The project charter is a short (typically one page), high-level document prepared for the customer that describes what the project will deliver and outlines key elements.", "core": true, "sref": 4}, {"q": "What does project PLANNING focus on?", "opts": ["Defining clear, discrete activities and the work needed to complete each activity within a single project", "Putting the previously created plans into action, assigning resources, and tracking progress", "Bringing the project to an end and closing the customer contract", "Assessing the size, scope, and complexity of the proposed project"], "a": 0, "ex": "Planning focuses on defining clear, discrete activities and the work needed to complete each activity within a single project.", "core": false, "sref": 5}, {"q": "What is a work breakdown structure?", "opts": ["The process of dividing the project into manageable tasks and logically ordering them to ensure a smooth evolution between tasks", "A bar chart that plots each project task against the calendar timeline so durations are visible at a glance", "A diagram of boxes and links showing dependencies among tasks", "A list of stakeholders and the information each one requires"], "a": 0, "ex": "The work breakdown structure is the process of dividing the project into manageable tasks and logically ordering them to ensure a smooth evolution between tasks.", "core": true, "sref": 6}, {"q": "What is a Gantt chart?", "opts": ["A graphical representation of a project that shows each task as a horizontal bar whose length is proportional to its time for completion", "A diagram depicting the project's tasks and their interrelationships as boxes connected by labeled dependency arrows", "A matrix that lists the conditions of a business decision together with the resulting actions for each rule", "A pyramid diagram ranking the identified project risks from the most severe consequence to the least severe"], "a": 0, "ex": "A Gantt chart shows each task as a horizontal bar whose length is proportional to its time for completion.", "core": true, "sref": 11}, {"q": "What is a network diagram, in project scheduling?", "opts": ["A diagram that depicts project tasks and their interrelationships", "A chart of horizontal bars proportional to task durations", "A map of the physical cabling between office computers", "A hierarchy chart of the project team's reporting lines"], "a": 0, "ex": "A network diagram depicts project tasks and their interrelationships (boxes and links represent task dependencies).", "core": true, "sref": 11}, {"q": "Which questions belong to the communication plan?", "opts": ["Who are the stakeholders, what information does each need, and when/at what interval must it be produced", "Which tasks have slack time available and which tasks lie on the project's critical path", "What discount rate applies and when break-even occurs", "Which modules are tested alone and which incrementally"], "a": 0, "ex": "The communication plan asks: who are the stakeholders, what information does each stakeholder need, and when and at what interval the information must be produced.", "core": false, "sref": 7}, {"q": "Which activity occurs near the END of the project planning phase?", "opts": ["Developing the Project Scope Statement", "Establishing the project initiation team", "Conducting postproject reviews", "Closing the customer contract"], "a": 0, "ex": "An important activity near the end of planning is the development of the Project Scope Statement, followed by setting the Baseline Project Plan.", "core": false, "sref": 8}, {"q": "In which project management phase are the plans created earlier put into action?", "opts": ["Execution", "Initiation", "Planning", "Closedown"], "a": 0, "ex": "Execution is the third phase, in which the plans created in initiation and planning are put into action.", "core": false, "sref": 3}, {"q": "Which of these is an EXECUTION-phase activity?", "opts": ["Monitoring project progress against the Baseline Project Plan", "Developing the project charter for the customer", "Conducting final postproject reviews with customers", "Identifying and assessing the sources of project risk"], "a": 0, "ex": "Execution activities include executing the BPP, monitoring progress against it, managing changes, maintaining the workbook, and communicating status.", "core": false, "sref": 9}, {"q": "Per the course, which events exemplify changes to the Baseline Project Plan during execution?", "opts": ["A slipped completion date for an activity, or unforeseen personnel changes due to sickness, resignation, or termination", "Routine nightly backups completing on schedule exactly as planned in the operations calendar", "A customer renewing an annual maintenance subscription for one of the organization's older systems", "The discount rate published by the national central bank"], "a": 0, "ex": "Examples given: a slipped completion date for an activity and an unforeseen change in personnel due to sickness, resignation, or termination.", "core": false, "sref": 9}, {"q": "Who must the project manager keep informed of project status?", "opts": ["All stakeholders — system developers, managers, and customers", "Only the programmers who are writing the system code", "Only the external auditors of the organization", "Only the human resources department"], "a": 0, "ex": "The project manager is responsible for keeping all stakeholders — system developers, managers, and customers — abreast of the project status.", "core": false, "sref": 9}, {"q": "What is a NATURAL termination of a project?", "opts": ["The requirements of the project have been met — it is completed and is a success", "The project is cancelled mid-way after its allocated budget has been completely exhausted", "The project manager resigns and the team is disbanded", "The customer unilaterally abandons the contract terms"], "a": 0, "ex": "A natural termination occurs when the requirements of the project have been met — the project has been completed and is a success.", "core": true, "sref": 10}, {"q": "Which is a project closedown activity?", "opts": ["Assessing each team member and providing an appraisal for personnel files and salary determination", "Establishing the relationship with the customer for the first time at the start of the project", "Estimating resource requirements for each project activity", "Entering the project start date into scheduling software"], "a": 0, "ex": "Closedown includes closing the project (member assessment/appraisal), postproject reviews, and closing the customer contract.", "core": false, "sref": 10}, {"q": "Why are postproject reviews conducted?", "opts": ["To determine strengths and weaknesses of deliverables and what went wrong, to improve the process for the next project", "To allocate the end-of-project bonuses among the members of the executive steering committee", "To re-estimate the PERT expected durations of activities that have already been fully completed", "To convert the logical design into physical specifications"], "a": 0, "ex": "Final reviews with management and customers determine strengths and weaknesses of project deliverables and what went wrong, in order to improve the process for the next project.", "core": false, "sref": 10}, {"q": "When is a project governed by a contractual agreement typically considered complete?", "opts": ["When agreed to by both parties, often in writing", "When the developers declare the code finished", "When the warranty period for hardware expires", "When the project workbook is archived"], "a": 0, "ex": "A contracted project is typically not completed until agreed to by both parties, often in writing.", "core": false, "sref": 10}, {"q": "Which difference between Gantt charts and network diagrams is stated in the course?", "opts": ["Gantt charts visually show task duration, whereas network diagrams visually show sequence dependencies between tasks", "Network diagrams show time overlap of tasks, whereas Gantt charts show which tasks may run in parallel", "Gantt charts use boxes and links, whereas network diagrams use horizontal bars", "Network diagrams cannot represent slack, whereas Gantt charts always display it"], "a": 0, "ex": "Gantt charts show duration (and time overlap, and sometimes slack); network diagrams show sequence dependencies and which tasks could run in parallel, with slack shown as data within activity rectangles.", "core": false, "sref": 11}, {"q": "How does a network diagram represent slack time?", "opts": ["By data within activity rectangles", "By the length of each horizontal bar", "By the color of dependency arrows", "It cannot represent slack in any form"], "a": 0, "ex": "A network diagram shows slack by data within activity rectangles, while some Gantt charts show it visually within an earliest start and latest finish duration.", "core": false, "sref": 11}, {"q": "What does PERT stand for?", "opts": ["Program Evaluation Review Technique", "Project Estimation and Resource Tracking", "Phase Execution and Reporting Tool", "Process Engineering Review Table"], "a": 0, "ex": "PERT stands for Program Evaluation Review Technique.", "core": false, "sref": 3}, {"q": "What is the PERT formula for expected time?", "opts": ["ET = (o + 4r + p) / 6", "ET = (o + r + p) / 3", "ET = (4o + r + p) / 6", "ET = (o + 2r + p) / 4"], "a": 0, "ex": "ET = (o + 4r + p)/6, where o is optimistic, r is realistic, and p is pessimistic completion time.", "core": true, "sref": 12}, {"q": "In the SPTS PERT example, Requirements Collection has o=1, r=5, p=9. What is its expected time?", "opts": ["5 weeks", "6 weeks", "4.5 weeks", "5.5 weeks"], "a": 0, "ex": "ET = (1 + 4×5 + 9)/6 = 30/6 = 5 weeks, matching the slide table.", "core": false, "sref": 12}, {"q": "In the SPTS PERT example, User Documentation has o=2, r=6, p=7. What is its expected time?", "opts": ["5.5 weeks", "5 weeks", "6 weeks", "4.5 weeks"], "a": 0, "ex": "ET = (2 + 24 + 7)/6 = 33/6 = 5.5 weeks, as shown in the example table.", "core": false, "sref": 12}, {"q": "In the SPTS PERT example, what is the expected time for Database Design (o=1, r=2, p=3)?", "opts": ["2 weeks", "3 weeks", "1.5 weeks", "2.5 weeks"], "a": 0, "ex": "ET = (1 + 8 + 3)/6 = 12/6 = 2 weeks.", "core": false, "sref": 12}, {"q": "What is critical path scheduling?", "opts": ["A scheduling technique whose order and duration of a sequence of task activities directly affects the completion date of a project", "A budgeting technique that ranks the project's activities by their estimated monetary cost to the organization", "A staffing technique that assigns the most critical tasks to managers", "A testing technique that prioritizes the most failure-prone modules"], "a": 0, "ex": "Critical path scheduling is a scheduling technique whose order and duration of a sequence of task activities directly affects the project completion date.", "core": true, "sref": 13}, {"q": "How does the course define the critical path?", "opts": ["The shortest time in which a project can be completed", "The longest possible time a project may take", "The list of activities that have positive slack", "The path containing the fewest activities"], "a": 0, "ex": "The critical path is defined as the shortest time in which a project can be completed.", "core": false, "sref": 13}, {"q": "What is slack time?", "opts": ["The time an activity can be delayed without delaying the project", "The extra budget reserved for unexpected project expenses", "The idle time between two programming shifts", "The waiting period before a contract is signed"], "a": 0, "ex": "Slack time is the time an activity can be delayed without delaying the project.", "core": true, "sref": 13}, {"q": "In the SPTS critical path calculation, which activity is NOT on the critical path?", "opts": ["Activity 5 (User Documentation)", "Activity 2 (Screen Design)", "Activity 7 (Testing)", "Activity 4 (Database Design)"], "a": 0, "ex": "All activities except number 5 are on the critical path. Activity 5 has TE=18.5, TL=21, slack 2.5.", "core": false, "sref": 14}, {"q": "How is slack computed in the critical path table?", "opts": ["Slack = TL − TE", "Slack = TE − TL", "Slack = TE + TL", "Slack = TL ÷ TE"], "a": 0, "ex": "Slack is TL − TE; activities with zero slack lie on the critical path.", "core": false, "sref": 14}, {"q": "In the SPTS example, what is the slack of Activity 5?", "opts": ["2.5", "0", "1.5", "3.5"], "a": 0, "ex": "Activity 5 has TE=18.5 and TL=21, so slack = 21 − 18.5 = 2.5 — the only nonzero slack in the table.", "core": false, "sref": 14}, {"q": "In the SPTS example, the project completes in how many weeks (TE of Activity 8)?", "opts": ["22", "21", "18.5", "24"], "a": 0, "ex": "Activity 8 (Installation) has TE = TL = 22, so the project completes in 22 weeks.", "core": true, "sref": 14}, {"q": "Per the course, which capabilities does Microsoft Project provide?", "opts": ["Entering the project start date, establishing tasks and dependencies, and viewing Gantt or Network diagrams", "Compiling the project source code and running the automated unit test suites for every module", "Normalizing relations and generating SQL database schemas", "Designing web page styles with cascading style sheets"], "a": 0, "ex": "Microsoft Project helps with entering the project start date, establishing tasks and task dependencies, and viewing project information as Gantt or Network diagrams.", "core": false, "sref": 15}], "essays": [{"q": "Explain the four phases of the project management process and the main activities in each.", "a": "Phase 1, Initiation: activities assess the size, scope, and complexity of the project and establish procedures to support later activities. The six initiation activities are establishing the initiation team, establishing a relationship with the customer, establishing the project initiation plan, establishing management procedures, establishing the project management environment and project workbook (an online repository of all project documents accessible by the team), and developing the project charter (a short, typically one-page, high-level document for the customer). Phase 2, Planning: defining clear, discrete activities and the work to complete each within a single project — describing scope/alternatives/feasibility, dividing the project into tasks (work breakdown structure, Gantt chart), estimating resources, developing a preliminary schedule (network diagram), a communication plan, standards and procedures, identifying and assessing risk, a preliminary budget, the Project Scope Statement, and setting the Baseline Project Plan. Phase 3, Execution: plans are put into action — executing the BPP, monitoring progress against it, managing changes (e.g., slipped dates, personnel changes), maintaining the workbook, and communicating status to developers, managers, and customers. Phase 4, Closedown: bringing the project to an end naturally (requirements met) or unnaturally — closing down the project with member appraisals, conducting postproject reviews to learn strengths/weaknesses, and closing the customer contract with written agreement by both parties."}, {"q": "Compare Gantt charts and network diagrams as techniques for representing project plans.", "a": "Both are the most commonly used methods for depicting and documenting project plans. In a Gantt chart, horizontal bars represent task durations; in a network diagram, boxes and links represent task dependencies. The course states three differences: (1) Gantt charts visually show the duration of tasks, whereas a network diagram visually shows the sequence dependencies between tasks; (2) Gantt charts visually show the time overlap of tasks, whereas a network diagram does not show time overlap but does show which tasks could be done in parallel; (3) some forms of Gantt charts can visually show slack time available within an earliest start and latest finish duration, while a network diagram shows this by data within activity rectangles."}, {"q": "Describe PERT and calculate the expected time of an activity with o=1, r=5, p=9.", "a": "PERT (Program Evaluation Review Technique) is a technique that uses optimistic (o), pessimistic (p), and realistic (r) time estimates to determine expected task duration. The formula is ET = (o + 4r + p)/6, where ET is the expected completion time for the activity. For o=1, r=5, p=9: ET = (1 + 4×5 + 9)/6 = (1 + 20 + 9)/6 = 30/6 = 5 weeks — exactly the value shown for Requirements Collection in the SPTS example table. The remaining activities in the example: Screen Design (5,6,7)→6; Report Design (3,6,9)→6; Database Design (1,2,3)→2; User Documentation (2,6,7)→5.5; Programming (4,5,6)→5; Testing (1,3,5)→3; Installation (1,1,1)→1."}, {"q": "Explain critical path scheduling, slack time, and identify the critical path in the SPTS example.", "a": "Critical path scheduling is a scheduling technique whose order and duration of a sequence of task activities directly affects the completion date of a project. The critical path represents the shortest time in which the project can be completed; slack time is the time an activi
