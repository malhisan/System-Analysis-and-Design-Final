ements for the interfaces", "Each user interface receives its own physical database with separate storage formats", "The logical design is compared against the relations produced by reverse engineering"], "a": 0, "ex": "Step 2: normalized data are combined from all user interfaces to constitute one consolidated logical database model.", "core": true, "sref": 1}, {"q": "In logical database modeling, what is compared in step 4?", "opts": ["The logical database design with the translated E-R data model", "The physical design with the volume estimates of each relation", "The old system's database with the new conversion requirements", "The user interface prototypes with the project dictionary entries"], "a": 0, "ex": "Step 4: comparing the logical database design with the translated E-R data model. The results feed into physical database design.", "core": true, "sref": 1}, {"q": "Which of the following is one of the main decisions in physical database design?", "opts": ["Selecting a storage format (data type)", "Choosing the project's discount rate", "Naming entities with singular nouns", "Numbering processes on the Level-0 DFD"], "a": 0, "ex": "Decisions: select storage format (data type), group attributes into physical records, arrange related records in secondary memory, and select the best media and structures for efficiency.", "core": false, "sref": 2}, {"q": "Which database models are listed as the bases for database technologies?", "opts": ["Hierarchical, network, object-oriented, and relational", "Sequential, indexed, hashed, and clustered models", "Conceptual, logical, physical, and virtual", "Star, snowflake, columnar, and key-value"], "a": 0, "ex": "Models listed: hierarchical, network, object-oriented database model, and relational database model.", "core": false, "sref": 3}, {"q": "Which database model is used very often today for new information systems?", "opts": ["The relational database model", "The hierarchical database model", "The network database model", "The object-oriented model"], "a": 0, "ex": "The relational database model is used very often today for new information systems.", "core": false, "sref": 3}, {"q": "What is a relation?", "opts": ["A two-dimensional table of data with a set of columns and an arbitrary number of rows", "A constraint in which the value of one attribute determines the value of another", "A linkage between the instances of one or more entity types in the E-R diagram", "A named set of physical fields stored together as one record in secondary memory"], "a": 0, "ex": "A relation is a two-dimensional table of data; each relation consists of a set of columns and an arbitrary number of rows.", "core": true, "sref": 15}, {"q": "In a relation, what does each column correspond to? Each row?", "opts": ["Each column is an attribute of the relation; each row is a record containing data values for an entity", "Each column is a record for one entity; each row is an attribute belonging to that single record", "Each column is a primary key candidate; each row is a foreign key referencing another table", "Each column is one entity type; each row is one relationship between a pair of entity types"], "a": 0, "ex": "Each column corresponds to an attribute of the relation; each row corresponds to a record containing data values for an entity.", "core": false, "sref": 3}, {"q": "What two properties define a well-structured relation?", "opts": ["Minimum redundancy, and rows can be inserted, modified, and deleted without errors or inconsistencies", "Single-attribute primary key, and every nonkey attribute stored in a separate lookup relation", "Fixed column ordering, and rows physically stored in ascending order of the primary key", "Maximum compression of storage, and indexes built automatically on every column"], "a": 0, "ex": "A well-structured relation contains minimum redundancy and allows insertion, modification, and deletion of rows without errors or inconsistencies.", "core": true, "sref": 4}, {" e will be assigned a default value and a range control", "Every table will correspond to exactly one entity in the E-R diagram"], "a": 0, "ex": "Normalization assures that every nonprimary key attribute will depend upon only the whole primary key.", "core": false, "sref": 5}, {"q": "What is a functional dependency?", "opts": ["A constraint between two attributes in which the value of one attribute is determined by the value of another", "A rule that prevents two relations from sharing the same primary key attribute in a database", "A link between two entity types showing that an event has occurred between their instances", "A requirement that every foreign key match an existing value in the referenced relation"], "a": 0, "ex": "A functional dependency is a constraint between two attributes where the value of one is determined by the value of another (e.g., Emp_ID → Name).", "core": true, "sref": 6}, {"q": "In the example Emp_ID → Name, what does the notation mean?", "opts": ["We can get the employee's name by knowing his/her ID — Name is functionally dependent on Emp_ID", "The employee's ID is computed automatically from the characters of the employee's name", "Emp_ID and Name must always be stored together within the same physical record", "Name is the primary key and Emp_ID is an alternative candidate key for the relation"], "a": 0, "ex": "Emp_ID → Name means knowing the ID gives the name; Name is functionally dependent on Emp_ID.", "core": false, "sref": 6}, {"q": "In EMP COURSE(Emp_ID, Course, Date_Completed), what determines Date_Completed?", "opts": ["Emp_ID and Course together — it cannot be determined by either of the two alone", "Emp_ID alone, since each employee completes each of their courses only once", "Course alone, since each course has one fixed date of completion for everyone", "Neither attribute — Date_Completed is independent of the other two columns"], "a": 0, "ex": "Emp_ID, Course → Date_Completed: it is functionally dependent on both together and cannot be determined by either alone.", "core": false, "sref": 6}, {"q": "What is the 2NF requirement, stated as 'full functional dependency'?", "opts": ["Each nonprimary key attribute is identified by the whole key, not part of it", "Each nonprimary key attribute depends on at least one other nonkey attribute", "Each primary key consists of a single attribute with no composite alternatives", "Each attribute participates in at most one functional dependency in the table"], "a": 0, "ex": "2NF: each nonprimary key attribute is identified by the whole key (full functional dependency).", "core": true, "sref": 6}, {"q": "Which of the following is one of the three conditions under which a relation is in 2NF?", "opts": ["The primary key consists of only one attribute", "The relation contains fewer than ten attributes", "All attributes are drawn from numeric domains", "The relation was produced by merging user views"], "a": 0, "ex": "2NF conditions: (1) single-attribute primary key, (2) no nonprimary key attributes exist, (3) every nonkey attribute depends on the full set of primary key attributes.", "core": true, "sref": 7}, {"q": "Why is EMPLOYEE2(Emp_ID, Name, Dept, Salary, Course, Date_Completed) NOT in 2NF?", "opts": ["Name, Dept, and Salary depend on Emp_ID alone — part of the key — rather than the whole key", "Date_Completed depends transitively on Salary through the values of the Course attribute", "The relation has two candidate keys, which second normal form does not permit", "The Course attribute is multivalued and must first be moved to a repeating group"], "a": 0, "ex": "Emp_ID → Name, Dept, Salary (partial dependency on part of the composite key) while Emp_ID, Course → Date_Completed; hence not 2NF.", "core": true, "sref": 7}, {"q": "How is EMPLOYEE2 decomposed to reach 2NF?", "opts": ["Into EMPLOYEE1(Emp_ID, Name, Dept, Salary) and EMP COURSE(Emp_ID, Course, Date_Completed)", "Into EMPLOYEE1(Emp_ID, Name) and EMPLOYEE2(Dept, Salary, Course, Date_Completed)", "Into SALES1(Customer_ID, Customer_Name, Salesperson) and SPERSON(Salesperson, Region)", "Into EMP(Emp_ID, Course) and COURSE(Course, Name, Dept, Salary, Date_Completed)"], "a": 0, "ex": "Decompose using the attributes that determine other attributes: EMPLOYEE1(Emp_ID,Name,Dept,Salary) and EMP COURSE(Emp_ID,Course,Date_Completed).", "core": false, "sref": 7}, {"q": "What are the two conditions for a relation to be in 3NF?", "opts": ["The relation is in 2NF, and there are no functional dependencies between nonprimary key attributes (no transitive dependency)", "The relation is in 2NF, and the primary key is composed of at least two attributes drawn from different entities", "The relation has a single-attribute key, and every attribute is stored using the same Oracle 10g data type", "The relation has no redundancy, and all of its rows are physically arranged using a hashed organization"], "a": 0, "ex": "3NF: (1) the relation is in 2NF, and (2) no functional dependencies between more than one nonprimary key attributes (no transitive dependency).", "core": true, "sref": 5}, {"q": "Why is SALES(Customer_ID, Customer_Name, Salesperson, Region) NOT in 3NF?", "opts": ["Salesperson → Region is a transitive dependency between nonprimary key attributes", "Customer_ID fails to determine the Region attribute for some of the rows", "Customer_Name is a candidate key that conflicts with the chosen identifier", "Region is a multivalued attribute that repeats for several salespersons"], "a": 0, "ex": "Customer_ID → Customer_Name, Salesperson, Region, but also Salesperson → Region — a dependency between nonkey attributes (transitive).", "core": false, "sref": 8}, {"q": "Is SALES in 2NF, and why?", "opts": ["Yes — because the primary key (Customer_ID) is a single attribute", "No — because Region depends on Salesperson rather than the key", "Yes — because every attribute participates in a functional dependency", "No — because Customer_Name is only partially dependent on the key"], "a": 0, "ex": "SALES is in 2NF because the primary key (Customer_ID) consists of only one attribute.", "core": false, "sref": 6}, {"q": "How is SALES decomposed to reach 3NF?", "opts": ["Into SALES1(Customer_ID, Customer_Name, Salesperson) and SPERSON(Salesperson, Region)", "Into SALES1(Customer_ID, Region) and SPERSON(Salesperson, Customer_Name)", "Into CUSTOMER(Customer_ID, Customer_Name) and REGION(Region, Salesperson, Customer_ID)", "Into SALES1(Customer_ID, Salesperson, Region) and SPERSON(Salesperson, Customer_Name)"], "a": 0, "ex": "Decompose into SALES1(Customer_ID,Customer_Name,Salesperson) and SPERSON(Salesperson,Region).", "core": false, "sref": 8}, {"q": "What are the four main steps for transforming an E-R diagram into relations?", "opts": ["Represent entities, represent relationships, normalize the relations, merge the relations", "Design fields, choose data types, control integrity, design physical tables", "Identify entities, assign attributes, draw cardinalities, validate the diagram", "Develop user views, consolidate views, translate views, compare with the model"], "a": 0, "ex": "Steps: (1) represent entities, (2) represent relationships, (3) normalize the relations, (4) merge the relations.", "core": true, "sref": 9}, {"q": "When representing entities, what becomes the primary key of the relation?", "opts": ["The identifier of the entity type", "The first attribute alphabetically", "A system-generated sequence value", "The name of the entity type itself"], "a": 0, "ex": "The primary key of the relation is the identifier of the entity type; nonkey attributes become nonkey attributes of the relation.", "core": false, "sref": 10}, {"q": "What two conditions must the primary key satisfy when representing entities?", "opts": ["Every row is uniquely identified by the key's value, and the key is nonredundant", "The key contains a single attribute, and the attribute is of a numeric data type", "The key is indexed for retrieval, and its values never change 12}, {"q": "Which of the following is among the important information needed for physical file and database design?", "opts": ["Normalized relations and volume estimates", "Swimlane diagrams of each business process", "The Cockburn template for every use case", "Minutes of the JAD requirement sessions"], "a": 0, "ex": "Needed: normalized relations and volume estimates, attribute definitions, where/when data are processed, response time and integrity expectations, and implementation technologies.", "core": false, "sref": 13}, {"q": "What approach is adopted to reviewing physical file and database design?", "opts": ["A bottom-up approach: fields, data types, integrity, tables, rows, file controls", "A top-down approach starting from the corporate mission and strategy", "An iterative prototyping approach driven by user evaluation cycles", "A parallel approach run alongside the system installation activities"], "a": 0, "ex": "A bottom-up approach: designing fields, choosing data types, controlling integrity, designing physical tables, arranging table rows, designing controls for files.", "core": false, "sref": 13}, {"q": "What are fields?", "opts": ["The smallest units of application data recognized by system software", "The coding schemes used by software to represent organizational data", "The named sets of rows and columns specifying records in a table", "The columns of a relation that participate in the primary key"], "a": 0, "ex": "Fields are the smallest units of application data recognized by system software — e.g., last name, first name, middle initial.", "core": true, "sref": 14}, {"q": "What are data types?", "opts": ["Coding schemes recognized by system software for representing organizational data", "Constraints limiting attribute values to a predefined valid set or range", "Logical groupings of attributes assembled into physical records", "Patterns describing how files are arranged within secondary memory"], "a": 0, "ex": "Data types are coding schemes recognized by system software for representing organizational data (e.g., Oracle 10g data types).", "core": true, "sref": 14}, {"q": "Which DBMS's common data types are shown in the course?", "opts": ["Oracle 10g", "MySQL 8", "SQL Server 2019", "PostgreSQL 12"], "a": 0, "ex": "The course table shows the most common data types in Oracle 10g.", "core": false, "sref": 14}, {"q": "Why is controlling data integrity important, per the course?", "opts": ["To assure the accuracy of data for compliance with new local and international regulations", "To reduce the size of the database files stored in secondary memory devices", "To guarantee faster retrieval speeds for the most frequently accessed rows", "To eliminate the need for normalizing relations during the design phase"], "a": 0, "ex": "Controlling data integrity assures accuracy of data for compliance with new local and international regulations.", "core": false, "sref": 15}, {"q": "What are the four main data integrity control methods?", "opts": ["Default value, range control, referential integrity, null value control", "Encryption, hashing, checksums, and digital signature verification", "Entity integrity, domains, triggers, and cascading deletion rules", "Backups, mirroring, journaling, and transaction rollback control"], "a": 0, "ex": "The main integrity control methods: (1) default value, (2) range control, (3) referential integrity, (4) null value control.", "core": true, "sref": 15}, {"q": "What is a physical table?", "opts": ["A named set of rows and columns specifying the fields in each row of the table", "A two-dimensional logical structure that must map to exactly one relation", "An index structure used to accelerate the retrieval of selected records", "A worksheet listing the one-time and recurring costs of database storage"], "a": 0, "ex": "A physical table is a named set of rows and columns specifying the fields in each row; it may or may not correspond to one relation.", "core": true, "sref": 15}, {"q": "Does a physical table always correspond to one relation?", "opts": ["No — it may or may not correspond to one relation", "Yes — there is always a one-to-one correspondence", "Only when the relation has reached third normal form", "Only when a sequential file organization is selected"], "a": 0, "ex": "A physical table may or may not correspond to one relation.", "core": false, "sref": 16}, {"q": "What are the two goals of physical tables?", "opts": ["Efficient use of secondary storage and data processing speed", "Minimal redundancy and protection from transitive dependency", "Referential integrity and complete attribute documentation", "High availability and simplified application programming"], "a": 0, "ex": "Goals: (1) efficient use of secondary storage and (2) data processing speed.", "core": true, "sref": 15}, {"q": "Which of the following is among the file objectives designers should consider when arranging table rows?", "opts": ["Fast data retrieval", "Singular noun naming", "Swimlane assignment", "Use case extension"], "a": 0, "ex": "Objectives: fast data retrieval, high throughput, protection from failures, protection from data loss, and security.", "core": false, "sref": 16}, {"q": "What are the three main file organization types?", "opts": ["Sequential, indexed, and hashed", "Logical, physical, and virtual", "Primary, secondary, and foreign", "Static, dynamic, and adaptive"], "a": 0, "ex": "Main file organizations: (1) sequential, (2) indexed, (3) hashed.", "core": true, "sref": 16}], "essays": [{"q": "Describe the database design process: its two steps and the four main steps of logical database modeling.", "a": "Designing databases and files involves two steps: developing a logical database model and developing a physical database design. The logical model describes data using a notation corresponding to a data organization used by a DBMS such as SQL Server; physical design prescribes the technical specifications for databases and computer files. Both can be conducted in parallel, and database modeling and design activities start at the planning phase and evolve through all SDLC phases. Normalization is the process used to finalize the logical database during design. The four main steps of logical database modeling and design: (1) using normalization, develop a logical data model for each user interface; (2) combine the normalized data from all user interfaces into one consolidated logical database model; (3) translate the conceptual E-R data model into normalized data requirements after considering user interfaces; and (4) compare the logical database design with the translated E-R data model. The results of these steps feed the physical database design, whose main decisions are selecting a storage format (data type), grouping attributes into physical records, arranging related records in secondary memory, and selecting the best media and structures for efficient storage and access."}, {"q": "Explain normalization: relation properties, functional dependency, 2NF, and 3NF, with the course examples.", "a": "Normalization defines the rules and a process for designing well-structured relations — relations with minimum redundancy that allow insertion, modification, and deletion without errors or inconsistencies. Relation properties: cells hold simple single values; entries in a column come from the same set of values; each row is unique via a non-empty primary key; column sequence can be interchanged; rows may be interchanged or stored in any sequence. A functional dependency is a constraint where the value of one attribute determines another (Emp_ID → Name), and an attribute can depend on more than one attribute (Emp_ID, Course → Date_Completed, where neither alone suffices). A relation is in 2NF when every nonprimary key attribute is functionally dependent on the whole key (full functional dependency) — achieved if the primary key is a single attribute, no nonkey attributes exist, or every nonkey attribute depends on the full key. EMPLOYEE2(Emp_ID,Name,Dept,Salary,Course,Date_Completed) is not in 2NF because Emp_ID → Name,Dept,Salary while Emp_ID,Course → Date_Completed; decomposing gives EMPLOYEE1(Emp_ID,Name,Dept,Salary) and EMP COURSE(Emp_ID,Course,Date_Completed). A relation is in 3NF if it is in 2NF and has no transitive dependencies between nonkey attributes. SALES(Customer_ID,Customer_Name,Salesperson,Region) is in 2NF (single-attribute key) but not 3NF because Salesperson → Region; decomposing gives SALES1(Customer_ID,Customer_Name,Salesperson) and SPERSON(Salesperson,Region). Normalization assures every nonprimary key attribute depends upon only the whole primary key."}, {"q": "Discuss the four steps for transforming an E-R diagram into relations, including the merge example.", "a": "The E-R diagram must be transformed into relational notation, normalized, and merged with existing normalized relations. Step 1 — represent entities: make a relation for each entity type; the primary key of the relation is the identifier of the entity type, nonkey attributes become nonkey attributes of the relation, and the key must uniquely identify every row and be nonredundant. Step 2 — represent relationships: how each relationship is represented depends on the degree of the relationship and its cardinalities. Step 3 — normalize the relations: apply the normalization rules to remove redundancy that may have appeared during steps 1 and 2. Step 4 — merge the relations: normalized relations likely come from different sources (separate E-R diagrams, various user interfaces), so some can be redundant and should be merged and renormalized. Example: the E-R diagram yields EMPLOYEE1(Emp_ID,Name,Address,Phone) and a user interface yields EMPLOYEE2(Emp_ID,Name,Address,Jobcode,Number_of_Years); merging produces EMPLOYEE(Emp_ID,Name,Address,Phone,Jobcode,Number_of_Years)."}, {"q": "Describe physical file and database design: information needed, the bottom-up review, integrity controls, physical tables, and file organizations.", "a": "Physical design requires: normalized relations and volume estimates; definitions of attributes; descriptions of where and when data are processed; expectations for response time and data integrity; and descriptions of the implementation technologies. A bottom-up approach reviews physical design through designing fields, choosing data types, controlling data integrity, designing physical tables, arranging table rows, and designing controls for files. Fields are the smallest units of application data recognized by system software (e.g., last name, first name, middle initial); data types are coding schemes recognized by system software for representing organizational data (the course shows common Oracle 10g types). Data integrity control assures accuracy for compliance with new local and international regulations, using default values, range control, referential integrity, and null value control. A physical table is a named set of rows and columns specifying the fields in each row — it may or may not correspond to one relation — with the goals of efficient use of secondary storage and data processing speed. In arranging table rows, designers consider file objectives — fast data retrieval, high throughput, protection from failures, protection from data loss, and security — and choose among the main file organizations: sequential, indexed, and hashed."}]}, {"id": 10, "title": "Design: Forms and Reports Design Process", "optional": false, "slides": [{"t": "Designing Forms and Reports — Objective", "d": "Designing forms and reports denotes the inputs and outputs of the system. The objective is to transform information gathered during analysis into a coherent design. Inputs and outputs were identified during requirements structuring; during analysis we are not concerned with the precise appearance of forms and reports — instead, we are concerned about which forms and reports are needed.", "svg": null}, {"t": "Form vs. Report", "d": "A form is a business document that contains some predefined data and often includes some areas where additional data are to be filled in. Examples: product order form, employment application, class registration request. A report is a business document that contains only predefined data; it is a passive document used solely for reading or viewing. Examples: invoice, monthly/weekly sales summaries by region.", "svg": null}, {"t": "User-Centered Design and Step 1", "d": "Designing forms and reports is a user-centered design — a design approach that involves understanding of the target audience, understanding the audience's tasks and goals, information needs, experience levels, and more. The beginning (Step 1) of designing forms and reports is collecting initial requirements during requirements determination, gaining an understanding of the intended user and task objectives.", "svg": null}, {"t": "Step 2 — Prototyping Cycle and Deliverables", "d": "Step 2 concerns structuring and refining the collected information into an initial prototype. The initial prototype is completed independently of the users; then users are asked to review and evaluate the prototype. If changes are needed, the construction–evaluate–refinement cycle is repeated until the design is accepted. Design specifications are the major deliverables to the system implementation phase.", "svg": null}, {"t": "Specification Sections", "d": "The sections of design specifications are: (1) Narrative overview — contains an overview of the characteristics of the target users, tasks, system, and environmental factors in which the form or report will be used; (2) Sample design — a sample design of the form is shown; (3) Testing and usability assessment — provides all testing and usability assessment information.", "svg": null}, {"t": "Formatting Forms and Reports", "d": "A variety of information can be provided to users: texts, audio, images, and video. Human–computer interaction researchers have provided numerous general guidelines for formatting information, and a variety of methods are available for highlighting important information.", "svg": null}, {"t": "Usability — Definition and Characteristics", "d": "Usability is the main objective when designing forms, reports, and all human–computer interactions. Characteristics of usability: (1) Speed — can the user complete tasks efficiently? (2) Accuracy — does the system provide what it is expected? (3) Satisfaction — does the user like using the system? The information system should assist user performance instead of hindering it. For a specific task, usability is the overall evaluation of how a system performs in supporting a specific user.", "svg": null}, {"t": "Usability Success Factors", "d": "The usability success factors are: (1) consistency, (2) efficiency, (3) understandability, (4) format, and (5) flexibility.", "svg": null}, {"t": "Measures and Methods of Assessing Usability", "d": "User-friendliness is the term used to describe system usability, but it is still too vague — it means different things to different people. The methods for assessing usability are: (1) learnability, (2) efficiency, (3) error rate, (4) memorability, and (5) satisfaction and aesthetics.", "svg": null}, {"t": "Collecting Usability Information", "d": "In assessing usability, there are various methods to collect information, such as: observation, interviews, keystroke capturing, and questionnaires.", "svg": null}], "qs": [{"q": "What do forms and reports denote in a system?", "opts": ["The inputs and outputs of the system", "The processes and data stores of the system", "The actors and use cases of the system", "The entities and relationships of the system"], "a": 0, "ex": "Designing forms and reports denotes the inputs and outputs of the system.", "core": false, "sref": 0}, {"q": "What is the objective of designing forms and reports?", "opts": ["To transform information gathered during analysis into a coherent design", "To convert physical design specifications into working program code", "To determine the financial benefits and costs of the planned system", "To normalize the data requirements derived from the E-R diagram"], "a": 0, "ex": "The objective is to transform information gathered during analysis into a coherent design.", "core": true, "sref": 0}, {"q": "During which activity were the system's inputs and outputs identified?", "opts": ["Requirements structuring", "Physical database design", "System installation", "Maintenance planning"], "a": 0, "ex": "Inputs and outputs were identified during requirements structuring.", "core": false, "sref": 0}, {"q": "During analysis, what is the concern regarding forms and reports?", "opts": ["Which forms and reports are needed — not their precise appearance", "The precise appearance of every form and report on screen", "The colors and fonts used to highlight critical information", "The storage format of the data shown on each report"], "a": 0, "ex": "During analysis we are not concerned with the precise appearance, but with which forms and reports are needed.", "core": false, "sref": 0}, {"q": "What is a form?", "opts": ["A business document containing some predefined data and often areas where additional data are filled in", "A business document containing only predefined data, used solely for reading or viewing", "A diagram showing the static structure of classes and the relationships among them", "A matrix specifying the possible conditions of a decision and the resulting actions"], "a": 0, "ex": "A form contains some predefined data and often includes areas where additional data are to be filled in.", "core": true, "sref": 1}, {"q": "Which of these is given as an example of a form?", "opts": ["Class registration request", "Invoice", "Monthly sales summary", "Weekly sales by region"], "a": 0, "ex": "Form examples: product order form, employment application, class registration request. Invoice and sales summaries are reports.", "core": false, "sref": 1}, {"q": "What is a report?", "opts": ["A business document containing only predefined data — a passive document used solely for reading or viewing", "A business document mixing predefined data with blank areas that users complete by hand or on screen", "A formal group activity in which participants manually examine code for occurrences of known errors", "A written description of a use case covering its trigger, preconditions, and success guarantees"], "a": 0, "ex": "A report contains only predefined data; it is a passive document used solely for reading or viewing.", "core": true, "sref": 1}, {"q": "Which of these is given as an example of a report?", "opts": ["Invoice", "Employment application", "Product order form", "Class registration request"], "a": 0, "ex": "Report examples: invoice, monthly/weekly sales summaries by region.", "core": false, "sref": 1}, {"q": "What does user-centered design involve?", "opts": ["Understanding the target audience, their tasks and goals, information needs, and experience levels", "Selecting the database storage formats that maximize processing speed for the audience", "Letting developers finalize designs before any contact with the system's intended users", "Measuring the time between failures once the system has been put into production"], "a": 0, "ex": "User-centered design involves understanding the target audience, audience's tasks and goals, information needs, experience levels, and more.", "core": false, "sref": 2}, {"q": "What is Step 1 of designing forms and reports?", "opts": ["Collecting initial requirements during requirements determination", "Building the initial prototype independently of the users", "Writing the testing and usability assessment information", "Choosing the highlighting methods for key information"], "a": 0, "ex": "Step 1: collect initial requirements during requirements determination — gain an understanding of the intended user and task objectives.", "core": true, "sref": 2}, {"q": "How is the initial prototype in Step 2 completed?", "opts": ["Independently of the users, who are then asked to review and evaluate it", "Jointly with the users through continuous pair-design working sessions", "By the users themselves, with analysts reviewing the produced screens", "Automatically by CASE tools from the project repository definitions"], "a": 0, "ex": "The initial prototype is completed independently of the users; users then review and evaluate it.", "core": false, "sref": 3}, {"q": "What cycle is repeated in Step 2 until the design is accepted?", "opts": ["The construction–evaluate–refinement cycle", "The plan–do–check–act improvement cycle", "The code–test–integrate–release pipeline", "The analyze–design–implement–maintain loop"], "a": 0, "ex": "If changes are needed, the construction–evaluate–refinement cycle is repeated until the design is accepted.", "core": false, "sref": 3}, {"q": "What are the major deliverables of forms and reports design to the implementation phase?", "opts": ["Design specifications", "Normalized relations", "Baseline project plans", "Master test plans"], "a": 0, "ex": "Design specifications are the major deliverables to the system implementation phase.", "core": true, "sref": 0}, {"q": "What are the three sections of the design specifications?", "opts": ["Narrative overview, sample design, and testing and usability assessment", "Introduction, system description, and management issues sections", "Problem statement, alternatives considered, and final recommendation", "User profile, data dictionary, and physical storage specification"], "a": 0, "ex": "Sections: (1) narrative overview, (2) sample design, (3) testing and usability assessment.", "core": true, "sref": 4}, {"q": "What does the narrative overview section contain?", "opts": ["Characteristics of the target users, tasks, system, and environmental factors in which the form or report will be used", "A complete sample of the form's visual layout, with annotations describing every field, heading, and control", "All test results, usability scores, and the assessment methods applied to the prototype", "The justification of the project in terms of its tangible and intangible economic benefits"], "a": 0, "ex": "Narrative overview: an overview of the characteristics of the target users, tasks, system, and environmental factors of use.", "core": false, "sref": 4}, {"q": "Which kinds of information can be provided to users, per the formatting discussion?", "opts": ["Texts, audio, images, and video", "Tables, keys, indexes, and views", "Entities, flows, stores, and sinks", "Events, gateways, flows, and lanes"], "a": 0, "ex": "A variety of information can be provided: texts, audio, images, and video.", "core": false, "sref": 5}, {"q": "Who has provided numerous general guidelines for formatting information?", "opts": ["Human–computer interaction researchers", "The major database technology vendors", "The Object Management Group", "Corporate strategic planners"], "a": 0, "ex": "HCI researchers have provided numerous general guidelines for formatting information.", "core": false, "sref": 5}, {"q": "What is the main objective when designing forms, reports, and all human–computer interactions?", "opts": ["Usability", "Security", "Low cost", "Brand image"], "a": 0, "ex": "Usability is the main objective when designing forms, reports, and all human–computer interactions.", "core": true, "sref": 0}, {"q": "What are the three characteristics of usability?", "opts": ["Speed, accuracy, and satisfaction", "Learnability, memorability, and error rate", "Consistency, efficiency, and flexibility", "Reliability, availability, and survivability"], "a": 0, "ex": "Characteristics: speed (efficient task completion), accuracy (system provides what is expected), satisfaction (user likes using it).", "core": true, "sref": 6}, {"q": "In usability terms, what does 'accuracy' ask?", "opts": ["Does the system provide what it is expected?", "Can the user complete tasks efficiently?", "Does the user like using the system?", "Can a new user learn the system quickly?"], "a": 0, "ex": "Accuracy: does the system provide what it is expected? Speed asks about efficiency; satisfaction asks if the user likes it.", "core": false, "sref": 6}, {"q": "For a specific task, how is usability defined?", "opts": ["The overall evaluation of how a system performs in supporting a specific user", "The number of keystrokes a trained operator needs to finish the task", "The percentage of users who prefer the system over its predecessor", "The total time spent training a new user before independent work"], "a": 0, "ex": "For a specific task, usability is the overall evaluation of how a system performs in supporting a specific user.", "core": false, "sref": 6}, {"q": "Which list gives the five usability success factors?", "opts": ["Consistency, efficiency, understandability, format, flexibility", "Speed, accuracy, satisfaction, learnability, memorability", "Observation, interviews, keystrokes, questionnaires, surveys", "Reliability, scalability, viability, privacy, compliance"], "a": 0, "ex": "Success factors: consistency, efficiency, understandability, format, and flexibility.", "core": true, "sref": 7}, {"q": "Why is the term 'user-friendliness' criticized in the course?", "opts": ["It is still too vague — it means different things to different people", "It only applies to graphical interfaces and not printed reports", "It cannot be measured by observation or keystroke capturing", "It conflicts with the security goals of internet-based systems"], "a": 0, "ex": "User-friendliness is used to describe usability but is still too vague, meaning different things to different people.", "core": false, "sref": 8}, {"q": "Which list gives the five methods for assessing usability?", "opts": ["Learnability, efficiency, error rate, memorability, satisfaction and aesthetics", "Consistency, format, flexibility, understandability, speed of completion", "Observation, interviews, prototypes, walkthroughs, desk-based checking", "Speed, accuracy, satisfaction, reliability, and overall user happiness"], "a": 0, "ex": "Assessment methods: learnability, efficiency, error rate, memorability, satisfaction and aesthetics.", "core": true, "sref": 8}, {"q": "Which of the following is among the ways to collect usability information?", "opts": ["Keystroke capturing", "Syntax checking", "Reverse engineering", "Range control"], "a": 0, "ex": "Information collection methods: observation, interviews, keystroke capturing, and questionnaires.", "core": false, "sref": 9}], "essays": [{"q": "Explain the process of designing forms and reports, including the definitions of forms and reports and the two steps of the process.", "a": "Designing forms and reports denotes the inputs and outputs of the system; the objective is to transform information gathered during analysis into a coherent design. Inputs and outputs were identified during requirements structuring — during analysis the concern is which forms and reports are needed, not their precise appearance. A form is a business document containing some predefined data and often areas where additional data are to be filled in (product order form, employment application, class registration request); a report contains only predefined data and is a passive document used solely for reading or viewing (invoice, monthly/weekly sales summaries by region). The process is user-centered design: understanding the target audience, their tasks and goals, information needs, experience levels, and more. Step 1 collects initial requirements during requirements determination to understand the intended user and task objectives. Step 2 structures and refines this information into an initial prototype completed independently of the users; users then review and evaluate it, and the construction–evaluate–refinement cycle is repeated until the design is accepted. The major deliverables to implementation are the design specifications, with three sections: narrative overview (characteristics of target users, tasks, system, and environmental factors), sample design, and testing and usability assessment."}, {"q": "Discuss usability: its characteristics, success factors, assessment methods, and ways to collect usability information.", "a": "Usability is the main objective when designing forms, reports, and all human–computer interactions. Its characteristics are speed (can the user complete tasks efficiently?), accuracy (does the system provide what is expected?), and satisfaction (does the user like using the system?). The information system should assist user performance rather than hinder it; for a specific task, usability is the overall evaluation of how a system performs in supporting a specific user. The usability success factors are consistency, efficiency, understandability, format, and flexibility. 'User-friendliness' is the common term for usability but is too vague, meaning different things to different people; the methods for assessing usability are learnability, efficiency, error rate, memorability, and satisfaction and aesthetics. Information for these assessments can be collected through observation, interviews, keystroke capturing, and questionnaires."}]}, {"id": 11, "title": "Design: Design of Internet-based Systems", "optional": false, "slides": [{"t": "Distributed and Internet Systems", "d": "Distributed systems mean LAN-based file server and client/server architectures; Internet-focused systems mean new systems development focused on Internet-based applications. These systems are deployed over more than one location, which influences reliability, availability, and survivability. They require more components (processors, networks, etc.), creating more potential places for a failure to occur. When designing distributed and Internet systems, you will need to consider numerous trade-offs.", "svg": null}, {"t": "Site Information for Design", "d": "When implementing a system design, some types of information should be available and considered for each site: a description of the site, a description of data usage, a description of the business process, and contrasts of alternative IS architectures for the site, data, and process needs.", "svg": null}, {"t": "Designing LAN Systems", "d": "A local area network (LAN) supports a network of personal computers, each with its own storage, each able to share common devices and software attached to the LAN. Typically each computer and workstation on a LAN is within a few hundred feet of another, with a total network cable length of less than 1 mile. Usually at least one computer is designated as a file server, on which shared databases and applications are stored. In a basic LAN environment, all data manipulation occurs at the workstations from which data are requested; a file server is a device that manages file operations and is shared by each client PC attached to the LAN.", "svg": null}, {"t": "File Server Limitations", "d": "Three limitations of file servers: (1) Excessive data movement. (2) The need for a powerful client workstation — there is less room on the client PC to rapidly manipulate data in high-speed RAM; data must be swapped between RAM and a relatively slower hard disk when processing a particularly large database; the client workstation does most of the work, so each client must be rather powerful to provide a suitable response time. (3) Decentralized data control — a DBMS copy in each workstation must manage the shared database integrity; the application program must recognize locks on data and take care to initiate proper locks (a lock stops users from accessing data that are in the process of being updated), and developers must understand the subtle conditions that can arise in a multiple-user database environment.", "svg": null}, {"t": "Client/Server Architecture", "d": "Client/server architecture is an improvement in LAN-based systems: application processing is divided between client and server. The client workstation is responsible for managing the user interface; the database server is responsible for database storage and access. Adopting a client/server architecture allows: (1) companies to leverage the benefits of microcomputer technology; (2) most processing to be performed close to the source of processed data — improving response times and reducing network traffic; (3) facilitating the use of graphical user interfaces and visual presentation techniques commonly available for workstations; (4) allowing for and encouraging the acceptance of open systems.", "svg": null}, {"t": "Cloud Computing — Context and Definition", "d": "Managing the information systems infrastructure means managing hardware, software, data, facilities, human resources, and services — leading to support for the organization's decision-making process, business processes, and competitive strategy. Challenges for many organizations: demand for more storage and networking bandwidth, and the rising costs of energy. There is a shift away from developing and maintaining IS infrastructure toward identifying services the infrastructure should deliver — buy or rent applications rather than build. Cloud computing refers to the provision of applications over the Internet where customers do not have to invest in the hardware and software resources needed and are charged on a per-use basis.", "svg": null}, {"t": "Cloud Characteristics and Service Models", "d": "Cloud characteristics: on-demand self-service, rapid elasticity, broad network access, resource pooling, measured service, and service models. The cloud computing service models: Infrastructure as a Service (IaaS), Platform as a Service (PaaS), and Software as a Service (SaaS).", "svg": null}, {"t": "Selecting Cloud Service Providers", "d": "Criteria for evaluating and selecting cloud service providers: availability, reliability, scalability, viability, security, privacy, compliance, diversity of offerings, openness, and cost.", "svg": null}, {"t": "Service-Oriented Architecture (SOA)", "d": "SOA is a software architecture in which business processes are broken down into individual components (or services), designed to achieve the desired results for the service consumer. Web services are the most common approach for deploying a SOA; web services have specific rules governing the communication between systems. For data exchange, web services utilize: (1) eXtensible Markup Language (XML) — an Internet authoring language that allows designers to create customized tags, enabling the definition, transmission, validation, and interpretation of data between applications; and (2) JavaScript Object Notation (JSON) — a lightweight data interchange approach that is relatively easy for humans to understand and for computers to generate or interpret.", "svg": null}, {"t": "Designing Internet Systems — Consistency", "d": "Characteristics of the Internet that influence system design: the standards that drive the Internet and its ongoing evolution. Site consistency (look and feel) is fundamental to conveying the image that a site is professionally designed; high consistency also makes it easier for users to navigate and anticipate the meaning of links. It is a poor design decision not to enforce a standard look and feel across an entire site.", "svg": null}, {"t": "CSS and XSL", "d": "Solutions to enforce design consistency: Cascading Style Sheets (CSSs) — a set of style rules that tell a Web browser how to present a document; they simplify site maintenance and ensure pages are consistent. CSS is implemented through linked style sheets: when changing style elements across an entire site, only a single file needs to be updated, adopted through HTML's LINK element. eXtensible Stylesheet Language (XSL) is a more sophisticated method — a specification for separating style from content when generating XML pages; it allows designers to apply single style templates to multiple pages and provides specifications allowing XML content to be seamlessly displayed on various client devices.", "svg": null}, {"t": "Site Management — Trust and Permanent Links", "d": "Design issues related to site management: (1) Customer loyalty and trustworthiness — customers must feel that the site and their data are secure; customers build trust from positive experiences through design quality, up-front disclosure, comprehensiveness, and connectedness to the rest of the Web; provide customers with useful personalized content. (2) Links must live forever, because of customer bookmarks, links from other sites, search engine referrals, and because old content adds value.", "svg": null}, {"t": "Site Management — Security and CMS", "d": "(3) System security: a secure system is often much less 'user-friendly', and an easy-to-use system is often less secure — there must be an appropriate balance between security and ease of use. (4) Website content management: to deal with outdated information and inconsistent layouts, organizations use a content management system (CMS) — a software application that collects, organizes, and publishes Website content from multiple organizational data sources, with the content stored in a single repository.", "svg": null}], "qs": [{"q": "In this module, what does 'distributed systems' mean?", "opts": ["LAN-based file server and client/server architectures", "Any system deployed entirely within a single office", "Systems built exclusively from cloud SaaS offerings", "Mainframe systems accessed by remote dumb terminals"], "a": 0, "ex": "Distributed systems: LAN-based file server and client/server architectures; Internet-focused systems target Internet-based applications.", "core": false, "sref": 0}, {"q": "Deploying systems over more than one location influences which qualities?", "opts": ["Reliability, availability, and survivability", "Consistency, format, and understandability", "Learnability, memorability, and error rate", "Speed, accuracy, and user satisfaction"], "a": 0, "ex": "Multi-location deployment influences reliability, availability, and survivability.", "core": false, "sref": 0}, {"q": "Why do distributed systems have more potential places for failure?", "opts": ["They require more components, such as processors and networks", "They are always built without any formal testing activities", "They run older software versions than centralized systems", "They cannot use locks to protect data while it is updated"], "a": 0, "ex": "They require more components (processors, networks, etc.), so there are more potential places for a failure to occur.", "core": false, "sref": 0}, {"q": "Which of the following is among the site information needed when implementing a distributed system design?", "opts": ["Description of data usage", "Schedule of staff vacations", "List of programming languages", "History of past project budgets"], "a": 0, "ex": "Needed per site: description of site, description of data usage, description of business process, contrasts of alternative IS architectures.", "core": false, "sref": 1}, {"q": "What is the typical scale of a LAN, per the course?", "opts": ["Computers within a few hundred feet of each other, total cable length under 1 mile", "Computers within the same metropolitan city, cable lengths of up to 50 miles", "Computers across one country connected through leased long-distance lines", "Computers worldwide connected through a common Internet protocol suite"], "a": 0, "ex": "Each computer is typically within a few hundred feet of another, with total network cable length less than 1 mile.", "core": true, "sref": 2}, {"q": "What is a file server?", "opts": ["A device that manages file operations and is shared by each client PC attached to the LAN", "A workstation responsible for managing the user interface of every networked application", "A server that executes all data manipulation centrally on behalf of the client machines", "A cloud component that pools resources and meters usage on a per-use billing basis"], "a": 0, "ex": "A file server manages file operations and is shared by each client PC attached to the LAN.", "core": true, "sref": 4}, {"q": "In a basic LAN environment, where does all data manipulation occur?", "opts": ["At the workstations from which data are requested", "At the file server holding the shared databases", "At a dedicated middle-tier application server", "At the cloud provider's nearest data center"], "a": 0, "ex": "In a basic LAN environment, all data manipulation occurs at the workstations from which data are requested.", "core": false, "sref": 2}, {"q": "How many limitations of file servers does the course list?", "opts": ["Three", "Two", "Four", "Five"], "a": 0, "ex": "Three limitations: excessive data movement, need for a powerful client workstation, decentralized data control.", "core": false, "sref": 3}, {"q": "Which is one of the listed file server limitations?", "opts": ["Excessive data movement", "Excessive server processing", "Centralized data control", "Mandatory thin clients"], "a": 0, "ex": "Limitations: (1) excessive data movement, (2) need for a powerful client workstation, (3) decentralized data control.", "core": false, "sref": 3}, {"q": "Why must each client workstation be powerful in a file server environment?", "opts": ["The client does most of the work, so it must be powerful to provide a suitable response time", "The server refuses connections from machines below a minimum hardware specification", "The DBMS license requires identical high-end hardware across all attached machines", "Each client must store a complete mirrored copy of every shared application program"], "a": 0, "ex": "The client workstation does most of the work; data swaps between RAM and slower disk on large databases, so clients must be powerful for suitable response time.", "core": false, "sref": 3}, {"q": "What is a lock, in the context of decentralized data control?", "opts": ["A mechanism necessary to stop users from accessing data that are in the process of being updated", "A security key that encrypts the database files stored on the shared file server", "A scheduling rule preventing two programs from running at the same instant", "A network token passed between workstations to authorize message sending"], "a": 0, "ex": "A lock is necessary to stop users from accessing data that are in the process of being updated.", "core": true, "sref": 3}, {"q": "In client/server architecture, how is application processing divided?", "opts": ["The client manages the user interface; the database server handles database storage and access", "The client stores the database; the server renders the screens shown to each user", "The client and the server each keep complete copies of both interface and data", "The server manages everything while the client serves only as a display terminal"], "a": 0, "ex": "Application processing is divided: client workstation manages the user interface; database server is responsible for database storage and access.", "core": false, "sref": 4}, {"q": "Which is one of the listed benefits of adopting client/server architecture?", "opts": ["Most processing is performed close to the source of processed data, improving response times and reducing network traffic", "All data manipulation moves to the client workstations, removing the need for any central database administration", "Every workstation receives its own copy of the DBMS to manage shared database integrity independently", "The network cable length can be extended beyond one mile without adding any additional components"], "a": 0, "ex": "Benefits: leverage microcomputer technology; processing close to data (better response times, less network traffic); GUI/visual techniques; open systems acceptance.", "core": false, "sref": 4}, {"q": "Client/server architecture facilitates the use of which interface style?", "opts": ["Graphical user interfaces and visual presentation techniques", "Command-line interfaces with batch submission of requests", "Punched-card input prepared offline by data-entry operators", "Voice-only interfaces without any visual display components"], "a": 0, "ex": "It facilitates the use of graphical user interfaces and visual presentation techniques commonly available for workstations.", "core": false, "sref": 4}, {"q": "Managing the IS infrastructure means managing which set of resources?", "opts": ["Hardware, software, data, facilities, human resources, and services", "Entities, relationships, attributes, domains, and triggering rules", "Plans, schedules, budgets, milestones, and deliverable documents", "Forms, reports, prototypes, specifications, and usability scores"], "a": 0, "ex": "Managing IS infrastructure: hardware, software, data, facilities, human resources, and services.", "core": false, "sref": 5}, {"q": "Which two challenges drive organizations toward cloud computing?", "opts": ["Demand for more storage and networking bandwidth, and the rising costs of energy", "Shortage of programming staff, and the expanding length of application backlogs", "Stricter Saudization rules, and the difficulty of registering new activity codes", "Falling hardware prices, and the increasing reliability of desktop computers"], "a": 0, "ex": "Challenges: demand for more storage and networking bandwidth, and the rising costs of energy.", "core": false, "sref": 5}, {"q": "What is cloud computing, as defined in this module?", "opts": ["Provision of applications over the Internet, with no customer investment in hardware/software and per-use charging", "Provision of dedicated physical servers leased to one customer and billed at a fixed annual rate", "A LAN architecture in which one file server stores the shared databases and applications", "A software architecture in which business processes are broken into individual services"], "a": 0, "ex": "Cloud computing: applications provided over the Internet; customers do not invest in the needed hardware and software resources and are charged on a per-use basis.", "core": true, "sref": 5}, {"q": "Which list gives cloud characteristics from the course?", "opts": ["On-demand self-service, rapid elasticity, broad network access, resource pooling, measured service", "Speed, accuracy, satisfaction, learnability, and measured memorability of the interface", "Availability, reliability, scalability, viability, security, privacy, and openness of offers", "Consistency, efficiency, understandability, format, and flexibility of the deployment"], "a": 0, "ex": "Cloud characteristics: on-demand self-service, rapid elasticity, broad network access, resource pooling, measured service, and service models.", "core": false, "sref": 6}, {"q": "What are the three cloud computing service models?", "opts": ["Infrastructure as a Service, Platform as a Service, and Software as a Service", "Storage as a Service, Network as a Service, and Security as a Service", "Database as a Service, Backup as a Service, and Desktop as a Service", "Functions as a Service, Containers as a Service, and APIs as a Service"], "a": 0, "ex": "Service models: IaaS, PaaS, and SaaS.", "core": true, "sref": 6}, {"q": "Which of the following is among the criteria for evaluating and selecting cloud service providers?", "opts": ["Viability", "Polymorphism", "Cardinality", "Modularity"], "a": 0, "ex": "Criteria: availability, reliability, scalability, viability, security, privacy, compliance, diversity of offerings, openness, and cost.", "core": false, "sref": 7}, {"q": "What is Service-Oriented Architecture (SOA)?", "opts": ["A software architecture in which business processes are broken down into individual components or services", "A network design in which every workstation carries its own copy of the shared corporate database", "A style of programming where the interface and the database reside on one central machine", "A method of arranging table rows so related records sit together in secondary memory"], "a": 0, "ex": "SOA: a software architecture in which business processes are broken down into individual components (services) designed to achieve the desired results for the service consumer.", "core": true, "sref": 8}, {"q": "What is the most common approach for deploying a SOA?", "opts": ["Web services", "File servers", "Virtual machines", "Message queues"], "a": 0, "ex": "Web services are the most common approach for deploying a SOA.", "core": true, "sref": 3}, {"q": "What is XML, per the course?", "opts": ["An Internet authoring language allowing customized tags for the definition, transmission, validation, and interpretation of data between applications", "A lightweight data interchange approach that is easy for humans to read and for computers to generate or interpret quickly", "A specification for separating style from content when generating pages for display across many client devices", "A set of style rules that tell a Web browser exactly how a given document should be presented on screen"], "a": 0, "ex": "XML: an Internet authoring language that allows designers to create customized tags, enabling the definition, transmission, validation, and interpretation of data between applications.", "core": true, "sref": 8}, {"q": "What is JSON, per the course?", "opts": ["A lightweight data interchange approach, relatively easy for humans to understand and for computers to generate or interpret", "An authoring language with customized tags enabling validation and interpretation of data between applications", "A linked stylesheet mechanism where a single file update changes the look of every page across a site", "A markup standard maintained by the OMG for representing complex business process diagrams"], "a": 0, "ex": "JSON: a lightweight data interchange approach that is relatively easy for humans to understand and for computers to generate or interpret.", "core": true, "sref": 8}, {"q": "Which two characteristics of the Internet influence system design?", "opts": ["The standards that drive the Internet and its ongoing evolution", "The cost of bandwidth and the geographic location of servers", "The age of the protocols and the number of connected devices", "The browser market shares and the popularity of mobile apps"], "a": 0, "ex": "Characteristics: standards that drive the Internet, and the ongoing evolution.", "core": true, "sref": 9}, {"q": "Why is site consistency (look and feel) fundamental?", "opts": ["It conveys the image that a site is professionally designed and makes navigation and link meaning easier to anticipate", "It removes the need for any content management system by keeping every page in one repository", "It guarantees that the site remains available around the clock without any maintenance windows", "It allows the site to skip search engine reregistration whenever the content changes significantly"], "a": 0, "ex": "Consistency conveys a professionally designed image; high consistency makes it easier for users to navigate and anticipate the meaning of links.", "core": false, "sref": 9}, {"q": "What is a Cascading Style Sheet (CSS)?", "opts": ["A set of style rules that tell a Web browser how to present a document", "A scripting language used to validate the data entered into web forms", "A repository collecting and publishing content from multiple data sources", "A specification for separating style from content when generating XML"], "a": 0, "ex": "CSS: a set of style rules that tell a Web browser how to present a document; it simplifies maintenance and ensures consistency.", "core": true, "sref": 10}, {"q": "What is the maintenance benefit of linked style sheets?", "opts": ["When changing style elements across an entire site, only a single file needs to be updated", "Each page carries its own embedded styles, so designers can adjust pages independently", "Browsers cache every page permanently, reducing the server's bandwidth consumption", "Old links continue to work forever because styles are versioned inside the repository"], "a": 0, "ex": "With linked style sheets, only a single file needs updating to change style across an entire site — adopted through HTML's LINK element.", "core": true, "sref": 10}, {"q": "Through which HTML element are linked style sheets adopted?", "opts": ["The LINK element", "The STYLE element", "The META element", "The SCRIPT element"], "a": 0, "ex": "Linked style sheets are adopted through HTML's LINK element.", "core": false, "sref": 10}, {"q": "What is XSL?", "opts": ["A specification for separating style from content when generating XML pages", "A lightweight interchange format for transmitting objects between systems", "A set of rules telling browsers how to render classic HTML documents", "An authoring language for defining customized tags within documents"], "a": 0, "ex": "XSL: a specification for separating style from content when generating XML pages; it applies single style templates to multiple pages and supports display on various client devices.", "core": true, "sref": 10}, {"q": "Which of these helps customers build trust in a website, per the course?", "opts": ["Up-front disclosure", "Frequent redesigns", "Mandatory accounts", "Pop-up promotions"], "a": 0, "ex": "Trust builds from positive experiences: design quality, up-front disclosure, comprehensiveness, connectedness — plus useful personalized content.", "core": false, "sref": 11}, {"q": "Why must links live forever?", "opts": ["Customer bookmarks, links from other sites, search engine referrals, and old content adds value", "Web servers cannot delete pages once they have been published to the public Internet", "Browsers refuse to render any site whose internal links have changed since last visit", "Content management systems require permanent URLs to synchronize their repositories"], "a": 0, "ex": "Links must live forever because of customer bookmarks, links from other sites, search engine referrals, and because old content adds value.", "core": false, "sref": 11}, {"q": "What is the security vs. ease-of-use trade-off in site management?", "opts": ["A secure system is often much less user-friendly, and an easy-to-use system is often less secure — balance is needed", "Security and ease of use always improve together, so designers should simply maximize both of them at once", "Ease of use matters only on public pages, while security matters only on internal pages", "Security must always take absolute priority regardless of the impact on the site's users"], "a": 0, "ex": "A secure system is often much less 'user-friendly' and an easy-to-use system is often less secure; there must be an appropriate balance.", "core": true, "sref": 12}, {"q": "What is a content management system (CMS)?", "opts": ["A software application that collects, organizes, and publishes Website content from multiple organizational data sources", "A database design tool that normalizes relations gathered from the organization's user interfaces", "A network monitoring suite that checks for broken links and validates the HTML of every page", "A help desk platform providing a single point of contact for all user inquiries and problems"], "a": 0, "ex": "CMS: collects, organizes, and publishes Website content from multiple organizational data sources; content is stored in a single repository.", "core": true, "sref": 12}, {"q": "Where does a CMS store the content it manages?", "opts": ["In a single repository", "In each page's HTML", "On every client browser", "In separate site mirrors"], "a": 0, "ex": "The content is stored in a single repository.", "core": false, "sref": 12}, {"q": "What must a designer of distributed and Internet systems be prepared to do, per the course?", "opts": ["Consider numerous trade-offs when designing the system", "Avoid every architecture that uses multiple components", "Guarantee that no failure can ever occur at any location", "Centralize all processing at one single physical location"], "a": 0, "ex": "When designing distributed and Internet systems, you will need to consider numerous trade-offs.", "core": false, "sref": 0}], "essays": [{"q": "Discuss the considerations in designing distributed and Internet systems, including the site information needed.", "a": "Distributed systems mean LAN-based file server and client/server architectures, while Internet-focused systems concentrate new development on Internet-based applications. These systems are deployed over more than one location, which influences reliability, availability, and survivability; they require more components (processors, networks, etc.), creating more potential places for a failure to occur, so the designer must consider numerous trade-offs. When implementing a system design, the information that should be available and considered for each site includes: a description of the site, a description of data usage, a description of the business process, and contrasts of alternative IS architectures for the site, data, and process needs."}, {"q": "Describe LAN-based file server systems and explain the three limitations of file servers.", "a": "A LAN supports a network of personal computers, each with its own storage and each able to share common devices and software attached to the LAN; typically each computer is within a few hundred feet of another, with total network cable length under 1 mile. Usually at least one computer is designated as a file server storing shared databases and applications; in a basic LAN environment all data manipulation occurs at the workstations from which data are requested, while the file server manages file operations shared by each attached client PC. Limitations: (1) excessive data movement; (2) the need for a powerful client workstation — there is less room on the client PC to rapidly manipulate data in high-speed RAM, data must be swapped between RAM and the slower hard disk when processing a large database, and since the client does most of the work each client must be powerful to give suitable response times; (3) decentralized data control — a DBMS copy in each workstation must manage shared database integrity, applications must recognize and initiate proper locks (a lock stops users from accessing data being updated), and developers must understand the subtle conditions of multiple-user database environments."}, {"q": "Explain client/server architecture and the benefits of adopting it.", "a": "Client/server architecture is an improvement in LAN-based systems in which application processing is divided between client and server: the client workstation is responsible for managing the user interface, while the database server is responsible for database storage and access. Adopting client/server allows: (1) companies to leverage the benefits of microcomputer technology; (2) most processing to be performed close to the source of processed data, which improves response times and reduces network traffic; (3) the use of graphical user interfaces and visual presentation techniques commonly available for workstations; and (4) allowing for and encouraging the acceptance of open systems."}, {"q": "Discuss cloud computing: definition, characteristics, service models, and provider selection criteria.", "a": "Managing the IS infrastructure means managing hardware, software, data, facilities, human resources, and services in support of the organization's decision making, business processes, and competitive strategy; challenges include the demand for more storage and networking bandwidth and the rising costs of energy. Organizations are shifting from developing and maintaining infrastructure toward identifying the services the infrastructure should deliver — buying or renting applications rather than building. Cloud computing is the provision of applications over the Internet where customers do not have to invest in the hardware and software resources needed and are charged on a per-use basis. Cloud characteristics: on-demand self-service, rapid elasticity, broad network access, resource pooling, measured service, and service models. The service models are Infrastructure as a Service (IaaS), Platform as a Service (PaaS), and Software as a Service (SaaS). Criteria for evaluating and selecting cloud providers: availability, reliability, scalability, viability, security, privacy, compliance, diversity of offerings, openness, and cost."}, {"q": "Explain SOA and web services, including the roles of XML and JSON.", "a": "Service-Oriented Architecture (SOA) is a software architecture in which business processes are broken down into individual components (or services) designed to achieve the desired results for the service consumer. Web services are the most common approach for deploying a SOA, with specific rules governing communication between systems. For data exchange, web services utilize: XML (eXtensible Markup Language) — an Internet authoring language that allows designers to create customized tags, enabling the definition, transmission, validation, and interpretation of data between applications; and JSON (JavaScript Object Notation) — a lightweight data interchange approach that is relatively easy for humans to understand and for computers to generate or interpret."}, {"q": "Discuss the design of Internet systems: consistency, CSS and XSL, and the four site management issues.", "a": "Internet characteristics influencing design are the standards that drive the Internet and its ongoing evolution. Site consistency (look and feel) is fundamental to conveying a professionally designed image, and high consistency makes navigation easier and link meanings predictable — failing to enforce a standard look and feel across a site is a poor design decision. Consistency is enforced through Cascading Style Sheets — sets of style rules telling a Web browser how to present a document, implemented as linked style sheets through HTML's LINK element so that changing styles across the entire site requires updating only a single file — and eXtensible Stylesheet Language, a more sophisticated specification for separating style from content when generating XML pages, applying single style templates to multiple pages and allowing XML content to display seamlessly on various client devices. Site management issues: (1) customer loyalty and trustworthiness — customers must feel the site and their data are secure, building trust from positive experiences via design quality, up-front disclosure, comprehensiveness, and connectedness, plus useful personalized content; (2) links must live forever — because of customer bookmarks, links from other sites, search engine referrals, and the value of old content; (3) system security — secure systems are often less user-friendly and easy-to-use systems often less secure, so an appropriate balance is required; (4) website content management — organizations use a CMS, a software application that collects, organizes, and publishes content from multiple organizational data sources into a single repository, to combat outdated information and inconsistent layouts."}]}, {"id": 12, "title": "Implementation: System Implementation Process", "optional": false, "slides": [{"t": "Implementation — Cost and Nature", "d": "After maintenance, the implementation phase of the SDLC is the most expensive and time-consuming phase of the entire life cycle: many people are involved in the process (the reason it is expensive), and all the work that has to be completed (the reason it is time-consuming). Implementing a new IS in an organizational context is not a mechanical process — it involves the work habits, beliefs, interrelationships, and personal goals of an organization's members. Different factors important to successful implementation have been identified, but there are no sure procedures you can follow.", "svg": null}, {"t": "Six Major Activities of Implementation", "d": "The major activities of software implementation: coding, testing, installation, documentation, training, and support. Their purposes: convert the physical system specifications into working and reliable software and hardware; document the work that has been done; and provide help for current and future users and caretakers of the system.", "svg": null}, {"t": "Agile vs. Plan-Driven Note", "d": "If agile methodologies have been followed, coding and testing activities may have been completed. If a plan-driven methodology is followed, coding and testing activities are often done by other project team members. In any case, analysts are responsible for ensuring that all of these various activities are properly planned and executed.", "svg": null}, {"t": "Coding, Testing, and Installation Processes", "d": "Coding: the physical design specifications created by the analysis team are turned into working computer code by the programming team. Testing: once coding has begun, testing can begin and proceed in parallel — each program module can be tested individually, then incrementally with other modules; plan for testing early in the project (during the analysis phase): what needs to be tested and collecting test data. Installation: the process during which the current system is replaced by the new system, including conversion of existing data, software, documentation, and work procedures to those consistent with the new system.", "svg": null}, {"t": "Documenting, Training, and Supporting", "d": "Documentation proceeds throughout the life cycle, with formal attention during the implementation phase (the analysis team's involvement ends by the end of implementation). The audiences of documentation: the information systems personnel who will maintain the system, and the people who will use the system. Training and supporting users: some training and support is particular to application systems; the rest is general to particular operating systems or off-the-shelf software packages.", "svg": null}, {"t": "Test Plans Across the SDLC", "d": "Software testing begins early in the SDLC. During analysis, you develop a master test plan — a collection of documents. During design, you develop a unit test plan, an integration test plan, and a system test plan. These test plans improve communication among all the team members involved in testing — they define the roles of each member and serve as a checklist. During implementation, these various plans are put into effect and the actual testing is performed.", "svg": null}, {"t": "Test Classification — Technique and Automation", "d": "Types of tests are categorized under: (1) Employed technique — static techniques (the code being tested is not executed) vs. dynamic techniques (involve execution of the code); (2) Test automation — automated (the computer conducts the test) vs. manual (people complete the test).", "svg": null}, {"t": "Types of Tests", "d": "(1) Inspections are formal group activities where participants manually examine code for occurrences of well-known errors. (2) Walk-throughs can be used to review many systems development deliverables. (3) Desk checking is an informal process in which the programmer or someone else who understands the logic of the program works through the code manually. (4) Syntax checking is typically done by a compiler. (5) In unit testing, each module is tested alone to discover any errors that may exist in the module's code.", "svg": null}, {"t": "Integration and System Testing", "d": "(6) In integration testing, we combine modules and test them incrementally — integrating modules into programs for testing. (7) In system testing, we combine programs and test them gradually — integrating programs into systems. In both integration and system testing, interfaces between modules and programs are tested.", "svg": null}, {"t": "Four Installation Approaches", "d": "Installation is the moving from the current information system to the new one. Four main approaches: (1) Direct installation — the old system is turned off and the new system is turned on. (2) Parallel installation — the old system continues to run alongside the new system until users and management are satisfied wit
