 financial statements"], "a": 0, "ex": "The informal system — the way the system actually works in practice — is revealed by interviews and observation.", "core": false, "sref": 11}, {"q": "What is Joint Application Design (JAD)?", "opts": ["A structured process in which users, managers, and analysts work together for several days in a series of intensive meetings to specify or review system requirements", "An iterative coding cycle of analyze, design, code, and test repeated with continual user involvement until the working system satisfies every stated requirement of the customer", "A facilitated voting method where members first work alone", "A radical redesign of business processes for breakthrough gains"], "a": 0, "ex": "JAD is a structured process in which users, managers, and analysts work together for several days in intensive meetings to specify or review requirements.", "core": true, "sref": 13}, {"q": "Where is JAD typically conducted, and who started it?", "opts": ["Conducted off-site; started by IBM in the 1970s", "Conducted in the user's office; started by Microsoft in the 1980s", "Conducted online; started by Beck and Andres", "Conducted in the data center; started by Cockburn"], "a": 0, "ex": "JAD brings key people together off-site; it is resource intensive and was started by IBM in the 1970s.", "core": false, "sref": 12}, {"q": "In a JAD session, what is the role of the systems analysts?", "opts": ["They should mostly listen", "They facilitate the group process", "They champion the project at a high level", "They record all session activities"], "a": 0, "ex": "Systems analysts (and IS staff) should mostly listen; the session leader facilitates, the sponsor champions, and the scribe records.", "core": false, "sref": 13}, {"q": "In a JAD session, who records the session activities?", "opts": ["The scribe", "The sponsor", "The session leader", "The standard-bearer"], "a": 0, "ex": "The scribe records session activities. (The standard-bearer is a walk-through role, not a JAD role.)", "core": true, "sref": 13}, {"q": "How do group support systems (GSS) enhance JAD?", "opts": ["Members type their answers into the computer and all members see what others have been typing, enabling more participation", "They automatically generate the final program code and documentation from the typed session minutes", "They replace the session leader with an artificial moderator", "They restrict speaking rights to managers and sponsors only"], "a": 0, "ex": "GSS enable more participation: members type answers into the computer and all members of the group see what others have been typing.", "core": false, "sref": 14}, {"q": "Which CASE tools are used during JAD sessions?", "opts": ["Upper CASE tools, enabling analysts to enter system models directly during the session", "Lower CASE tools used for generating the production program code", "Reverse engineering tools used for documenting the legacy databases", "Re-engineering tools used for tuning the performance of older systems"], "a": 0, "ex": "Upper CASE tools are used during JAD, letting analysts enter system models directly and show screen designs and prototypes to users.", "core": false, "sref": 14}, {"q": "What is prototyping, in requirements determination?", "opts": ["An iterative process in which requirements are converted to a working system that is continually revised through close collaboration between an analyst and users", "A process of formally documenting every requirement in full written detail before any construction work of any kind is allowed to begin on the system", "A technique for observing workers during their normal duties", "A method of ranking projects using multiple weighted criteria"], "a": 0, "ex": "Prototyping is an iterative process of systems development converting requirements into a working system continually revised through close analyst–user collaboration.", "core": true, "sref": 15}, {"q": "How does EVOLUTIONARY prototyping differ from THROWAWAY prototyping?", "opts": ["Evolutionary prototyping evolves the rest of the system from the modeled parts; throwaway prototyping does not preserve the developed prototype", "Evolutionary prototyping discards every prototype after review; throwaway prototyping keeps and evolves all of them into the final delivered system", "Evolutionary prototyping skips user feedback; throwaway requires it", "Evolutionary prototyping is manual; throwaway is fully automated"], "a": 0, "ex": "In evolutionary prototyping you model parts of the target system and evolve the rest from those parts; throwaway prototyping does not preserve the prototype.", "core": false, "sref": 15}, {"q": "When is prototyping MOST useful?", "opts": ["When user requests are not clear, few users are involved, designs are complex, there were communication problems, and tools are readily available", "When the requirements have already been completely fixed, fully documented in advance, and formally signed off by every single user department involved", "When many thousands of users must be served reliably from the very first production release of the system", "When no software development tools of any kind are available to the analysts or to the programming team members"], "a": 0, "ex": "Prototyping is most useful when requests are unclear, few users are involved, designs are complex and need concrete form, there is a history of communication problems, and tools are readily available.", "core": false, "sref": 15}, {"q": "Which is a stated DRAWBACK of prototyping?", "opts": ["SDLC checks are often bypassed and formal documentation tends to be avoided", "It forces excessive formal documentation at every step of the development", "It prevents any close collaboration with system users", "It cannot produce a working version of the system"], "a": 0, "ex": "Drawbacks: tendency to avoid formal documentation, difficulty adapting to a more general audience, data sharing with other systems often not considered, and SDLC checks often bypassed.", "core": false, "sref": 15}, {"q": "What is business process reengineering (BPR)?", "opts": ["The search for, and implementation of, radical change in business processes to achieve breakthrough improvements in products and services", "The incremental fine-tuning of the organization's existing business procedures in order to achieve small, gradual efficiency gains over time", "The routine migration of an existing application system to a different operating environment or platform", "The standard organizational process for collecting the system requirements through individual interviews"], "a": 0, "ex": "BPR is the search for and implementation of radical change in business processes to achieve breakthrough improvements in products and services.", "core": true, "sref": 16}, {"q": "Which is a stated goal of BPR?", "opts": ["Reorganize the complete flow of data in major sections of an organization, eliminating and combining unnecessary steps", "Preserve every existing step of the current business processes while automating the paperwork between them", "Limit change to a single department's internal paperwork", "Slow the organization's response to future change"], "a": 0, "ex": "BPR goals: reorganize the complete flow of data in major sections, eliminate unnecessary steps, combine steps, and become more responsive to future change.", "core": false, "sref": 16}, {"q": "What are key business processes?", "opts": ["Sets of activities designed to produce specific output for a particular customer or market, focused on customers and outcome", "The internal accounting routines that close the organization's financial books at the end of each quarter for review by the external auditors", "The internal hiring and onboarding procedures maintained by the human resources department", "The nightly backup and recovery operations performed by the staff of the corporate data center"], "a": 0, "ex": "Key business processes are structured, measured sets of activities designed to produce specific output for a particular customer or market, focused on customers and outcome.", "core": true, "sref": 16}, {"q": "What are disruptive technologies, per the course?", "opts": ["Technologies that enable breaking long-held business rules that inhibit organizations from making radical business changes", "Technologies that frequently crash and disrupt the daily operations of the organization's main systems", "Technologies that are banned by industry regulators", "Technologies used exclusively for entertainment purposes"], "a": 0, "ex": "Disruptive technologies enable breaking long-held business rules that inhibit organizations from making radical business changes.", "core": true, "sref": 16}, {"q": "How do agile methodologies replace the traditional waterfall for requirements?", "opts": ["With continual user involvement in an iterative analyze–design–code–test cycle", "With a single comprehensive requirements sign-off held at the project start", "With fully automated requirement-generation software", "With annual requirement reviews by external auditors"], "a": 0, "ex": "Agile replaces the waterfall with continual user involvement in an iterative analyze–design–code–test cycle.", "core": false, "sref": 17}, {"q": "What does agile usage-centered design focus on?", "opts": ["User goals, roles, and tasks", "Hardware capacity and network bandwidth", "Database normalization and indexing", "Contract terms and penalty clauses"], "a": 0, "ex": "Agile usage-centered design focuses on user goals, roles, and tasks.", "core": false, "sref": 17}, {"q": "What are the three elements of eXtreme Programming's Planning Game?", "opts": ["Exploration, steering, commitment", "Initiation, execution, closedown", "Abstraction, storage, recontextualization", "Identification, ranking, selection"], "a": 0, "ex": "The Planning Game, based on eXtreme Programming, consists of exploration, steering, and commitment.", "core": true, "sref": 17}], "essays": [{"q": "Discuss the five characteristics an analyst needs during requirements determination.", "a": "Impertinence: the analyst should question everything, rather than accepting current arrangements at face value. Impartiality: the analyst's role is to find the best solution to a business problem or opportunity, not to advocate a predetermined answer. Relaxing constraints: assume that anything is possible and eliminate the infeasible, so promising options are not dismissed prematurely. Attention to details: every fact must fit with every other fact, so the requirements picture is internally consistent. Reframing: analysis is, in part, a creative process, so the analyst must be able to look at the organization and its problems in new ways."}, {"q": "Compare the traditional methods for determining system requirements.", "a": "Interviewing individuals: a dialogue with a user or manager to obtain requirements, using open-ended questions (no prespecified answers) and closed-ended questions (choose among specified responses); pros — easier to schedule; cons — contradictions between interviewees and time-consuming follow-ups. Interviewing groups: several key people together, possibly with multiple interviewers splitting questioning and note-taking; advantages — more effective use of time, hearing agreements and disagreements at once, opportunity for synergies; disadvantage — harder to schedule. The Nominal Group Technique can complement group interviews: members first work alone writing ideas, a trained facilitator pools them, and the group discusses, prioritizes, combines, and reduces them. Observing workers: watching users do their jobs can be more accurate than self-reporting since people are not always reliable informants, but observation can cause people to change their normal behavior. Studying business documents: written work procedures, business forms, reports, and descriptions of the current system reveal issues, policies, rules, and concrete examples of data use — providing the historical, formal view that complements the informal system revealed by interviews and observation."}, {"q": "Explain JAD: its definition, participants, and how CASE tools and GSS support it.", "a": "Joint Application Design (JAD) is a structured process in which users, managers, and analysts work together for several days in a series of intensive meetings to specify or review system requirements. It is an intensive, group-oriented technique conducted off-site, with the team meeting in isolation for an extended period; it is highly focused and resource intensive, and was started by IBM in the 1970s. Participants: the session leader facilitates the group process; users and managers are the active, speaking participants; the sponsor is a high-level champion with limited participation; systems analysts and IS staff should mostly listen; and the scribe records session activities. Upper CASE tools support JAD by letting analysts enter system models directly during the session, with screen designs and prototyping shown to users. Group support systems (GSS) enable more participation: members type their answers into the computer and all members see what others have typed. The end result is documentation detailing the existing system and the features of the proposed system."}, {"q": "Explain prototyping: types, when it is most useful, and its drawbacks.", "a": "Prototyping is an iterative process of systems development in which requirements are converted to a working system that is continually revised through close collaboration between an analyst and users. Evolutionary prototyping begins by modeling parts of the target system and, if successful, evolves the rest of the system from those parts; throwaway prototyping does not preserve the prototype that has been developed. Prototyping is most useful when user requests are not clear; few users are involved in the system; designs are complex and require concrete form; there is a history of communication problems between analysts and users; and tools are readily available to build the prototype. Its drawbacks: a tendency to avoid formal documentation; difficulty adapting the result to a more general user audience; sharing data with other systems is often not considered; and SDLC checks are often bypassed."}, {"q": "Describe the radical and agile methods for determining system requirements.", "a": "Radical: business process reengineering (BPR) is the search for, and implementation of, radical change in business processes to achieve breakthrough improvements in products and services. Its goals are to reorganize the complete flow of data in major sections of the organization, eliminate unnecessary steps, combine steps, and become more responsive to future change. Key business processes — activities designed to produce specific output for a particular customer or market, focused on customers and outcome — are identified using the same techniques as requirements determination, and disruptive technologies enable breaking long-held business rules that inhibit radical change. Agile: requirements determination relies on continual user involvement, replacing the traditional waterfall with an iterative analyze–design–code–test cycle; agile usage-centered design focuses on user goals, roles, and tasks; and the Planning Game from eXtreme Programming proceeds through exploration, steering, and commitment."}]}, {"id": 6, "title": "Analysis: Logical Modeling of Processes (Part-1)", "optional": false, "slides": [{"t": "Process Modeling", "d": "Process modeling involves graphically representing the functions, or processes, that capture, manipulate, store, and distribute data between a system and its environment and between components within a system. It utilizes information gathered during requirements determination; processes and data structures are modeled.", "svg": null}, {"t": "Deliverables of Process Modeling", "d": "Context data flow diagram (DFD) — shows the scope of the system. DFDs of the current physical and logical system — enable analysts to understand the current system. DFDs of the new logical system — technology independent, showing data flows, structure, and functional requirements of the new system. A thorough description of each DFD component.", "svg": null}, {"t": "Data Flow Diagram (DFD)", "d": "A picture of the movement of data between external entities and the processes and data stores within a system. Difference from system flowcharts: DFDs depict logical data flow independent of technology, whereas flowcharts depict the details of physical systems.", "svg": null}, {"t": "DFD Symbols", "d": "Process: work or actions performed on data (inside the system). Data store: data at rest (inside the system). Source/sink: an external entity that is the origin or destination of data (outside the system). Data flow: arrows depicting the movement of data.", "svg": "dfd_symbols"}, {"t": "DFD Rules — Process", "d": "No process can have only outputs or only inputs: processes must have both outputs and inputs. Process labels should be verb phrases.", "svg": null}, {"t": "DFD Rules — Data Store", "d": "All flows to or from a data store must move through a process. Data store labels should be noun phrases.", "svg": null}, {"t": "DFD Rules — Source/Sink", "d": "No data moves directly between external entities without going through a process. Interactions between external entities without intervening processes are outside the system and therefore not represented in the DFD. Source and sink labels should be noun phrases.", "svg": null}, {"t": "DFD Rules — Data Flow", "d": "A joined data flow must refer to the exact same data item (not different data items) from multiple sources to a common location. A data flow cannot go directly from a process to itself; it must go through intervening processes. Bidirectional flow between a process and a data store is represented by two separate arrows. A forked data flow must refer to the exact same data item from a common location to multiple destinations. The course also lists advanced rules governing data flow diagramming and shows incorrect vs. correct ways to draw DFDs.", "svg": null}, {"t": "Functional Decomposition and DFD Levels", "d": "An iterative process of breaking a system description down into finer and finer detail; high-level processes are described in terms of lower-level sub-processes, with DFD charts created for each level. Context DFD: overview of the organizational system. Level-0 DFD: representation of the system's major processes at a high level of abstraction. Level-1 DFD: results from decomposition of the Level-0 diagram. Level-n DFD: results from decomposition of a Level n−1 diagram.", "svg": "dfd_levels"}, {"t": "Context Diagram", "d": "Shows the system boundaries, external entities that interact with the system, and major information flows between the entities and the system. NOTE: only one process symbol, and no data stores are shown.", "svg": null}, {"t": "Level-0 and Level-1 DFDs", "d": "A Level-0 diagram represents a system's major processes, data flows, and data stores at a high level of detail; processes are labeled 1.0, 2.0, etc., and will be decomposed into more primitive lower-level DFDs. A Level-1 DFD shows the sub-processes of one of the processes in the Level-0 DFD (e.g., a Level-1 DFD for Process 4 labels processes 4.1, 4.2, etc.). A Level-n DFD is the result of n nested decompositions from a process on a Level-0 diagram — e.g., a Level-2 diagram decomposing Process 4.3 of Hoosier Burger's food-ordering system.", "svg": null}, {"t": "DFD Balancing", "d": "Balancing is the conservation of inputs and outputs to a DFD process when that process is decomposed to a lower level. Balanced means: the number of inputs to the lower-level DFD equals the number of inputs to the associated process of the higher-level DFD, and the number of outputs to the lower-level DFD equals the number of outputs of the associated higher-level process. The course shows an unbalanced example between a context diagram and a Level-0 diagram.", "svg": null}, {"t": "Guidelines: Completeness, Consistency, Timing, Iteration", "d": "DFD completeness: the extent to which all necessary components of a DFD have been included and fully described — each component must be fully described in the project dictionary or CASE repository. DFD consistency: the extent to which information contained on one level of a set of nested DFDs is also included on other levels. Timing: time is not represented well on DFDs — best to draw them as if the system has never started and will never stop. Iterative development: the analyst should expect to redraw the diagram several times before reaching the closest approximation of the system being modeled.", "svg": null}, {"t": "Primitive DFDs and Stopping Decomposition", "d": "Primitive DFD: the lowest logical level of decomposition. Rules for stopping decomposition: when each process is a single decision, calculation, or database operation; when each data store represents data about a single entity; when the system user does not care to see more detail; when every data flow does not need to be split further to show that data are handled in various ways; when you believe you have shown each business form or transaction, online display, and report as a single data flow; when you believe there is a separate process for each choice on all lowest-level menu options.", "svg": null}, {"t": "DFDs as Analysis Tools — Gap Analysis", "d": "Gap analysis is the process of discovering discrepancies between two or more sets of data flow diagrams or discrepancies within a single DFD. Inefficiencies in a system can often be identified through DFDs (illustrated before and after BPR).", "svg": null}, {"t": "Decision Tables", "d": "A decision table is a matrix representation of the logic of a decision; it specifies the possible conditions for the decision and the resulting actions. Condition stubs: the part listing the conditions relevant to the decision. Action stubs: the part listing the actions that result for a given set of conditions. Rules: the part specifying which actions are to be followed for a given set of conditions. Indifferent condition: a condition whose value does not affect which actions are taken for two or more rules.", "svg": null}, {"t": "Payroll Decision Table Example", "d": "Conditions: employee type (S = salaried, H = hourly) and hours worked (<40, 40, >40), yielding six rules. Actions: pay base salary (rules 1, 3, 5 — salaried in all cases); calculate hourly wage (rules 2, 4, 6); calculate overtime (rule 6 — hourly, >40); produce absence report (rule 2 — hourly, <40).", "svg": null}, {"t": "Constructing and Reducing Decision Tables", "d": "Steps: (1) name the conditions and the values each condition can assume; (2) name all possible actions that can occur; (3) list all possible rules; (4) define the actions for each rule; (5) simplify the decision table. The course's complete example (perishable/nonperishable × weekday/weekend × academic/summer/holiday = 12 rules) reduces to 7 rules by using indifferent conditions (the '–' entries) — e.g., nonperishable items collapse to one rule with minimum order quantity regardless of time of week or season.", "svg": null}], "qs": [{"q": "What does process modeling involve?", "opts": ["Graphically representing the functions that capture, manipulate, store, and distribute data between a system and its environment and between components within a system", "Writing detailed program code for each functional requirement identified by the analysis team and verifying it with automated test suites before any installation activities can begin", "Estimating activity durations using optimistic and pessimistic values", "Designing the physical storage format of database tables"], "a": 0, "ex": "Process modeling graphically represents the processes that capture, manipulate, store, and distribute data between a system and its environment and among system components.", "core": false, "sref": 0}, {"q": "Which deliverable of process modeling shows the SCOPE of the system?", "opts": ["The context data flow diagram", "The Level-1 data flow diagram", "The primitive data flow diagram", "The decision table"], "a": 0, "ex": "The context DFD shows the scope of the system.", "core": false, "sref": 1}, {"q": "What property characterizes DFDs of the NEW logical system?", "opts": ["They are technology independent and show data flows, structure, and functional requirements", "They show the physical devices, media, and technologies the new system will actually use", "They include the timing and duration of every process", "They describe only the hardware configuration of the system"], "a": 0, "ex": "DFDs of the new logical system are technology independent and show data flows, structure, and the functional requirements of the new system.", "core": true, "sref": 1}, {"q": "What is a data flow diagram (DFD)?", "opts": ["A picture of the movement of data between external entities and the processes and data stores within a system", "A bar chart of project tasks with horizontal bars proportional to their estimated durations", "A matrix of decision conditions and the resulting actions", "A hierarchy of object classes with attributes and operations"], "a": 0, "ex": "A DFD pictures the movement of data between external entities and the processes and data stores within a system.", "core": true, "sref": 2}, {"q": "How do DFDs differ from system flowcharts?", "opts": ["DFDs depict logical data flow independent of technology; flowcharts depict details of physical systems", "DFDs show the hardware and timing details; system flowcharts show only the logical data flow", "DFDs include timing information; flowcharts exclude all timing", "DFDs are drawn by users; flowcharts only by programmers"], "a": 0, "ex": "DFDs depict logical data flow independent of technology, whereas flowcharts depict the details of physical systems.", "core": false, "sref": 2}, {"q": "In DFD notation, what is a PROCESS?", "opts": ["Work or actions performed on data inside the system", "Data at rest stored inside the system", "An external entity that originates or receives data", "An arrow depicting the movement of data"], "a": 0, "ex": "A process is the work or actions performed on data (inside the system).", "core": false, "sref": 3}, {"q": "In DFD notation, what is a DATA STORE?", "opts": ["Data at rest, inside the system", "Work performed on data by the system", "An entity outside the system boundary", "The movement of data between components"], "a": 0, "ex": "A data store is data at rest (inside the system).", "core": false, "sref": 3}, {"q": "In DFD notation, what is a SOURCE/SINK?", "opts": ["An external entity that is the origin or destination of data, outside the system", "An internal repository where the system keeps its data at rest between processes", "A transformation step applied to incoming data", "A label attached to bidirectional data movement"], "a": 0, "ex": "A source/sink is an external entity that is the origin or destination of data (outside the system).", "core": false, "sref": 6}, {"q": "Which DFD rule applies to processes?", "opts": ["No process can have only outputs or only inputs — processes must have both", "Processes may have outputs only, since their role is to generate new data", "Processes must connect directly to at least two data stores", "Processes must be labeled with noun phrases"], "a": 0, "ex": "No process can have only outputs or only inputs; processes must have both, and process labels should be verb phrases.", "core": false, "sref": 4}, {"q": "How should PROCESS labels be written?", "opts": ["As verb phrases", "As noun phrases", "As numeric codes only", "As complete sentences"], "a": 0, "ex": "Process labels should be verb phrases. Data store and source/sink labels should be noun phrases.", "core": false, "sref": 6}, {"q": "Which rule governs data stores in a DFD?", "opts": ["All flows to or from a data store must move through a process", "Data stores may exchange data directly with external entities", "Data stores must always appear on the context diagram", "A data store may connect directly to another data store"], "a": 0, "ex": "All flows to or from a data store must move through a process, and data store labels should be noun phrases.", "core": false, "sref": 5}, {"q": "Why are direct interactions between two external entities NOT shown on a DFD?", "opts": ["Because interactions between external entities without intervening processes are outside the system", "Because external entities cannot legally exchange any data without a written agreement between them", "Because the diagram has no symbol capable of showing arrows", "Because such interactions only occur in physical flowcharts"], "a": 0, "ex": "No data moves directly between external entities without going through a process; such interactions are outside the system and therefore not represented.", "core": false, "sref": 6}, {"q": "What must a JOINED data flow refer to?", "opts": ["The exact same data item from multiple sources to a common location", "Different data items that are merged together into one newly named item", "Only numeric data fields from a single source", "Data flowing from a process back to itself"], "a": 0, "ex": "A joined data flow must refer to the exact same data item (not different items) from multiple sources to a common location.", "core": false, "sref": 7}, {"q": "How is bidirectional flow between a process and a data store represented?", "opts": ["By two separate arrows", "By one double-headed arrow", "By a dashed connecting line", "By overlapping the two symbols"], "a": 0, "ex": "Bidirectional flow between a process and a data store is represented by two separate arrows.", "core": false, "sref": 7}, {"q": "Can a data flow go directly from a process to itself?", "opts": ["No — it must go through intervening processes", "Yes — self-loops are standard DFD practice", "Yes — but only on the context diagram", "No — processes can never send data anywhere"], "a": 0, "ex": "A data flow cannot go directly from a process to itself; it must go through intervening processes.", "core": false, "sref": 7}, {"q": "What is functional decomposition?", "opts": ["An iterative process of breaking a system description down into finer and finer detail, with high-level processes described as lower-level sub-processes", "The deletion of unnecessary functions from a finished system in order to simplify its maintenance and reduce the recurring operating costs", "The grouping of all processes into one combined function", "The conversion of logical models into physical program code"], "a": 0, "ex": "Functional decomposition iteratively breaks a system description into finer detail, with DFD charts created for each level.", "core": true, "sref": 8}, {"q": "What appears on a CONTEXT diagram?", "opts": ["Only one process symbol and no data stores, with external entities and major information flows", "All of the primitive-level processes together with their data stores fully expanded", "The internal sub-processes labeled 4.1, 4.2, and so on", "The complete set of decision conditions and action stubs"], "a": 0, "ex": "The context diagram shows system boundaries, external entities, and major flows — with only one process symbol and no data stores shown.", "core": false, "sref": 9}, {"q": "What is a Level-0 DFD?", "opts": ["A DFD representing a system's major processes, data flows, and data stores at a high level of detail", "A diagram showing only the system boundary, the external entities, and the major flows", "The lowest logical level of decomposition reached by the analyst", "A diagram of the sub-processes of a single Level-1 process"], "a": 0, "ex": "The Level-0 diagram represents the system's major processes, data flows, and data stores at a high level of detail, with processes labeled 1.0, 2.0, etc.", "core": true, "sref": 10}, {"q": "On a Level-1 DFD decomposing Process 4, how are the sub-processes labeled?", "opts": ["4.1, 4.2, etc.", "1.4, 2.4, etc.", "A, B, C, etc.", "0.1, 0.2, etc."], "a": 0, "ex": "A Level-1 DFD for Process 4 labels its sub-processes 4.1, 4.2, etc., which can be further decomposed if necessary.", "core": true, "sref": 10}, {"q": "What is a Level-n DFD?", "opts": ["A DFD that is the result of n nested decompositions from a process on a Level-0 diagram", "A diagram containing exactly n processes and n data stores at the same level", "The nth alternative design produced during prototyping", "A DFD drawn after n review meetings with the customer"], "a": 0, "ex": "A Level-n DFD results from n nested decompositions of a series of sub-processes from a process on a Level-0 diagram.", "core": true, "sref": 10}, {"q": "What is DFD balancing?", "opts": ["The conservation of inputs and outputs to a process when that process is decomposed to a lower level", "Equalizing the number of processes and data stores appearing within a single diagram", "Arranging diagram symbols symmetrically around the page center", "Assigning equal workloads to each member of the analysis team"], "a": 0, "ex": "Balancing is the conservation of inputs and outputs to a DFD process when it is decomposed: lower-level inputs/outputs must equal those of the associated higher-level process.", "core": true, "sref": 11}, {"q": "What is DFD COMPLETENESS?", "opts": ["The extent to which all necessary components have been included and fully described in the project dictionary or CASE repository", "The extent to which the information contained on one level of the nested set is also included on the other levels", "The requirement that diagrams be redrawn several times", "The property that time is not represented on the diagram"], "a": 0, "ex": "DFD completeness: all necessary DFD components are included and fully described in the project dictionary or CASE repository.", "core": true, "sref": 12}, {"q": "What is DFD CONSISTENCY?", "opts": ["The extent to which information contained on one level of a set of nested DFDs is also included on other levels", "The extent to which all of the components are fully described in the project dictionary or repository", "The use of the same drawing tool across every project", "The agreement between the Gantt chart and the network diagram"], "a": 0, "ex": "DFD consistency is the extent to which information on one level of nested DFDs is also included on other levels.", "core": true, "sref": 12}, {"q": "How should DFDs treat TIME?", "opts": ["Best drawn as if the system has never started and will never stop, since time is not represented well on DFDs", "Each process must carry a precise start and end timestamp showing its execution window", "All flows must be ordered from top to bottom according to their execution time at run time", "Each level represents one week of system operation"], "a": 0, "ex": "Time is not represented well on DFDs; it is best to draw them as if the system has never started and will never stop.", "core": false, "sref": 10}, {"q": "What is a PRIMITIVE DFD?", "opts": ["The lowest logical level of decomposition", "The first diagram drawn during analysis", "The diagram with only one process symbol", "Any DFD drawn without CASE tool support"], "a": 0, "ex": "A primitive DFD is the lowest logical level of decomposition.", "core": true, "sref": 13}, {"q": "Which is a stated rule for STOPPING decomposition?", "opts": ["When each process has been reduced to a single decision, calculation, or database operation", "When the diagram contains exactly ten processes and ten data stores in total", "When the analyst runs out of paper or screen space", "When the customer signs the project scope statement"], "a": 0, "ex": "Stop when each process is a single decision/calculation/database operation, each store holds a single entity, users want no more detail, flows need not split further, each form/report is a single flow, and there is a process per lowest-level menu choice.", "core": false, "sref": 13}, {"q": "What is gap analysis, in the DFD context?", "opts": ["The process of discovering discrepancies between two or more sets of DFDs, or discrepancies within a single DFD", "The measurement of the time gaps that occur between sequential processes at run time", "The comparison of the project's budgets before and after execution to find any cost overruns", "The identification of missing employees in the org chart"], "a": 0, "ex": "Gap analysis discovers discrepancies between two or more sets of DFDs or within a single DFD; inefficiencies can often be identified this way.", "core": true, "sref": 14}, {"q": "What is a decision table?", "opts": ["A matrix representation of the logic of a decision, specifying the possible conditions and the resulting actions", "A graphical picture of the movement of data between processes, stores, and external entities", "A chart of horizontal bars proportional to task durations", "A list of stakeholders and the information each requires"], "a": 0, "ex": "A decision table is a matrix representation of decision logic: it specifies the possible conditions for the decision and the resulting actions.", "core": true, "sref": 15}, {"q": "In a decision table, what are CONDITION STUBS?", "opts": ["The part that lists the conditions relevant to the decision", "The part that lists the actions resulting from conditions", "The part that specifies which actions follow which conditions", "The part that records who approved each rule"], "a": 0, "ex": "Condition stubs list the conditions relevant to the decision; action stubs list the actions; rules specify which actions follow for given condition sets.", "core": false, "sref": 15}, {"q": "In a decision table, what are RULES?", "opts": ["The part that specifies which actions are to be followed for a given set of conditions", "The part that lists all of the conditions relevant to making the decision", "The list of all actions that could possibly result", "The notes explaining who maintains the table"], "a": 0, "ex": "Rules specify which actions are to be followed for a given set of conditions.", "core": false, "sref": 15}, {"q": "What is an INDIFFERENT condition?", "opts": ["A condition whose value does not affect which actions are taken for two or more rules", "A condition that is illegal to evaluate inside a payroll or personnel system", "A condition that always triggers every available action", "A condition listed in the action stub by mistake"], "a": 0, "ex": "An indifferent condition is one whose value does not affect which actions are taken for two or more rules — enabling table reduction.", "core": true, "sref": 15}, {"q": "In the payroll decision table, which rule produces 'calculate overtime'?", "opts": ["Hourly employee with hours worked > 40", "Salaried employee with hours worked > 40", "Hourly employee with hours worked < 40", "Salaried employee with hours worked = 40"], "a": 0, "ex": "Calculate overtime applies in rule 6: employee type H (hourly) with hours worked > 40.", "core": false, "sref": 16}, {"q": "In the payroll decision table, when is the absence report produced?", "opts": ["For an hourly employee with hours worked < 40", "For a salaried employee with hours worked < 40", "For an hourly employee with hours worked = 40", "For any employee whose hours exceed 40"], "a": 0, "ex": "Produce absence report applies in rule 2: hourly (H) with hours worked < 40.", "core": false, "sref": 16}, {"q": "What are the five steps of constructing a decision table, in order?", "opts": ["Name conditions and their values; name all possible actions; list all possible rules; define actions for each rule; simplify the table", "List all possible rules; name the actions; name the conditions and values; simplify the table; validate it with users", "Define actions; simplify; list conditions; assign rules; document results", "Simplify; name conditions; define actions; list rules; publish the table"], "a": 0, "ex": "Steps: (1) name conditions and values, (2) name all possible actions, (3) list all possible rules, (4) define the actions for each rule, (5) simplify the table.", "core": true, "sref": 17}, {"q": "In the course example, the COMPLETE decision table has 12 rules. After simplification, the REDUCED table has how many rules?", "opts": ["7", "6", "12", "4"], "a": 0, "ex": "Using indifferent conditions ('–'), the complete 12-rule table reduces to 7 rules — e.g., nonperishable items collapse into a single rule.", "core": true, "sref": 17}], "essays": [{"q": "Explain the four DFD symbols and the diagramming rules associated with each.", "a": "Process: work or actions performed on data inside the system; no process can have only outputs or only inputs — processes must have both — and process labels should be verb phrases. Data store: data at rest inside the system; all flows to or from a data store must move through a process, and data store labels should be noun phrases. Source/sink: an external entity that is the origin or destination of data, outside the system; no data moves directly between external entities without going through a process (such interactions are outside the system and not represented), and labels should be noun phrases. Data flow: arrows depicting the movement of data; a joined data flow must refer to the exact same data item from multiple sources to a common location; a forked data flow must refer to the exact same data item from a common location to multiple destinations; a flow cannot go directly from a process to itself (it must pass through intervening processes); and bidirectional flow between a process and a data store is represented by two separate arrows."}, {"q": "Describe functional decomposition and the levels of DFDs, including balancing.", "a": "Functional decomposition is an iterative process of breaking a system description down into finer and finer detail, describing high-level processes in terms of lower-level sub-processes and creating a DFD chart for each level. The context DFD gives an overview of the organizational system — it shows the system boundary, external entities, and major information flows, with only one process symbol and no data stores. The Level-0 DFD represents the system's major processes, data flows, and data stores at a high level of abstraction, with processes numbered 1.0, 2.0, etc. A Level-1 DFD decomposes one Level-0 process (e.g., Process 4 into 4.1, 4.2, ...), and a Level-n DFD results from n nested decompositions (e.g., a Level-2 diagram decomposing Process 4.3 in Hoosier Burger's food-ordering system). Balancing is the conservation of inputs and outputs when a process is decomposed: the number of inputs and outputs of the lower-level DFD must equal those of the associated process on the higher-level DFD."}, {"q": "Discuss the guidelines for drawing DFDs: completeness, consistency, timing, iterative development, and primitive DFDs.", "a": "Completeness: the extent to which all necessary components of a DFD have been included and fully described — each component must be fully described in the project dictionary or CASE repository. Consistency: the extent to which information contained on one level of a set of nested DFDs is also included on other levels. Timing: time is not represented well on DFDs, so it is best to draw them as if the system has never started and will never stop. Iterative development: the analyst should expect to redraw the diagram several times before reaching the closest approximation of the system being modeled. Primitive DFDs are the lowest logical level of decomposition; rules for stopping decomposition include: each process reduced to a single decision, calculation, or database operation; each data store representing data about a single entity; the user not caring to see more detail; no data flow needing further splitting; each business form, transaction, online display, and report shown as a single data flow; and a separate process for each choice on all lowest-level menu options."}, {"q": "Explain decision tables: their parts, construction steps, and how they are simplified, using the course examples.", "a": "A decision table is a matrix representation of the logic of a decision; it specifies the possible conditions and the resulting actions. Its parts: condition stubs (the conditions relevant to the decision), action stubs (the actions that result for a given set of conditions), and rules (which actions follow for a given set of conditions). Construction proceeds in five steps: name the conditions and the values each can assume; name all possible actions; list all possible rules; define the actions for each rule; and simplify the table. In the payroll example, conditions are employee type (S/H) and hours worked (<40, 40, >40), producing six rules — salaried employees are paid base salary in all cases; hourly employees have their wage calculated, with overtime added when hours exceed 40 and an absence report produced when hours are under 40. Simplification uses indifferent conditions — conditions whose values do not affect which actions are taken for two or more rules — marked with '–'. The course's complete 12-rule example (item type × time of week × season) reduces to 7 rules, with all nonperishable cases collapsing into a single minimum-order-quantity rule."}]}, {"id": 7, "title": "Analysis: Logical Modeling of Processes (Part-2)", "optional": false, "slides": [{"t": "Use Case Modeling — Purpose", "d": "DFDs are not the only way to show system functionality. Use case modeling can be used to analyze the functional requirements of a system. Although associated with OOAD, use case modeling can also be used within more traditional approaches. Use case modeling is an iterative process, and analysts and users work together throughout the model development process for refinement.", "svg": null}, {"t": "What Is a Use Case?", "d": "A use case shows the behavior or functionality of a system — a depiction of a system's behavior or functionality under various conditions as the system responds to requests from users: a set of possible sequences of interactions between a system and a user in a particular environment, related to a particular goal. A use case is stated as a present-tense verb phrase, containing the verb (what the system is supposed to do) and the object of the verb (what the system is to act on). Examples: Enter Sales Data, Compute Commission, Generate Quarterly Report.", "svg": null}, {"t": "Identifying Use Cases — Actors and Jacobson's Questions", "d": "A use case model consists of actors and use cases. An actor is an external entity that interacts with the system. A use case represents a sequence of related actions initiated by an actor to accomplish a specific goal. Jacobson et al. (1992) recommend asking: What are the main tasks performed by each actor? Will the actor read or update any information in the system? Will the actor have to inform the system about changes outside the system? Does the actor have to be informed of unexpected changes?", "svg": null}, {"t": "Use Case Diagram — Symbols", "d": "A use case diagram is a picture showing system behavior along with the key actors that interact with the system (e.g., a university registration system). The system boundary is represented as a box that includes all of the relevant use cases; actors are outside the system boundary. An actor is shown using a stickfigure symbol with its name below it — it is a role, not an individual; individuals are instances of actors, and one particular individual may play many roles simultaneously. Each use case is represented as an ellipse representing a single system function, with its name inside the ellipse or just below it.", "svg": null}, {"t": "Use Case Connections — Extend and Include", "d": "Actors are connected to use cases with lines showing the actor's involvement in a particular system function; use cases are connected to each other with arrows. An extend relationship is an association between two use cases where one adds new behaviors or actions to the other — shown as a dotted-line arrow pointing toward the use case that has been extended, labeled <<extend>> (e.g., Register for Special Class extends Register for Classes). An include relationship is an association where one use case uses the functionality contained in the other — shown as a dotted-line arrow pointed toward the use case that is being used, labeled <<include>> (e.g., when a manager reorders supplies, the sales and inventory data are tracked).", "svg": null}, {"t": "Written Use Cases — Cockburn Template", "d": "The names of use cases in a diagram alone do not provide much information for analysis and moving to the design phase, so the contents of a use case can be written in simple text. Cockburn (2001) recommends a specific template: Level — the perspective from which a use case description is written, typically ranging from high level to extremely detailed; Stakeholder — people who have a vested interest in the system being developed; Preconditions — things that must be true before a use case can start; Minimal guarantee — the least amount promised to the stakeholder by a use case; Success guarantee — what a use case must do effectively in order to satisfy stakeholders; Trigger — the event that initiates a use case; Extension — the set of behaviors or functions in a use case that follow exceptions to the main success scenario.", "svg": null}, {"t": "Activity Diagram — Purpose and Uses", "d": "An Activity Diagram shows the conditional logic for the sequence of system activities needed to accomplish a business process; an individual activity can be manual or automated. It can be used to: depict the flow of control from activity to activity; help in use case analysis to understand what actions need to take place; help in identifying extensions in a use case; model work flow and business processes; and model the sequential and concurrent steps in a computation process. The interpretation of 'activity' depends on perspective: at a conceptual level an activity is a task; at an implementation level an activity is a method in a class.", "svg": null}, {"t": "Activity Diagram — Basic Notations", "d": "Each activity is represented with a rounded rectangle, with the action performed written inside it. The beginning of the process is indicated with a filled-in circle; the end of the process is also a filled-in circle but surrounded by another circle. A branch (the symbol illustrating a choice that must be made) is a diamond with one incoming arrow and two outgoing arrows. A merge (the point at which different courses of possible action join) is also a diamond, with two incoming arrows and one outgoing arrow. Parallel activities are shown with a fork — a horizontal line with two arrows coming out of it; when parallel activities are done they come back together in a join — a horizontal line with two arrows coming in and one arrow leaving.", "svg": "activity_notation"}, {"t": "Activity Diagram — Swimlanes", "d": "For complex systems, each column is called a swimlane and represents the organizational unit responsible for certain activities. The vertical axis is time, but without a time scale. The process starts at the filled-in circle. A multi-actor activity diagram clearly shows parallel and alternative behavior and provides a good way to document work or flows through an organization.", "svg": null}, {"t": "Business Process Modeling and BPMN", "d": "A business process is a standard method for accomplishing a particular task necessary for an organization to function; it can be simple or complex, and complex business processes are difficult to understand and harder to automate. Business processes can be represented by DFDs and Activity Diagrams. The Object Management Group (OMG) has established Business Process Modeling Notation (BPMN) for business process modeling. BPMN is much more complicated than DFD notation — it has many more symbols, each with numerous variations — and is built on four basic concepts.", "svg": null}, {"t": "BPMN — Event and Activity", "d": "An event is a trigger that initiates the start of a process; its symbol is a circle. For a starting event, the walls of the circle are thin; for the ending event, the walls are thicker. An activity is an action that must take place for a process to be completed; it can be a manual or an automated activity, and its symbol is a rectangle with rounded edges.", "svg": null}, {"t": "BPMN — Gateway and Flow", "d": "A gateway, symbolized by a diamond, is a decision point. Flow, represented by an arrow, shows sequence — the order in which activities occur. BPMN diagrams are read from left to right.", "svg": null}, {"t": "BPMN — Three Types of Gateways", "d": "XOR: the gateway with an X inside is an exclusive OR gateway, meaning only one of the paths that exit the gateway can be followed. AND: the gateway with a 'plus' sign inside means all of the paths that follow the gateway can be followed in parallel. OR: symbolized by an O inside the diamond, meaning at least one path out of the gateway must be followed, but many or even all of the paths that leave the gateway can be engaged.", "svg": "bpmn_gateways"}, {"t": "BPMN — XOR Gateway Example", "d": "If the value found at the gateway is 'a', then activity A is performed; if 'b', activity B; if 'c', activity C — but only one of these paths can be followed. Once activity A or B or C is performed, all of the paths merge together at the second gateway, and activity D can be performed.", "svg": null}, {"t": "BPMN — AND & XOR Combined Example", "d": "After activity N is complete, an AND gateway means both paths that follow must be followed. The top path leads to an XOR gateway: activity C is performed in parallel with either activity A or B. After either A or B is performed, the paths merge to the closing XOR gateway. The path leaving the XOR gateway and the path leaving activity C then both merge at the next AND gateway.", "svg": null}], "qs": [{"q": "Besides DFDs, what technique does the course present for analyzing the functional requirements of a system?", "opts": ["Use case modeling", "Entity-relationship modeling", "Normalization of relations", "Break-even analysis"], "a": 0, "ex": "DFDs are not the only way to show system functionality; use case modeling can analyze functional requirements.", "core": true, "sref": 0}, {"q": "Although use case modeling is associated with OOAD, the course notes that it…", "opts": ["can also be used within more traditional approaches", "must replace DFDs entirely whenever it is adopted", "must replace DFDs entirely when adopted", "is restricted to database design tasks"], "a": 0, "ex": "Use case modeling is associated with OOAD but can also be used within more traditional approaches.", "core": true, "sref": 0}, {"q": "How is the use case model development process characterized?", "opts": ["Iterative, with analysts and users refining together", "Linear, completed in a single analyst pass", "Automated, generated entirely by CASE tools", "Optional, used only for very large systems"], "a": 0, "ex": "Use case modeling is an iterative process; analysts and users work together throughout for refinement.", "core": true, "sref": 0}, {"q": "What is a use case?", "opts": ["A depiction of system behavior under various conditions as it responds to user requests", "A matrix representation of the logic of a business decision, with its conditions and actions", "A table of attributes that uniquely identify entity instances", "A schedule of activities with their estimated completion times"], "a": 0, "ex": "A use case depicts a system's behavior or functionality under various conditions as the system responds to requests from users.", "core": true, "sref": 1}, {"q": "Grammatically, how should a use case be stated?", "opts": ["As a present-tense verb phrase with the verb and its object", "As a singular, concise noun that names the system function", "As a past-tense sentence describing the outcome", "As a question addressed to the system's actors"], "a": 0, "ex": "A use case is stated as a present-tense verb phrase containing the verb (what the system does) and the object of the verb (what it acts on).", "core": true, "sref": 1}, {"q": "Which of these is given in the course as a valid use case name?", "opts": ["Compute Commission", "Sales Database", "Quarterly Report Office", "Commission Value"], "a": 0, "ex": "Examples given: Enter Sales Data, Compute Commission, Generate Quarterly Report — verb phrases.", "core": true, "sref": 1}, {"q": "What two components make up a use case model?", "opts": ["Actors and use cases", "Entities and attributes", "Processes and data stores", "Conditions and actions"], "a": 0, "ex": "A use case model consists of actors and use cases.", "core": true, "sref": 2}, {"q": "In use case modeling, what is an actor?", "opts": ["An external entity that interacts with the system", "An internal module that executes system logic", "A data store holding records at rest", "A diagram showing time-ordered events"], "a": 0, "ex": "An actor is an external entity that interacts with the system.", "core": true, "sref": 3}, {"q": "A use case represents a sequence of related actions that is…", "opts": ["initiated by an actor to accomplish a specific goal", "triggered by the database to enforce integrity", "scheduled by managers to track project progress", "executed by the compiler to verify code syntax"], "a": 0, "ex": "A use case represents a sequence of related actions initiated by an actor to accomplish a specific goal.", "core": true, "sref": 2}, {"q": "Who recommended the four guiding questions for identifying use cases (e.g., 'What are the main tasks performed by each actor?')?", "opts": ["Jacobson et al. (1992)", "Cockburn (2001)", "Valacich and George", "Beck and Andres"], "a": 0, "ex": "Jacobson et al. (1992) recommend the questions for identifying use cases.", "core": true, "sref": 2}, {"q": "Which of the following is one of Jacobson's recommended questions for identifying use cases?", "opts": ["Will the actor read or update any information in the system?", "What is the discount rate applied to project benefits?", "How many relations result from the E-R transformation?", "Which installation approach minimizes conversion risk?"], "a": 0, "ex": "Jacobson's questions include: Will the actor read or update any information in the system?", "core": true, "sref": 2}, {"q": "How is the system boundary represented in a use case diagram?", "opts": ["A box that includes all of the relevant use cases", "A circle that surrounds the primary actor", "A diamond that separates decisions from actions", "A dotted line that connects related ellipses"], "a": 0, "ex": "The system boundary is a box including all the relevant use cases; actors are outside it.", "core": true, "sref": 3}, {"q": "Where are actors positioned relative to the system boundary?", "opts": ["Outside the system boundary", "Inside the system boundary", "On the boundary line itself", "Below the diagram in a legend"], "a": 0, "ex": "Actors are outside the system boundary.", "core": true, "sref": 3}, {"q": "In a use case diagram, an actor is described as…", "opts": ["a role, not an individual — individuals are instances of actors", "an individual person who is identified by their own real name", "a software component installed inside the system", "a single function the system performs for users"], "a": 0, "ex": "An actor is a role, not an individual; individuals are instances of actors and one individual may play many roles simultaneously.", "core": true, "sref": 3}, {"q": "What symbol represents an actor in a use case diagram?", "opts": ["A stickfigure with its name below it", "An ellipse with its name inside it", "A rounded rectangle with an action inside", "A filled circle surrounded by another circle"], "a": 0, "ex": "An actor is shown using a stickfigure symbol with its name below it.", "core": true, "sref": 3}, {"q": "What symbol represents a use case, and what does each one stand for?", "opts": ["An ellipse representing a single system function", "A box representing the whole system scope", "A diamond representing a decision point", "An arrow representing the order of activities"], "a": 0, "ex": "Each use case is an ellipse representing a single system function; the name appears inside or just below it.", "core": true, "sref": 3}, {"q": "How is an extend relationship drawn in a use case diagram?", "opts": ["Dotted-line arrow pointing toward the use case that has been extended, labeled <<extend>>", "Solid-line arrow pointing toward the actor that was extended, labeled <<extend>>", "Dotted-line arrow pointing away from the extended use case, labeled <<extends-to>>", "Double line connecting both use cases with no label required"], "a": 0, "ex": "Extend is shown as a dotted-line arrow pointing toward the use case that has been extended, labeled with <<extend>>.", "core": true, "sref": 4}, {"q": "What does an extend relationship mean between two use cases?", "opts": ["One use case adds new behaviors or actions to the other", "One use case uses the functionality contained in the other", "Two use cases share the same actor and trigger", "Two use cases are alternatives chosen by a gateway"], "a": 0, "ex": "Extend: an association where one use case adds new behaviors or actions to the other (e.g., Register for Special Class extends Register for Classes).", "core": true, "sref": 4}, {"q": "What does an include relationship mean between two use cases?", "opts": ["One use case uses the functionality contained in the other", "One use case adds exceptional behavior to the other", "Both use cases must be initiated by the same actor", "Both use cases end at the same system boundary"], "a": 0, "ex": "Include: an association where one use case uses the functionality contained in the other.", "core": true, "sref": 4}, {"q": "Toward which use case does the <<include>> dotted-line arrow point?", "opts": ["The use case that is being used", "The use case that initiates the interaction", "The actor that benefits from the function", "The system boundary containing both cases"], "a": 0, "ex": "Include is shown as a dotted-line arrow pointed toward the use case that is being used.", "core": false, "sref": 4}, {"q": "Which course example illustrates the include relationship?", "opts": ["When a manager reorders supplies, the sales and inventory data are tracked", "When a student registers for a special class, registration is extended", "When a customer pays an invoice, a monthly report is generated", "When an employee logs overtime, an absence report is produced"], "a": 0, "ex": "The include example: when a manager reorders supplies, the sales and inventory data are tracked.", "core": false, "sref": 4}, {"q": "Why are written use cases needed in addition to the diagram?", "opts": ["Use case names alone do not provide much information for analysis and design", "Diagrams cannot legally show more than three actors at the same time", "Written text is required before any actor can be drawn", "The diagram is discarded once coding has started"], "a": 0, "ex": "Names alone do not provide much information for analysis and moving on to the design phase, so contents are written in simple text.", "core": false, "sref": 5}, {"q": "Who recommends a specific template for writing use cases?", "opts": ["Cockburn (2001)", "Jacobson et al. (1992)", "Bruegge and Dutoit", "The Object Management Group"], "a": 0, "ex": "Cockburn (2001) recommends a specific template for writing use cases.", "core": false, "sref": 5}, {"q": "In Cockburn's template, what is the 'Level'?", "opts": ["The perspective from which a use case description is written, from high level to extremely detailed", "The priority assigned to the use case during release planning, from most critical to least", "The number of actors participating in the use case", "The depth of decomposition in the related DFD set"], "a": 0, "ex": "Level: the perspective from which a use case description is written, typically ranging from high level to extremely detailed.", "core": false, "sref": 5}, {"q": "In Cockburn's template, who are the 'Stakeholders'?", "opts": ["People who have a vested interest in the system being developed", "People who wrote the original requirements of the system being built", "People assigned to test the main success scenario", "People who maintain the system after installation"], "a": 0, "ex": "Stakeholder: people who have a vested interest in the system being developed.", "core": false, "sref": 5}, {"q": "In Cockburn's template, what are 'Preconditions'?", "opts": ["Things that must be true before a use case can start", "Things the use case promises after it completes", "Events that interrupt the main success scenario", "Constraints on the values attributes may assume"], "a": 0, "ex": "Preconditions: things that must be true before a use case can start.", "core": false, "sref": 5}, {"q": "In Cockburn's template, what is the 'Minimal guarantee'?", "opts": ["The least amount promised to the stakeholder by a use case", "The shortest path through the main success scenario", "The smallest set of actors required to start the case", "The minimum hardware needed to run the function"], "a": 0, "ex": "Minimal guarantee: the least amount promised to the stakeholder by a use case.", "core": false, "sref": 5}, {"q": "In Cockburn's template, what is the 'Success guarantee'?", "opts": ["What a use case must do effectively in order to satisfy stakeholders", "The probability that the use case completes without errors", "The reward given to developers when the case passes testing", "The percentage of scenarios covered by the written text"], "a": 0, "ex": "Success guarantee: what a use case must do effectively in order to satisfy stakeholders.", "core": false, "sref": 5}, {"q": "In Cockburn's template, what is the 'Trigger'?", "opts": ["The event that initiates a use case", "The actor that owns the use case", "The condition that ends a use case", "The exception that suspends a use case"], "a": 0, "ex": "Trigger: event that initiates a use case.", "core": false, "sref": 5}, {"q": "In Cockburn's template, what is an 'Extension'?", "opts": ["Behaviors or functions that follow exceptions to the main success scenario", "Additional actors that are added after the diagram has been approved", "Extra attributes appended to the system boundary", "Optional notes describing the system environment"], "a": 0, "ex": "Extension: the set of behaviors or functions in a use case that follow exceptions to the main success scenario.", "core": false, "sref": 5}, {"q": "What does an activity diagram show?", "opts": ["The conditional logic for the sequence of system activities needed to accomplish a business process", "The static structure of the object classes and the relationships among them", "The movement of data between the processes, the data stores, and the external sinks", "The financial benefits and costs of a development project"], "a": 0, "ex": "An Activity Diagram shows the conditional logic for the sequence of system activities needed to accomplish a business process.", "core": false, "sref": 6}, {"q": "In an activity diagram, an individual activity can be…", "opts": ["manual or automated", "only fully automated", "only manual work", "neither — it is abstract"], "a": 0, "ex": "An individual activity can be manual or automated.", "core": false, "sref": 6}, {"q": "Which of the following is one of the listed tasks an activity diagram can accomplish?", "opts": ["Help in identifying extensions in a use case", "Define the primary keys for normalized relations", "Estimate the expected time of project activities", "Assign costs to tangible and intangible benefits"], "a": 0, "ex": "Tasks include depicting flow of control, helping use case analysis, identifying extensions in a use case, modeling workflow, and modeling sequential and concurrent steps.", "core": false, "sref": 6}, {"q": "At a conceptual level, what is an 'activity' in an activity diagram?", "opts": ["A task", "A method in a class", "A data store", "An actor's role"], "a": 0, "ex": "At a conceptual level an activity is a task; at an implementation level it is a method in a class.", "core": false, "sref": 6}, {"q": "At an implementation level, what is an 'activity' in an activity diagram?", "opts": ["A method in a class", "A task performed manually", "A complete business process", "A swimlane in the diagram"], "a": 0, "ex": "At an implementation level, an activity is a method in a class.", "core": false, "sref": 6}, {"q": "How is each activity represented in an activity diagram?", "opts": ["A rounded rectangle with the action written inside it", "An ellipse with the activity name written below it", "A diamond with one entry arrow and two exit arrows", "A thin-walled circle marking where the work begins"], "a": 0, "ex": "Each activity is a rounded rectangle with the action performed by that activity written inside it.", "core": false, "sref": 7}, {"q": "How is the beginning of the process indicated in an activity diagram?", "opts": ["A filled-in circle", "A circle with thick walls", "A horizontal black bar", "A diamond with one arrow"], "a": 0, "ex": "The beginning of the process is indicated with a filled-in circle.", "core": false, "sref": 7}, {"q": "How is the end of the process indicated in an activity diagram?", "opts": ["A filled-in circle surrounded by another circle", "A filled-in circle standing on its own", "A rounded rectangle marked 'end' inside", "A merge diamond with one outgoing arrow"], "a": 0, "ex": "The end is also a filled-in circle, but surrounded by another circle.", "core": false, "sref": 7}, {"q": "In an activity diagram, what is a branch and how many arrows does it have?", "opts": ["A diamond showing a choice: one incoming and two outgoing arrows", "A diamond joining paths: two incoming and one outgoing arrow", "A bar splitting flow: one incoming and many parallel outgoing arrows", "A circle marking a decision: two incoming and two outgoing arrows"], "a": 0, "ex": "A branch illustrates a choice that must be made — a diamond with one incoming arrow and two outgoing arrows.", "core": true, "sref": 7}, {"q": "In an activity diagram, what is a merge?", "opts": ["The point where different courses of possible action join — a diamond with two incoming arrows and one outgoing", "The point where parallel activities split apart — a horizontal line with one incoming and two outgoing arrows", "The point where the process terminates — a double circle with no outgoing arrows", "The point where a choice is made — a diamond with one incoming arrow and two outgoing"], "a": 0, "ex": "A merge is where different courses of possible action join; its symbol is a diamond with two incoming arrows and one outgoing arrow.", "core": false, "sref": 7}, {"q": "How are parallel activities started in an activity diagram?", "opts": ["With a fork — a horizontal line with two arrows coming out of it", "With a join — a horizontal line with two arrows coming into it", "With a branch — a diamond offering two alternative paths", "With a swimlane — a column for each parallel activity"], "a": 0, "ex": "Parallel activities are shown with a fork: a horizontal line with two arrows coming out of it.", "core": true, "sref": 7}, {"q": "How do parallel activities come back together in an activity diagram?", "opts": ["In a join — a horizontal line with two arrows coming in and one arrow leaving", "In a fork — a horizontal line with one arrow in and two arrows leaving", "In a merge — a circle where alternative paths reunite after a choice", "In a branch — a diamond where the parallel flows are reconciled"], "a": 0, "ex": "When parallel activities are done, they come back together in a join: a horizontal line with two arrows coming in and one leaving.", "core": true, "sref": 7}, {"q": "In an activity diagram for complex systems, what does each swimlane (column) represent?", "opts": ["The organizational unit responsible for certain activities", "The time period in which the activities must finish", "The data store accessed by the contained activities", "The actor's goal accomplished in that part of the flow"], "a": 0, "ex": "Each column is a swimlane representing the organizational unit responsible for certain activities.", "core": false, "sref": 8}, {"q": "What does the vertical axis represent in a swimlane activity diagram?", "opts": ["Time, but without a time scale", "Cost, measured in relative units", "Organizational hierarchy, top down", "Priority, from highest to lowest"], "a": 0, "ex": "The vertical axis is time, but without a time scale.", "core": false, "sref": 8}, {"q": "What is a business process?", "opts": ["A standard method for accomplishing a particular task necessary for an organization to function", "A computer program that automates all of an organization's routine clerical work", "A graphical model showing which data the organization stores and uses", "A document listing the actors that interact with the planned system"], "a": 0, "ex": "A business process is a standard method for accomplishing a particular task necessary for an organization to function.", "core": true, "sref": 9}, {"q": "According to the course, complex business processes are…", "opts": ["difficult to understand and harder to automate", "easier to automate than simple processes", "always represented with DFDs rather than BPMN", "outside the scope of business process modeling"], "a": 0, "ex": "Complex business processes are difficult to understand and harder to automate.", "core": false, "sref": 9}, {"q": "Which organization established BPMN?", "opts": ["The Object Management Group (OMG)", "The International Standards Organization", "The World Wide Web Consortium", "The Open Source Initiative"], "a": 0, "ex": "The Object Management Group (OMG) established Business Process Modeling Notation (BPMN).", "core": false, "sref": 9}, {"q": "Compared with DFD notation, BPMN is described as…", "opts": ["much more complicated, with many more symbols, each having numerous variations", "much simpler than DFDs, with only four fixed symbols and no variations at all", "identical in symbols but different in reading direction", "less expressive, suited only to simple processes"], "a": 0, "ex": "BPMN is much more complicated than DFD notation — many more symbols, each with numerous variations.", "core": false, "sref": 9}, {"q": "In BPMN, what is an event and what is its symbol?", "opts": ["A trigger that initiates the start of a process; symbolized by a circle", "An action that must take place; symbolized by a rounded rectangle", "A decision point in the flow; symbolized by a diamond shape", "The order of activities; symbolized by a connecting arrow"], "a": 0, "ex": "Event: a trigger that initiates the start of a process; the symbol is a circle.", "core": false, "sref": 10}, {"q": "In BPMN, how are starting and ending events distinguished?", "opts": ["Starting event circles have thin walls; ending event circles have thicker walls", "Starting events are diamonds; ending events are filled rectangles", "Starting events are filled circles; ending events are empty circles", "Starting events sit on the left margin; ending events sit on top"], "a": 0, "ex": "For a starting event the walls of the circle are thin; for the ending event the walls are thicker.", "core": false, "sref": 10}, {"q": "In BPMN, what is an activity and what is its symbol?", "opts": ["An action that must take place for a process to be completed; a rectangle with rounded edges", "A trigger that initiates a process; a circle drawn with either thin or thick walls", "A point where the flow divides; a diamond holding an X or plus", "A repository of records; an open-ended rectangle with a label"], "a": 0, "ex": "Activity: an action that must take place for a process to be completed — manual or automated; symbol is a rectangle with rounded edges.", "core": false, "sref": 10}, {"q": "In BPMN, what is a gateway?", "opts": ["A decision point, symbolized by a diamond", "A trigger event, symbolized by a circle", "A flow of work, symbolized by an arrow", "A process boundary, symbolized by a box"], "a": 0, "ex": "A gateway, symbolized by a diamond, is a decision point.", "core": false, "sref": 11}, {"q": "In BPMN, what does flow represent and how is it drawn?", "opts": ["Sequence — the order in which activities occur — represented by an arrow", "Data movement between stores — represented by a labeled dotted line", "Responsibility assignment — represented by horizontal swimlanes", "Exception handling — represented by a double-walled circle"], "a": 0, "ex": "Flow, represented by an arrow, shows sequence: the order in which activities occur.", "core": false, "sref": 11}, {"q": "In which direction are BPMN diagrams read?", "opts": ["From left to right", "From right to left", "From top to bottom", "From bottom to top"], "a": 0, "ex": "BPMN diagrams are read from left to right.", "core": false, "sref": 11}, {"q": "How many types of gateways does BPMN define, per the course?", "opts": ["Three", "Two", "Four", "Five"], "a": 0, "ex": "There are three different types of gateways: XOR, AND, and OR.", "core": true, "sref": 12}, {"q": "In BPMN, what does an XOR gateway (X inside the diamond) mean?", "opts": ["Only one of the paths that exit the gateway can be followed", "All of the paths that follow the gateway are taken in parallel", "At least one path must be followed, possibly several at once", "No path may be taken until an external event has occurred"], "a": 0, "ex": "XOR (exclusive OR): only one of the paths that exit the gateway can be followed.", "core": false, "sref": 12}, {"q": "In BPMN, what does an AND gateway (plus sign inside the diamond) mean?", "opts": ["All of the paths that follow the gateway can be followed in parallel", "Exactly one of the exiting paths is selected and followed", "At least one path is chosen, but never every available path", "The process pauses until a second trigger event arrives"], "a": 0, "ex": "AND gateway: all of the paths that follow the gateway can be followed in parallel.", "core": false, "sref": 12}, {"q": "In BPMN, what does an OR gateway (O inside the diamond) mean?", "opts": ["At least one path out must be followed, but many or even all of the paths can be engaged", "Exactly one path out of the gateway is followed and all the other paths are discarded", "Every path must be followed simultaneously without exception", "The gateway reverses the flow back to the previous activity"], "a": 0, "ex": "OR gateway: at least one path out must be followed, but many or even all of the paths that leave the gateway can be engaged.", "core": false, "sref": 12}, {"q": "In the course's XOR gateway example with values a, b, and c, what happens after activity A, B, or C is performed?", "opts": ["All paths merge together at a second gateway, then activity D is performed", "Each path ends separately at its own thick-walled ending event", "The process loops back to the first gateway for the next value", "Activities A, B, and C repeat in parallel until D interrupts them"], "a": 0, "ex": "Once activity A or B or C is performed, all paths merge at the second gateway and activity D can be performed.", "core": false, "sref": 13}, {"q": "In the AND & XOR combined example, which activities run in parallel after activity N?", "opts": ["Activity C is performed in parallel with either activity A or B", "Activities A and B are performed in parallel with each other", "Activities A, B, and C all run simultaneously in three lanes", "Activity N repeats in parallel with the closing XOR gateway"], "a": 0, "ex": "After N, the AND gateway splits flow: the top path's XOR picks A or B, and activity C is performed in parallel with either A or B.", "core": true, "sref": 14}], "essays": [{"q": "Explain use cases and use case diagrams, including the main symbols used.", "a": "A use case shows the behavior or functiona
